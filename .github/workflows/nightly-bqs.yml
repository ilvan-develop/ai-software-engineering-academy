name: Nightly BQS

on:
  schedule:
    - cron: "0 6 * * 6"  # todo sabado as 06:00 UTC
  workflow_dispatch:      # permitir execucao manual

jobs:
  bqs-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pyyaml jsonschema

      - name: Compute BQS for all modules and books
        run: python scripts/bqs_compute.py

      - name: Archive BQS report
        uses: actions/upload-artifact@v4
        with:
          name: bqs-report-weekly
          path: knowledge-factory/pipeline/reports/

      - name: Commit BQS CSV if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge-factory/products/metrics/modules.csv
          git diff --cached --quiet || git commit -m "chore: atualiza BQS metrics [skip ci]"
          git push
