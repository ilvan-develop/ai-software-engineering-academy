name: CI

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

on:
  pull_request:
    paths:
      - "curriculum/**"
      - "scripts/**"
      - "knowledge-factory/**"
      - "config/**"
      - "tests/**"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "curriculum/**"
      - "scripts/**"
      - "config/**"
      - ".github/workflows/**"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pyyaml jsonschema
          pip install -r requirements.txt 2>/dev/null || true

      - name: Ruff lint
        run: ruff check scripts/ tests/ --exit-zero 2>&1 || true

      - name: MyPy type check
        run: mypy --ignore-missing-imports scripts/ tests/ 2>&1 || true

      - name: Pytest
        run: python -m pytest tests/ -v --tb=short

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check links
        run: python scripts/link_checker.py || true

  bqs-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pyyaml jsonschema

      - name: Compute BQS for changed modules
        run: python scripts/bqs_compute.py || true

      - name: Archive BQS report
        uses: actions/upload-artifact@v4
        with:
          name: bqs-report
          path: knowledge-factory/pipeline/reports/
