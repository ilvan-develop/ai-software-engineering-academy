    label: "Desenvolvedores"
    description: "Profissionais que escrevem codigo"
  - id: architects
    label: "Arquitetos"
    description: "Profissionais que projetam sistemas"
  - id: designers
    label: "Designers"
    description: "Profissionais de UX/UI"
  - id: managers
    label: "Gestores"
