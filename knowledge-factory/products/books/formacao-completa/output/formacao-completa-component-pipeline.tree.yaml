- type: Code
  text: "import { trace } from '@opentelemetry/api';\n\nconst tracer = trace.getTracer('order-service');\n\
    \nclass OrderService {\n  async create(dto: CreateOrderDto): Promise<Order> {\n\
    \    return tracer.startActiveSpan('createOrder', async (span) => {\n      span.setAttribute('order.total',\
    \ dto.total);\n      span.setAttribute('order.items_count', dto.items.length);\n\
    \n      try {\n        const user = await this.validateUser(dto.userId);\n   \
    \     const order = await this.saveOrder(dto);\n        await this.processPayment(order);\n\
    \n        span.setStatus({ code: SpanStatusCode.OK });\n        return order;\n\
    \      } catch (error) {\n        span.setStatus({\n          code: SpanStatusCode.ERROR,\n\
    \          message: error.message,\n        });\n        throw error;\n      }\
    \ finally {\n        span.end();\n      }\n    });\n  }\n}"
