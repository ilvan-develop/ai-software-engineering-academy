  text: "Git Flow (projetos com releases versionadas):\n  main ──────┬──────────────────┬───────────\n\
    \             │  release/v1.0   │  hotfix\n  develop ───┼──────┬───────────┼────┬──────\n\
    \             │      │           │    │\n  feature/* ─┘──────┘           ┘────┘\n\
    \nTrunk-based (deploy contínuo):\n  main ──────┬─────┬─────┬─────┬─────┬────\n\
    \             │     │     │     │     │\n  branch  ───┘─────┘─────┘─────┘─────┘\n\
    \  (curta, horas/dias, não semanas)"
