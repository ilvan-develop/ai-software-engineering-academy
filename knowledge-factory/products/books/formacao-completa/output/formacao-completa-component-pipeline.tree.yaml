- type: Code
  text: "-- Criar schema para novo tenant\nCREATE SCHEMA IF NOT EXISTS tenant_acme;\n\
    \n-- Tabelas dentro do schema específico\nCREATE TABLE tenant_acme.users (\n \
    \ id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  name TEXT NOT NULL,\n  email\
    \ TEXT UNIQUE NOT NULL,\n  role TEXT NOT NULL DEFAULT 'member',\n  created_at\
    \ TIMESTAMPTZ DEFAULT NOW()\n);\n\nCREATE TABLE tenant_acme.orders (\n  id UUID\
    \ PRIMARY KEY DEFAULT gen_random_uuid(),\n  customer_id TEXT NOT NULL,\n  total\
    \ NUMERIC(10,2) NOT NULL,\n  status TEXT NOT NULL DEFAULT 'pending',\n  created_at\
    \ TIMESTAMPTZ DEFAULT NOW()\n);\n\n-- Query com schema dinâmico\nSELECT * FROM\
    \ tenant_acme.users WHERE email = 'joao@acme.com';"
  props:
    language: sql
  children: []
- type: Code
  text: "// Abstração para schema dinâmico\nclass SchemaTenantService {\n  constructor(private\
    \ tenantId: string) {}\n\n  getSchemaName(): string {\n    return `tenant_${this.tenantId}`;\n\
    \  }\n\n  async query<T = any>(sql: string, params?: any[]): Promise<T[]> {\n\
    \    const schema = this.getSchemaName();\n    // Substitui __SCHEMA__ pelo nome\
    \ real do schema\n    const finalSql = sql.replace(/__SCHEMA__/g, `\"${schema}\"\
    `);\n    const result = await pool.query(finalSql, params);\n    return result.rows;\n\
    \  }\n\n  async createTenantSchema(): Promise<void> {\n    const schema = this.getSchemaName();\n\
    \    await pool.query(`CREATE SCHEMA IF NOT EXISTS \"${schema}\"`);\n\n    //\
    \ Rodar migrations para este schema\n    for (const migration of MIGRATIONS) {\n\
    \      const sql = migration.sql.replace(/__SCHEMA__/g, `\"${schema}\"`);\n  \
    \    await pool.query(sql);\n    }\n  }\n}"
  props:
    language: typescript
  children: []
