- type: Code
  text: "generator client {\n  provider = \"prisma-client-js\"\n}\n\ndatasource db\
    \ {\n  provider = \"postgresql\"\n  url      = env(\"DATABASE_URL\")\n}\n\nenum\
    \ UserRole {\n  ADMIN\n  MANAGER\n  USER\n}\n\nenum OrderStatus {\n  PENDING\n\
    \  CONFIRMED\n  SHIPPED\n  DELIVERED\n  CANCELLED\n}\n\nmodel Tenant {\n  id \
    \       String   @id @default(cuid())\n  slug      String   @unique\n  name  \
    \    String\n  users     User[]\n  createdAt DateTime @default(now())\n\n  @@map(\"\
    tenants\")\n}\n\nmodel User {\n  id        String    @id @default(cuid())\n  email\
    \     String    @unique\n  name      String\n  password  String\n  role      UserRole\
    \  @default(USER)\n  tenantId  String\n  tenant    Tenant    @relation(fields:\
    \ [tenantId], references: [id])\n  orders    Order[]\n  createdAt DateTime  @default(now())\n\
    \  updatedAt DateTime  @updatedAt\n  deletedAt DateTime?\n\n  @@index([tenantId])\n\
    \  @@index([email])\n  @@index([tenantId, role])\n  @@map(\"users\")\n}\n\nmodel\
    \ Product {\n  id          String   @id @default(cuid())\n  sku         String\
    \   @unique\n  name        String\n  description String?\n  price       Decimal\
    \  @db.Decimal(10, 2)\n  stock       Int      @default(0)\n  active      Boolean\
    \  @default(true)\n  tenantId    String\n  orderItems  OrderItem[]\n  createdAt\
    \   DateTime @default(now())\n  updatedAt   DateTime @updatedAt\n  deletedAt \
    \  DateTime?\n\n  @@index([tenantId])\n  @@index([sku])\n  @@index([active])\n\
    \  @@map(\"products\")\n}\n\nmodel Order {\n  id         String      @id @default(cuid())\n\
    \  total      Decimal     @db.Decimal(10, 2)\n  status     OrderStatus @default(PENDING)\n\
    \  userId     String\n  user       User        @relation(fields: [userId], references:\
    \ [id])\n  items      OrderItem[]\n  createdAt  DateTime    @default(now())\n\
    \  updatedAt  DateTime    @updatedAt\n\n  @@index([userId])\n  @@index([status])\n\
    \  @@index([createdAt])\n  @@map(\"orders\")\n}\n\nmodel OrderItem {\n  id   \
    \     String  @id @default(cuid())\n  orderId   String\n  order     Order   @relation(fields:\
    \ [orderId], references: [id])\n  productId String\n  product   Product @relation(fields:\
    \ [productId], references: [id])\n  quantity  Int\n  price     Decimal @db.Decimal(10,\
    \ 2)\n\n  @@index([orderId])\n  @@index([productId])\n  @@map(\"order_items\"\
    )\n}\n\nmodel AuditLog {\n  id        String   @id @default(cuid())\n  entity\
    \    String\n  entityId  String\n  action    String\n  changes   Json?\n  userId\
    \    String?\n  ip        String?\n  createdAt DateTime @default(now())\n\n  @@index([entity,\
    \ entityId])\n  @@index([userId])\n  @@index([createdAt])\n  @@map(\"audit_logs\"\
    )\n}"
  props:
    language: prisma
  children: []
