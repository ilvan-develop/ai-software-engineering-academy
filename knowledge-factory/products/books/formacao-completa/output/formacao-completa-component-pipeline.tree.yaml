- type: Code
  text: "1. Código é implementado pelos agentes especializados\n2. QA Agent executa\
    \ testes\n3. Auditor Agent executa 16 auditorias\n4. Relatório consolidado com\
    \ score geral\n5. Riscos Blocker/Critical são atribuídos aos agentes corretivos\n\
    6. Agentes corrigem e re-audita\n7. Score mínimo é atingido → deploy autorizado\n\
    \n\n\n\n# Automação do Ciclo de Desenvolvimento\n\n# Módulo 20 — Automação\n\n\
    **Duração estimada:** 5 dias (~40h)  \n**Público-alvo:** Desenvolvedores brasileiros\
    \ em transição para cargos seniores/tech lead  \n**Pré-requisitos:** Conhecimento\
    \ básico de Git, terminal Linux, conceitos de deploy\n\n---\n\n## 1. O que é Automação\n\
    \nAutomação é a substituição de processos manuais repetitivos por scripts, pipelines\
    \ e ferramentas que executam essas tarefas de forma confiável, auditável e escalável.\n\
    \n### Por que automatizar?\n\n| Motivo | Impacto |\n|--------|---------|\n| Reduzir\
    \ erro humano | O maior causador de incidentes em produção ainda é o operador\
    \ humano |\n| Velocidade | Máquinas executam em segundos o que levaria horas manualmente\
    \ |\n| Reprodutibilidade | O mesmo pipeline executa exatamente da mesma forma\
    \ todas as vezes |\n| Auditoria | Logs e artefatos gerados automaticamente servem\
    \ como evidência |\n| Escala | O que funciona para 1 deploy falha para 100 deploys\
    \ manuais |\n\n### Onde automatizar\n\n- Build e compilação\n- Testes (unitários,\
    \ integração, e2e)\n- Linting e formatação de código\n- Verificação de segurança\n\
    - Deploy em ambientes\n- Migrações de banco de dados\n- Geração de changelog e\
    \ release\n- Monitoramento e alertas\n- Criação e destruição de ambientes\n\n\
    ### Custo vs Benefício\n\nA regra prática: **automatize tudo que for executado\
    \ mais de 2 vezes.**\n"
  props:
    language: text
  children: []
- type: Paragraph
  text: Custo de automatizar = (tempo para criar + tempo para manter) × custo-hora
    Benefício = (tempo economizado por execução × frequência × horizonte) - custo
    ```
