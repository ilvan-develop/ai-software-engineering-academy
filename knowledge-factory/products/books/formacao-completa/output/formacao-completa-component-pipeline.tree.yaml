- type: Subsection
  text: Princípios de governança leve
  props:
    level: 3
  children:
  - type: Text
    text: Princípios de governança leve
    props: {}
    children: []
- type: Code
  text: "1. Automatize antes de burocratizar\n   → Code review manual é caro; lint/pre-commit\
    \ é grátis\n   → Se pode ser automatizado, automatize\n\n2. Comece pequeno, evolua\n\
    \   → Não implemente 12 processos de uma vez\n   → Comece com code review + lint,\
    \ depois adicione ADRs, depois SLAs\n\n3. Documente o \"porquê\"\n   → Regras\
    \ sem contexto viram burocracia\n   → \"Não commitamos segredos porque [história\
    \ real de vazamento]\"\n\n4. Revise periodicamente\n   → Regras que não fazem\
    \ mais sentido devem ser removidas\n   → Governança é viva, não esculpida em pedra\n\
    \n5. Liderança pelo exemplo\n   → Tech lead e seniors seguem as regras PRIMEIRO\n\
    \   → Ninguém está acima das políticas"
  props:
    language: text
  children: []
- type: Subsection
  text: Cultura de qualidade
  props:
    level: 3
  children:
  - type: Text
    text: Cultura de qualidade
    props: {}
    children: []
- type: Code
  text: "Como construir:\n\n  → Code review é ensinamento, não portaria\n    - \"\
    Que legal essa solução! Que tal testar o caso X também?\"\n    - Não: \"Faltou\
    \ teste. Aprovação negada.\"\n\n  → Erro é aprendizado, não punição\n    - Post-mortem\
    \ sem blame\n    - \"O que podemos melhorar no processo?\"\n\n  → Qualidade é\
    \ responsabilidade de todos\n    - QA não é \"dono da qualidade\"\n    - Todo\
    \ dev escreve teste, todo dev faz review\n\n  → Celebrar vitórias de governança\n\
    \    - \"Reduzimos MTTR em 40% esse trimestre!\"\n    - \"Zero incidentes de segurança\
    \ em 6 meses!\""
  props:
    language: text
  children: []
- type: Subsection
  text: Métricas de saúde da governança
  props:
    level: 3
  children:
  - type: Text
    text: Métricas de saúde da governança
    props: {}
    children: []
- type: Code
  text: "Métrica                | Como medir                        | Alvo\n----------------------|-----------------------------------|-------------------\n\
    Tempo de code review  | Tempo entre PR e primeiro review  | < 4h úteis\nCoverage\
    \ de ADRs      | Decisões com ADR / total decisões | > 80%\nDependency drift \
    \     | Dependências >30 dias atrasadas   | < 5%\nTempo de deploy       | Do merge\
    \ ao deploy em produção    | < 30min\nTaxa de rollback      | Rollbacks / total\
    \ deploys         | < 2%\nIncidentes de segredo | Segredos vazados / mês     \
    \       | 0\n\nFerramentas de medição:\n  → GitHub Insights / GitLab Analytics\n\
    \  → Dependabot / Renovate dashboard\n  → Datadog / Grafana para SLOs\n  → Ferramenta\
    \ de ADR (adr-tools, madr, GitHub wiki)"
  props:
    language: text
  children: []
