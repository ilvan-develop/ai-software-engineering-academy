  text: "// Utilitário de contraste\nfunction isAccessible(foreground: string, background:\
    \ string, level: 'AA' | 'AAA' = 'AA'): boolean {\n  const ratio = getContrastRatio(foreground,\
    \ background); // implementação do módulo 04\n  const threshold = level === 'AA'\
    \ ? 4.5 : 7;\n  return ratio >= threshold;\n}\n\n// Uso na validação do tema\n\
    const theme = {\n  textPrimary: '#202124',\n  bgPrimary: '#FFFFFF',\n};\n\nconsole.log(isAccessible(theme.textPrimary,\
    \ theme.bgPrimary)); // true"
