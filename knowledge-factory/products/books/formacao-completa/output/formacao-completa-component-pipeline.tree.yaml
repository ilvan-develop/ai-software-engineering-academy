- type: Paragraph
  text: '**Database per Tenant:** Cada tenant tem pool isolado. Um tenant com queries
    pesadas (JOINs complexos, full scans) **não degrada** os outros. Ideal para clientes
    Enterprise com workloads imprevisíveis.'
  props: {}
  children:
  - type: Bold
    text: 'Database per Tenant:'
    props: {}
    children: []
  - type: Text
    text: ' Cada tenant tem pool isolado. Um tenant com queries pesadas (JOINs complexos,
      full scans) '
    props: {}
    children: []
  - type: Bold
    text: não degrada
    props: {}
    children: []
  - type: Text
    text: ' os outros. Ideal para clientes Enterprise com workloads imprevisíveis.'
    props: {}
    children: []
- type: Paragraph
  text: '**Schema per Tenant:** Pool compartilhado. Uma query `SELECT * FROM tenant_big.orders
    ORDER BY total DESC` pode consumir CPU e I/O, afetando os schemas `tenant_a` e
    `tenant_c`. Soluções: - Statement timeout (`SET statement_timeout = ''30s''`)
    - `pg_terminate_backend` para queries runaway - Resource queues (Citus, Yugabyte)'
  props: {}
  children:
  - type: Bold
    text: 'Schema per Tenant:'
    props: {}
    children: []
  - type: Text
    text: ' Pool compartilhado. Uma query '
    props: {}
    children: []
  - type: InlineCode
    text: SELECT * FROM tenant_big.orders ORDER BY total DESC
    props: {}
    children: []
  - type: Text
    text: ' pode consumir CPU e I/O, afetando os schemas '
    props: {}
    children: []
  - type: InlineCode
    text: tenant_a
    props: {}
    children: []
  - type: Text
    text: ' e '
    props: {}
    children: []
  - type: InlineCode
    text: tenant_c
    props: {}
    children: []
  - type: Text
    text: '. Soluções: - Statement timeout ('
    props: {}
    children: []
  - type: InlineCode
    text: SET statement_timeout = '30s'
    props: {}
    children: []
  - type: Text
    text: ') - '
    props: {}
    children: []
  - type: InlineCode
    text: pg_terminate_backend
    props: {}
    children: []
  - type: Text
    text: ' para queries runaway - Resource queues (Citus, Yugabyte)'
    props: {}
    children: []
- type: Paragraph
  text: '**Shared Database:** Todos competem pelo mesmo pool e índices. Queries de
    um tenant afetam todos. Necessário: - Rate limiting por tenant - `pg_stat_statements`
    para monitorar queries pesadas - Índices parciais por tenant (se houver padrões
    distintos)'
  props: {}
  children:
  - type: Bold
    text: 'Shared Database:'
    props: {}
    children: []
  - type: Text
    text: ' Todos competem pelo mesmo pool e índices. Queries de um tenant afetam
      todos. Necessário: - Rate limiting por tenant - '
    props: {}
    children: []
  - type: InlineCode
    text: pg_stat_statements
    props: {}
    children: []
  - type: Text
    text: ' para monitorar queries pesadas - Índices parciais por tenant (se houver
      padrões distintos)'
    props: {}
    children: []
