- type: Code
  text: "import { Counter, Histogram, Gauge } from 'prom-client';\n\n// Métricas\n\
    export const httpRequestsTotal = new Counter({\n  name: 'http_requests_total',\n\
    \  help: 'Total de requisições HTTP',\n  labelNames: ['method', 'path', 'status'],\n\
    });\n\nexport const httpRequestDuration = new Histogram({\n  name: 'http_request_duration_seconds',\n\
    \  help: 'Duração das requisições HTTP',\n  labelNames: ['method', 'path'],\n\
    \  buckets: [0.01, 0.05, 0.1, 0.5, 1, 2, 5],\n});\n\nexport const dbQueryDuration\
    \ = new Histogram({\n  name: 'db_query_duration_seconds',\n  help: 'Duração de\
    \ queries no banco',\n  labelNames: ['operation', 'table'],\n  buckets: [0.001,\
    \ 0.005, 0.01, 0.05, 0.1, 0.5, 1],\n});\n\nexport const activeConnections = new\
    \ Gauge({\n  name: 'http_connections_active',\n  help: 'Conexões HTTP ativas',\n\
    });\n\n// Middleware para capturar métricas\n@Injectable()\nexport class MetricsInterceptor\
    \ implements NestInterceptor {\n  intercept(context: ExecutionContext, next: CallHandler):\
    \ Observable<any> {\n    const request = context.switchToHttp().getRequest();\n\
    \    const { method, path } = request;\n    const start = Date.now();\n\n    activeConnections.inc();\n\
    \n    return next.handle().pipe(\n      tap(() => {\n        const duration =\
    \ (Date.now() - start) / 1000;\n        const response = context.switchToHttp().getResponse();\n\
    \        const status = response.statusCode.toString();\n\n        httpRequestsTotal.labels(method,\
    \ path, status).inc();\n        httpRequestDuration.labels(method, path).observe(duration);\n\
    \        activeConnections.dec();\n      }),\n    );\n  }\n}"
  props:
    language: typescript
  children: []
