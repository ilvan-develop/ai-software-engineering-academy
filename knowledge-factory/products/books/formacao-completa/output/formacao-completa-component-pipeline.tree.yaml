- type: Code
  text: "Estratégia de versionamento:\n─────────────────────────────\n\nFigma:\n \
    \ - Branching: crie branches para variações\n  - Version history: Figma salva\
    \ automaticamente\n  - Nomeie versões: \"v1.0 - Aprovado PO\", \"v1.1 - Revisão\
    \ dev\"\n\nArquivos:\n  wireframe-tela-login-v1.0.fig\n  wireframe-tela-login-v1.1.fig\n\
    \  wireframe-tela-login-v2.0.fig\n\nConvenção: {componente}-{tela}-v{major}.{minor}.{tipo}\n\
    \nBoas práticas:\n  ├── Congele versões aprovadas (não mexa)\n  ├── Versão major\
    \ = mudança estrutural\n  ├── Versão minor = ajuste de layout\n  └── Mantenha\
    \ changelog por versão"
  props:
    language: text
  children: []
