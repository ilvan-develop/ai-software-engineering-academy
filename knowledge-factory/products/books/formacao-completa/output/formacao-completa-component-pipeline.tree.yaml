- type: Code
  text: "## Setup\n\n1. Defina as tarefas que o usuário deve executar\n2. Prepare\
    \ o protótipo (papel, figma, código)\n3. Configure gravação (tela + áudio + câmera)\n\
    4. Prepare o roteiro de moderação\n\n## Roteiro (20-30 min)\n\n1. Aquecimento\
    \ (3 min):\n   - \"Conte um pouco sobre você\"\n   - \"O que você entende que\
    \ esse sistema faz?\"\n\n2. Tarefas (15 min):\n   - \"Você quer comprar um presente\
    \ para sua mãe. Como faria?\"\n   - \"Você percebeu que o endereço está errado.\
    \ Como corrige?\"\n   - \"Quanto custou seu último pedido?\"\n\n3. Exploração\
    \ livre (5 min):\n   - \"Navegue à vontade e me diga o que está pensando\"\n\n\
    4. Fechamento (5 min):\n   - \"O que mais gostou? O que menos gostou?\"\n   -\
    \ \"Se pudesse mudar uma coisa, o que seria?\"\n\n## O que observar\n\n✓ O usuário\
    \ conseguiu completar a tarefa?\n✓ Quanto tempo levou?\n✓ Onde ele hesitou?\n\
    ✓ Onde ele errou?\n✓ O que ele verbalizou? (pensar em voz alta)\n✓ Expressões\
    \ faciais e linguagem corporal\n\n## Erro comum: explicar o protótipo\n\n❌ Moderador:\
    \ \"Aqui você clica nesse botão e abre um modal...\"\n✅ Moderador: \"O que você\
    \ faria agora?\""
  props:
    language: markdown
  children: []
