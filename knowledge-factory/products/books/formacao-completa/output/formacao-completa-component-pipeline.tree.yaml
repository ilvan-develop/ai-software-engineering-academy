- type: Code
  text: "// components/Button/Button.tsx\nimport { ButtonHTMLAttributes, forwardRef\
    \ } from 'react';\n\ntype ButtonVariant = 'primary' | 'secondary' | 'outline'\
    \ | 'ghost' | 'danger';\ntype ButtonSize = 'sm' | 'md' | 'lg';\n\ninterface ButtonProps\
    \ extends ButtonHTMLAttributes<HTMLButtonElement> {\n  variant?: ButtonVariant;\n\
    \  size?: ButtonSize;\n  loading?: boolean;\n  fullWidth?: boolean;\n  leftIcon?:\
    \ React.ReactNode;\n  rightIcon?: React.ReactNode;\n}\n\nconst variantStyles:\
    \ Record<ButtonVariant, string> = {\n  primary:   'bg-[var(--color-primary-600)]\
    \ text-white hover:bg-[var(--color-primary-700)] focus:ring-[var(--color-primary-500)]',\n\
    \  secondary: 'bg-gray-100 text-gray-900 hover:bg-gray-200 focus:ring-gray-500',\n\
    \  outline:   'border border-gray-300 text-gray-700 hover:bg-gray-50 focus:ring-[var(--color-primary-500)]',\n\
    \  ghost:     'text-gray-600 hover:bg-gray-100 focus:ring-gray-500',\n  danger:\
    \    'bg-[var(--color-semantic-error)] text-white hover:bg-red-700 focus:ring-red-500',\n\
    };\n\nconst sizeStyles: Record<ButtonSize, string> = {\n  sm: 'px-3 py-1.5 text-sm\
    \ gap-1.5',\n  md: 'px-4 py-2 text-sm gap-2',\n  lg: 'px-6 py-3 text-base gap-2',\n\
    };\n\nexport const Button = forwardRef<HTMLButtonElement, ButtonProps>(\n  ({\
    \ variant = 'primary', size = 'md', loading, fullWidth, leftIcon, rightIcon, children,\
    \ disabled, className, ...props }, ref) => {\n    return (\n      <button\n  \
    \      ref={ref}\n        disabled={disabled || loading}\n        className={`\n\
    \          inline-flex items-center justify-center font-medium rounded-[var(--radius-md)]\n\
    \          transition-all duration-150\n          focus:outline-none focus:ring-2\
    \ focus:ring-offset-2\n          disabled:opacity-50 disabled:cursor-not-allowed\n\
    \          ${variantStyles[variant]}\n          ${sizeStyles[size]}\n        \
    \  ${fullWidth ? 'w-full' : ''}\n          ${className ?? ''}\n        `.trim()}\n\
    \        {...props}\n      >\n        {loading ? <Spinner /> : leftIcon}\n   \
    \     {children}\n        {rightIcon}\n      </button>\n    );\n  }\n);"
  props:
    language: typescript
  children: []
