- type: Code
  text: "// schema.prisma — modelo base\ngenerator client {\n  provider = \"prisma-client-js\"\
    \n}\n\ndatasource db {\n  provider = \"postgresql\"\n  url      = env(\"DATABASE_URL\"\
    )\n}\n\n// Modelo compartilhado (global)\nmodel Tenant {\n  id        String \
    \  @id @default(uuid())\n  slug      String   @unique\n  name      String\n  plan\
    \      String   @default(\"free\")\n  active    Boolean  @default(true)\n  createdAt\
    \ DateTime @default(now()) @map(\"created_at\")\n  @@map(\"tenants\")\n}\n\n//\
    \ Modelos por tenant (Prisma não suporta schema dinâmico nativamente)\n// Solução:\
    \ Client per tenant\nmodel User {\n  id        String   @id @default(uuid())\n\
    \  name      String\n  email     String   @unique\n  role      String   @default(\"\
    member\")\n  createdAt DateTime @default(now()) @map(\"created_at\")\n  @@map(\"\
    users\")\n}\n\nmodel Project {\n  id        String   @id @default(uuid())\n  name\
    \      String\n  createdAt DateTime @default(now()) @map(\"created_at\")\n  @@map(\"\
    projects\")\n}"
  props:
    language: prisma
  children: []
- type: Code
  text: "// prisma-multi-tenant.ts\nimport { PrismaClient } from '@prisma/client';\n\
    \nclass PrismaTenantManager {\n  private clients = new Map<string, PrismaClient>();\n\
    \n  getClient(schema: string): PrismaClient {\n    if (!this.clients.has(schema))\
    \ {\n      const url = new URL(process.env.DATABASE_URL!);\n      url.searchParams.set('schema',\
    \ schema);\n\n      const client = new PrismaClient({\n        datasources: {\n\
    \          db: { url: url.toString() },\n        },\n      });\n\n      this.clients.set(schema,\
    \ client);\n    }\n    return this.clients.get(schema)!;\n  }\n\n  async closeAll():\
    \ Promise<void> {\n    for (const [schema, client] of this.clients) {\n      await\
    \ client.$disconnect();\n    }\n  }\n}\n\nexport const prismaTenantManager = new\
    \ PrismaTenantManager();"
  props:
    language: typescript
  children: []
