- type: Code
  text: "// Extração simples e direta\nimport { Request } from 'express';\n\nconst\
    \ TENANT_HEADER = 'x-tenant-id';\n\nfunction extractTenantFromHeader(req: Request):\
    \ string | undefined {\n  const tenantId = req.headers[TENANT_HEADER];\n  if (Array.isArray(tenantId))\
    \ return tenantId[0];\n  return tenantId;\n}\n\n// Com validação de formato (slug)\n\
    const TENANT_SLUG_REGEX = /^[a-z0-9-]{3,50}$/;\n\nfunction validateTenantSlug(slug:\
    \ string): boolean {\n  return TENANT_SLUG_REGEX.test(slug);\n}"
  props:
    language: typescript
  children: []
