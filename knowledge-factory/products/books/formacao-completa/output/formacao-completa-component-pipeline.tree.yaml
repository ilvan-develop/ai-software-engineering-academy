- type: Code
  text: "// components/Table/Table.tsx\ninterface Column<T> {\n  key: string;\n  header:\
    \ string;\n  render: (item: T) => React.ReactNode;\n  sortable?: boolean;\n  width?:\
    \ string;\n  align?: 'left' | 'center' | 'right';\n}\n\ninterface TableProps<T>\
    \ {\n  columns: Column<T>[];\n  data: T[];\n  loading?: boolean;\n  emptyMessage?:\
    \ string;\n  onRowClick?: (item: T) => void;\n  sortable?: boolean;\n}\n\nexport\
    \ function Table<T extends Record<string, unknown>>({\n  columns, data, loading,\
    \ emptyMessage = 'Nenhum registro encontrado',\n  onRowClick, sortable,\n}: TableProps<T>)\
    \ {\n  const [sortKey, setSortKey] = useState<string | null>(null);\n  const [sortDir,\
    \ setSortDir] = useState<'asc' | 'desc'>('asc');\n\n  const sorted = useMemo(()\
    \ => {\n    if (!sortKey) return data;\n    return [...data].sort((a, b) => {\n\
    \      const aVal = a[sortKey];\n      const bVal = b[sortKey];\n      if (aVal\
    \ < bVal) return sortDir === 'asc' ? -1 : 1;\n      if (aVal > bVal) return sortDir\
    \ === 'asc' ? 1 : -1;\n      return 0;\n    });\n  }, [data, sortKey, sortDir]);\n\
    \n  const handleSort = (key: string) => {\n    if (sortKey === key) {\n      setSortDir(d\
    \ => d === 'asc' ? 'desc' : 'asc');\n    } else {\n      setSortKey(key);\n  \
    \    setSortDir('asc');\n    }\n  };\n\n  return (\n    <div className=\"overflow-x-auto\
    \ border border-gray-200 rounded-[var(--radius-lg)]\">\n      <table className=\"\
    w-full text-sm\">\n        <thead>\n          <tr className=\"bg-gray-50 border-b\
    \ border-gray-200\">\n            {columns.map(col => (\n              <th\n \
    \               key={col.key}\n                className={`px-4 py-3 font-medium\
    \ text-gray-600 text-${col.align || 'left'} ${col.width ?? ''}`}\n           \
    \   >\n                {col.sortable && sortable !== false ? (\n             \
    \     <button className=\"flex items-center gap-1 hover:text-gray-900\" onClick={()\
    \ => handleSort(col.key)}>\n                    {col.header}\n               \
    \     {sortKey === col.key && (\n                      <span className=\"text-xs\"\
    >{sortDir === 'asc' ? '▲' : '▼'}</span>\n                    )}\n            \
    \      </button>\n                ) : col.header}\n              </th>\n     \
    \       ))}\n          </tr>\n        </thead>\n        <tbody>\n          {loading\
    \ ? (\n            Array.from({ length: 3 }).map((_, i) => (\n              <tr\
    \ key={i} className=\"animate-pulse\">\n                {columns.map(col => (\n\
    \                  <td key={col.key} className=\"px-4 py-3\">\n              \
    \      <div className=\"h-4 bg-gray-200 rounded w-3/4\" />\n                 \
    \ </td>\n                ))}\n              </tr>\n            ))\n          )\
    \ : sorted.length === 0 ? (\n            <tr>\n              <td colSpan={columns.length}\
    \ className=\"px-4 py-8 text-center text-gray-500\">\n                {emptyMessage}\n\
    \              </td>\n            </tr>\n          ) : (\n            sorted.map((item,\
    \ i) => (\n              <tr\n                key={i}\n                className={`border-b\
    \ border-gray-100 last:border-0 hover:bg-gray-50 transition-colors ${onRowClick\
    \ ? 'cursor-pointer' : ''}`}\n                onClick={() => onRowClick?.(item)}\n\
    \              >\n                {columns.map(col => (\n                  <td\
    \ key={col.key} className={`px-4 py-3 text-${col.align || 'left'}`}>\n       \
    \             {col.render(item)}\n                  </td>\n                ))}\n\
    \              </tr>\n            ))\n          )}\n        </tbody>\n      </table>\n\
    \    </div>\n  );\n}"
  props:
    language: typescript
  children: []
