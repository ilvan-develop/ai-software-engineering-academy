- type: Code
  text: "SLI (Service Level Indicator): métrica técnica\n  → Latência p99 < 200ms\n\
    \  → Error rate < 0.1%\n  → Uptime > 99.9%\n\nSLO (Service Level Objective): meta\
    \ baseada no SLI\n  → \"Vamos entregar p99 < 200ms em 95% do tempo no mês\"\n\n\
    SLA (Service Level Agreement): compromisso formal com o cliente\n  → \"Se uptime\
    \ < 99.9%, cliente recebe 10% de crédito\""
