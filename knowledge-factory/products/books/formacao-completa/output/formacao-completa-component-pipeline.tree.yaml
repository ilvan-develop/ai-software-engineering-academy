- type: Code
  text: "interface WireframeChangelog {\n  version: string;\n  date: string;\n  author:\
    \ string;\n  changes: string[];\n  reason: string;\n}\n\nconst changelog: WireframeChangelog[]\
    \ = [\n  {\n    version: '1.0',\n    date: '2025-06-01',\n    author: 'Maria Silva',\n\
    \    changes: ['Criação inicial do wireframe'],\n    reason: 'Primeira versão\
    \ para alinhamento com PO',\n  },\n  {\n    version: '1.1',\n    date: '2025-06-03',\n\
    \    author: 'Maria Silva',\n    changes: [\n      'Adicionado campo de busca\
    \ no header',\n      'Reduzido hero de 800px para 600px',\n    ],\n    reason:\
    \ 'Feedback do PO: buscar é prioridade',\n  },\n  {\n    version: '2.0',\n   \
    \ date: '2025-06-10',\n    author: 'Carlos Lima',\n    changes: [\n      'Reestruturado\
    \ layout para sidebar + content',\n      'Adicionada seção de relatórios',\n \
    \     'Removido carrossel do hero',\n    ],\n    reason: 'Mudança de escopo: nova\
    \ feature de relatórios',\n  },\n];\n\n\n\n\n# UI Design\n\n# Módulo 06 — UI Design\n\
    \n**Transformar wireframes em interfaces funcionais, acessíveis e visualmente\
    \ consistentes.**\n\n---\n\n## 1. O que é UI Design\n\nUI (User Interface) Design\
    \ é a disciplina responsável pela **aparência e comportamento visual** de um produto\
    \ digital. Enquanto UX define a estrutura e a experiência, UI traduz essa estrutura\
    \ em pixels — cores, tipografia, espaçamento, componentes e animações.\n\n###\
    \ UI ≠ UX\n"
  props:
    language: typescript
  children: []
