- type: Code
  text: "// pool-manager.ts\nimport { Pool } from 'pg';\n\ninterface PoolConfig {\n\
    \  max: number;\n  idleTimeoutMillis: number;\n  connectionTimeoutMillis: number;\n\
    }\n\nconst PLAN_POOL_LIMITS: Record<string, number> = {\n  free: 2,\n  pro: 10,\n\
    \  enterprise: 25,\n};\n\nclass PoolManager {\n  private pools = new Map<string,\
    \ { pool: Pool; lastUsed: number; config: PoolConfig }>();\n\n  getPool(tenantId:\
    \ string, plan: string = 'free'): Pool {\n    const existing = this.pools.get(tenantId);\n\
    \    if (existing) {\n      existing.lastUsed = Date.now();\n      return existing.pool;\n\
    \    }\n\n    const config: PoolConfig = {\n      max: PLAN_POOL_LIMITS[plan]\
    \ || 5,\n      idleTimeoutMillis: 30000,\n      connectionTimeoutMillis: 5000,\n\
    \    };\n\n    const pool = new Pool({\n      connectionString: this.getTenantDbUrl(tenantId),\n\
    \      ...config,\n    });\n\n    pool.on('error', (err) => {\n      console.error(`Pool\
    \ error for tenant ${tenantId}:`, err);\n      this.pools.delete(tenantId);\n\
    \    });\n\n    this.pools.set(tenantId, { pool, lastUsed: Date.now(), config\
    \ });\n    return pool;\n  }\n\n  private getTenantDbUrl(tenantId: string): string\
    \ {\n    // Em schema per tenant: mesma URL\n    // Em DB per tenant: URL diferente\
    \ por tenant\n    return process.env.DATABASE_URL!;\n  }\n\n  async closeIdlePools(maxIdleMs:\
    \ number = 300000): Promise<void> {\n    const now = Date.now();\n    for (const\
    \ [id, entry] of this.pools) {\n      if (now - entry.lastUsed > maxIdleMs) {\n\
    \        await entry.pool.end();\n        this.pools.delete(id);\n        console.log(`Pool\
    \ do tenant ${id} fechado por inatividade`);\n      }\n    }\n  }\n\n  async closeAll():\
    \ Promise<void> {\n    for (const [id, entry] of this.pools) {\n      await entry.pool.end();\n\
    \    }\n    this.pools.clear();\n  }\n\n  getStats(): Record<string, { totalCount:\
    \ number; idleCount: number; waitingCount: number }> {\n    const stats: any =\
    \ {};\n    for (const [id, entry] of this.pools) {\n      stats[id] = {\n    \
    \    totalCount: entry.pool.totalCount,\n        idleCount: entry.pool.idleCount,\n\
    \        waitingCount: entry.pool.waitingCount,\n      };\n    }\n    return stats;\n\
    \  }\n}\n\nexport const poolManager = new PoolManager();"
  props:
    language: typescript
  children: []
