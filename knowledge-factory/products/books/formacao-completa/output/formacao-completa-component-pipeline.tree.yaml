- type: Code
  text: "// ❌ N+1 — busca em loop\nconst orders = await prisma.order.findMany();\n\
    for (const order of orders) {\n  const items = await prisma.orderItem.findMany({\n\
    \    where: { orderId: order.id },\n  });\n}\n\n// ✅ Eager loading — busca tudo\
    \ de uma vez\nconst orders = await prisma.order.findMany({\n  include: {\n   \
    \ items: true,\n    user: true,\n  },\n});"
