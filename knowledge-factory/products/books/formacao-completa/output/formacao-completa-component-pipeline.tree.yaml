- type: Code
  text: "// store/cart.ts\nimport { create } from 'zustand';\n\ninterface CartItem\
    \ {\n  id: string;\n  name: string;\n  price: number;\n  quantity: number;\n}\n\
    \ninterface CartStore {\n  items: CartItem[];\n  addItem: (item: CartItem) =>\
    \ void;\n  removeItem: (id: string) => void;\n  clearCart: () => void;\n  total:\
    \ () => number;\n}\n\nexport const useCartStore = create<CartStore>((set, get)\
    \ => ({\n  items: [],\n\n  addItem: (item) => set(state => {\n    const existing\
    \ = state.items.find(i => i.id === item.id);\n    if (existing) {\n      return\
    \ {\n        items: state.items.map(i =>\n          i.id === item.id ? { ...i,\
    \ quantity: i.quantity + 1 } : i\n        ),\n      };\n    }\n    return { items:\
    \ [...state.items, item] };\n  }),\n\n  removeItem: (id) => set(state => ({\n\
    \    items: state.items.filter(i => i.id !== id),\n  })),\n\n  clearCart: () =>\
    \ set({ items: [] }),\n\n  total: () => get().items.reduce((acc, i) => acc + i.price\
    \ * i.quantity, 0),\n}));\n\n// Uso\nfunction CartBadge() {\n  const items = useCartStore(state\
    \ => state.items);\n  return <span>{items.length}</span>;\n}\n\nfunction AddToCartButton({\
    \ product }: { product: Product }) {\n  const addItem = useCartStore(state =>\
    \ state.addItem);\n  return (\n    <button onClick={() => addItem({\n      id:\
    \ product.id,\n      name: product.name,\n      price: product.price,\n      quantity:\
    \ 1,\n    })}>\n      Adicionar\n    </button>\n  );\n}\n\nfunction CartTotal()\
    \ {\n  const total = useCartStore(state => state.total());\n  return <span>Total:\
    \ R$ {total.toFixed(2)}</span>;\n}"
