- type: Code
  text: "// 1:1\nmodel User {\n  id      String  @id @default(cuid())\n  email   String\
    \  @unique\n  profile Profile?\n}\n\nmodel Profile {\n  id        String @id @default(cuid())\n\
    \  fullName  String\n  avatarUrl String?\n  userId    String @unique\n  user \
    \     User   @relation(fields: [userId], references: [id])\n}\n\n// 1:N\nmodel\
    \ Order {\n  id       String    @id @default(cuid())\n  total    Decimal\n  userId\
    \   String\n  user     User      @relation(fields: [userId], references: [id])\n\
    \  items    OrderItem[]\n  createdAt DateTime @default(now())\n}\n\nmodel OrderItem\
    \ {\n  id        String  @id @default(cuid())\n  orderId   String\n  order   \
    \  Order   @relation(fields: [orderId], references: [id])\n  productId String\n\
    \  product   Product @relation(fields: [productId], references: [id])\n  quantity\
    \  Int\n  price     Decimal\n}\n\n// N:M\nmodel Product {\n  id           String\
    \          @id @default(cuid())\n  name         String\n  categories   ProductCategory[]\n\
    }\n\nmodel Category {\n  id       String          @id @default(cuid())\n  name\
    \     String\n  products ProductCategory[]\n}\n\nmodel ProductCategory {\n  productId\
    \  String\n  categoryId String\n  product    Product  @relation(fields: [productId],\
    \ references: [id])\n  category   Category @relation(fields: [categoryId], references:\
    \ [id])\n\n  @@id([productId, categoryId])\n}"
  props:
    language: prisma
  children: []
