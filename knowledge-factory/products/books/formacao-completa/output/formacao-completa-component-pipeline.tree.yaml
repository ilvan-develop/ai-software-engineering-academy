    \  status     OrderStatus\n  total      Decimal\n  createdAt  DateTime @default(now())\n\
    \n  // Índice para busca por usuário (foreign key)\n  @@index([userId])\n\n  //\
    \ Índice composto para filtro comum\n  @@index([userId, status])\n\n  // Índice\
    \ para ordenação por data\n  @@index([createdAt])\n\n  // Índice parcial para\
    \ pedidos ativos\n  @@index([status, createdAt])\n}"
