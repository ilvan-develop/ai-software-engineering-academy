- type: Code
  text: "// tenant.middleware.ts\nimport { Injectable, NestMiddleware, UnauthorizedException\
    \ } from '@nestjs/common';\nimport { Request, Response, NextFunction } from 'express';\n\
    import * as jwt from 'jsonwebtoken';\n\ninterface TenantInfo {\n  id: string;\n\
    \  name: string;\n  plan: 'free' | 'pro' | 'enterprise';\n  active: boolean;\n\
    }\n\n@Injectable()\nexport class TenantMiddleware implements NestMiddleware {\n\
    \  constructor() {\n    // Em produção, carregar de um cache (Redis) ou banco\n\
    \    this.loadTenants();\n  }\n\n  private tenants = new Map<string, TenantInfo>();\n\
    \n  private loadTenants() {\n    this.tenants.set('acme', {\n      id: 'acme',\
    \ name: 'Acme Inc.', plan: 'enterprise', active: true,\n    });\n    this.tenants.set('zeta',\
    \ {\n      id: 'zeta', name: 'Zeta Ltda.', plan: 'pro', active: true,\n    });\n\
    \    this.tenants.set('omega', {\n      id: 'omega', name: 'Omega S.A.', plan:\
    \ 'free', active: true,\n    });\n  }\n\n  use(req: Request, res: Response, next:\
    \ NextFunction) {\n    const tenantId = this.extractTenantId(req);\n    const\
    \ tenant = this.tenants.get(tenantId);\n\n    if (!tenant) {\n      throw new\
    \ UnauthorizedException(`Tenant \"${tenantId}\" não encontrado`);\n    }\n\n \
    \   if (!tenant.active) {\n      throw new UnauthorizedException(`Tenant \"${tenantId}\"\
    \ está inativo`);\n    }\n\n    // Anexa ao request para uso nos controllers\n\
    \    (req as any).tenant = tenant;\n    (req as any).tenantId = tenant.id;\n\n\
    \    next();\n  }\n\n  private extractTenantId(req: Request): string {\n    const\
    \ fromJwt = this.extractFromJwt(req.headers.authorization);\n    if (fromJwt)\
    \ return fromJwt;\n\n    const fromHeader = req.headers['x-tenant-id'] as string;\n\
    \    if (fromHeader) return fromHeader;\n\n    const fromSubdomain = req.hostname.split('.')[0];\n\
    \    if (fromSubdomain && fromSubdomain !== 'www' && fromSubdomain !== 'app')\
    \ {\n      return fromSubdomain;\n    }\n\n    throw new UnauthorizedException(\n\
    \      'Identificação do tenant é obrigatória (JWT, X-Tenant-Id ou subdomínio)'\n\
    \    );\n  }\n\n  private extractFromJwt(authorization?: string): string | null\
    \ {\n    if (!authorization) return null;\n    try {\n      const token = authorization.replace('Bearer\
    \ ', '');\n      const payload = jwt.verify(token, process.env.JWT_SECRET!) as\
    \ any;\n      return payload.tid || null;\n    } catch {\n      return null;\n\
    \    }\n  }\n}"
  props:
    language: typescript
  children: []
