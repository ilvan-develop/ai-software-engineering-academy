    text: 'Reserve ciclos fixos para discovery (ex: 2 semanas a cada quarter).'
    props: {}
    children: []
- type: Code
  text: "Sprint Discovery (2 semanas):\n  Semana 1: Pesquisa (entrevistas, analytics,\
    \ concorrência)\n  Semana 2: Ideação, prototipação, testes com usuários\n  Saída:\
    \ Backlog priorizado para as próximas 6 semanas de delivery"
  props:
    language: text
  children: []
- type: Paragraph
  text: '**3. Envolva stakeholders cedo**'
  props: {}
  children:
  - type: Bold
    text: 3. Envolva stakeholders cedo
    props: {}
    children: []
- type: Code
  text: 'Stakeholder      | O que quer saber                   | Quando envolver

    ─────────────────|────────────────────────────────────|─────────────────

    Diretor          | "Isso entrega o OKR?"              | Kickoff, review

    Produto          | "Isso resolve o problema certo?"   | Discovery inteiro

    Engenharia       | "Isso é viável tecnicamente?"      | Prototipação

    Design           | "Isso é usável?"                    | Prototipação, teste

    Comercial        | "O cliente pagaria por isso?"      | Pesquisa, validação

    Sucesso do cl.   | "Isso reduz chamados?"             | Pesquisa'
  props:
    language: text
  children: []
- type: Paragraph
  text: '**4. Discovery contínuo vs Discovery por projeto**'
  props: {}
  children:
  - type: Bold
    text: 4. Discovery contínuo vs Discovery por projeto
    props: {}
    children: []
- type: Code
  text: "Discovery Contínuo (recomendado):\n  Discovery e Delivery rodam em paralelo\n\
    \  Time sempre tem 20-30% do tempo para discovery\n  Pipeline de oportunidades\
    \ sempre abastecido\n\nDiscovery por Projeto (menos eficaz):\n  Discovery só acontece\
    \ no início do projeto\n  Depois que o delivery começa, não se questiona mais\n\
    \  Se descobrir algo errado no meio, é tarde demais"
