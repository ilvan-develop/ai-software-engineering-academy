- type: Code
  text: "// components/Input/Input.tsx\nimport { InputHTMLAttributes, forwardRef }\
    \ from 'react';\n\ninterface InputProps extends InputHTMLAttributes<HTMLInputElement>\
    \ {\n  label: string;\n  error?: string;\n  hint?: string;\n  leftElement?: React.ReactNode;\n\
    \  rightElement?: React.ReactNode;\n}\n\nexport const Input = forwardRef<HTMLInputElement,\
    \ InputProps>(\n  ({ label, error, hint, leftElement, rightElement, id, className,\
    \ ...props }, ref) => {\n    const inputId = id ?? `input-${label.toLowerCase().replace(/\\\
    s+/g, '-')}`;\n\n    return (\n      <div className=\"flex flex-col gap-1.5\"\
    >\n        <label htmlFor={inputId} className=\"text-sm font-medium text-gray-700\"\
    >\n          {label}\n          {props.required && <span className=\"text-red-500\
    \ ml-0.5\">*</span>}\n        </label>\n        <div\n          className={`\n\
    \            flex items-center border rounded-[var(--radius-md)] transition-all\n\
    \            ${error\n              ? 'border-red-500 focus-within:ring-red-500'\n\
    \              : 'border-gray-300 focus-within:ring-[var(--color-primary-500)]'\n\
    \            }\n            ${props.disabled ? 'bg-gray-50 cursor-not-allowed'\
    \ : 'bg-white'}\n            focus-within:ring-2\n          `.trim()}\n      \
    \  >\n          {leftElement && <span className=\"pl-3 text-gray-400\">{leftElement}</span>}\n\
    \          <input\n            ref={ref}\n            id={inputId}\n         \
    \   className={`\n              w-full px-3 py-2 text-sm bg-transparent outline-none\n\
    \              ${props.disabled ? 'text-gray-400' : 'text-gray-900'}\n       \
    \       placeholder:text-gray-400\n            `.trim()}\n            aria-invalid={!!error}\n\
    \            aria-describedby={error ? `${inputId}-error` : hint ? `${inputId}-hint`\
    \ : undefined}\n            {...props}\n          />\n          {rightElement\
    \ && <span className=\"pr-3 text-gray-400\">{rightElement}</span>}\n        </div>\n\
    \        {error && <span id={`${inputId}-error`} className=\"text-xs text-red-500\"\
    >{error}</span>}\n        {hint && !error && <span id={`${inputId}-hint`} className=\"\
    text-xs text-gray-500\">{hint}</span>}\n      </div>\n    );\n  }\n);"
  props:
    language: typescript
  children: []
