- type: Code
  text: "interface GridConfig {\n  columns: number;\n  gutter: number;\n  margin:\
    \ number;\n  maxWidth: number;\n}\n\nconst grid: Record<string, GridConfig> =\
    \ {\n  mobile:  { columns: 4,  gutter: 16, margin: 16, maxWidth: 480 },\n  tablet:\
    \  { columns: 8,  gutter: 24, margin: 24, maxWidth: 960 },\n  desktop: { columns:\
    \ 12, gutter: 24, margin: 0,  maxWidth: 1200 },\n};\n\n// Utility: cálculo de\
    \ coluna\nfunction colWidth(columns: number, totalColumns: number, gutter: number):\
    \ string {\n  const fraction = columns / totalColumns;\n  return `calc(${fraction\
    \ * 100}% - ${gutter}px)`;\n}"
  props:
    language: typescript
