- type: Code
  text: "// Log de ações sensíveis\n@Injectable()\nexport class AuditService {\n \
    \ async log(action: AuditAction): Promise<void> {\n    await prisma.auditLog.create({\n\
    \      data: {\n        userId: action.userId,\n        action: action.type,\n\
    \        resource: action.resource,\n        resourceId: action.resourceId,\n\
    \        details: action.details,\n        ip: action.ip,\n        userAgent:\
    \ action.userAgent,\n        timestamp: new Date(),\n      },\n    });\n  }\n\
    }\n\n// Uso\n@Post('/transfer')\nasync transfer(@Body() dto: TransferDto, @Req()\
    \ req) {\n  const result = await this.transferService.execute(dto);\n  await this.auditService.log({\n\
    \    userId: req.user.id,\n    type: 'TRANSFER',\n    resource: 'Account',\n \
    \   resourceId: dto.fromAccountId,\n    details: { to: dto.toAccountId, amount:\
    \ dto.amount },\n    ip: req.ip,\n    userAgent: req.headers['user-agent'],\n\
    \  });\n  return result;\n}"
