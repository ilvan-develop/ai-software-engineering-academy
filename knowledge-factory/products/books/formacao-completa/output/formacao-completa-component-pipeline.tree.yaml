- type: Code
  text: "interface WireframeDocumentation {\n  // Metadados\n  id: string;       \
    \             // \"WF-001\"\n  title: string;                 // \"Tela de Login\"\
    \n  module: string;                // \"Autenticação\"\n  version: string;   \
    \            // \"1.3\"\n  author: string;                // \"Maria Silva\"\n\
    \  createdAt: string;             // ISO date\n  updatedAt: string;          \
    \   // ISO date\n\n  // Rastreabilidade\n  userStoryId: string;           // \"\
    US-042\"\n  epicId: string;                // \"EPIC-07\"\n\n  // Conteúdo\n \
    \ elements: WireframeElement[];\n  states: StatefulComponent[];\n  interactions:\
    \ Interaction[];\n  notes: string;                 // Observações para dev\n\n\
    \  // Aprovações\n  approvals: Approval[];\n}\n\ninterface Approval {\n  role:\
    \ 'PO' | 'DesignLead' | 'TechLead';\n  name: string;\n  date: string;\n  status:\
    \ 'pending' | 'approved' | 'changes_requested';\n  comments?: string;\n}"
  props:
    language: typescript
  children: []
