    \ { TenantService } from './tenant.service';\nimport { TenantMiddleware } from\
    \ './tenant.middleware';\n\n@Global() // disponível em toda a aplicação\n@Module({\n\
    \  providers: [TenantService, TenantMiddleware],\n  exports: [TenantService],\n\
