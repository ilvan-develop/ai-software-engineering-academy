- type: Code
  text: "// tenant-context.ts\nimport { AsyncLocalStorage } from 'async_hooks';\n\n\
    export interface TenantContext {\n  tenantId: string;\n  tenantName: string;\n\
    \  plan: string;\n}\n\nexport const tenantContext = new AsyncLocalStorage<TenantContext>();\n\
    \n// tenant-context.middleware.ts\nimport { Injectable, NestMiddleware } from\
    \ '@nestjs/common';\n\n@Injectable()\nexport class TenantContextMiddleware implements\
    \ NestMiddleware {\n  use(req: any, res: any, next: () => void) {\n    const context:\
    \ TenantContext = {\n      tenantId: req.tenantId,\n      tenantName: req.tenant?.name,\n\
    \      plan: req.tenant?.plan,\n    };\n\n    tenantContext.run(context, () =>\
    \ next());\n  }\n}\n\n// Uso em qualquer parte do código\nimport { tenantContext\
    \ } from './tenant-context';\n\nfunction getCurrentTenantId(): string {\n  const\
    \ ctx = tenantContext.getStore();\n  if (!ctx) throw new Error('Fora de contexto\
    \ de tenant');\n  return ctx.tenantId;\n}"
