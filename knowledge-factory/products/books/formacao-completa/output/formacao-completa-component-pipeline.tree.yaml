- type: Code
  text: "Dependabot/Renovate:\n  → Diário: patches (1.x.x → 1.x.x)\n  → Semanal: minor\
    \ (1.x → 1.y)\n  → Mensal: major (1 → 2) — revisão manual obrigatória\n\nRegras:\n\
    \  → Nunca fazer merge de update sem CI passar\n  → Updates major exigem approval\
    \ de 2 devs\n  → Dependency drift > 30 dias: alerta\n  → Dependências não mantidas\
    \ (>1 ano sem release): substituir\n  → Dependências com CVE conhecida: atualizar\
    \ em 48h"
  props:
    language: text
  children: []
