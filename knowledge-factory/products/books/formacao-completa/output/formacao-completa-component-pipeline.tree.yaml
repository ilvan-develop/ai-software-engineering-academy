- type: Code
  text: "Segurança em code review:\n  [ ] Todos os inputs são validados?\n  [ ] Autenticação\
    \ em todas as rotas protegidas?\n  [ ] Autorização verifica propriedade do recurso?\n\
    \  [ ] Senhas com hash (bcrypt, não MD5/SHA1)?\n  [ ] Sem segredos no código?\n\
    \  [ ] Rate limiting nos endpoints críticos?\n  [ ] CORS configurado (não * em\
    \ produção)?\n  [ ] SQL injection prevenido (ORM)?\n  [ ] Headers de segurança\
    \ configurados?\n  [ ] Logs não expõem dados sensíveis?\n\n\n\n\n# Arquitetura\
    \ Multi-Tenant\n\n# Módulo 13 — Multi-Tenant: Construindo SaaS Escalável\n\n**Como\
    \ isolar dados, identidade e recursos entre clientes em uma única aplicação.**\n\
    \n---\n\n## 1. O que é Multi-Tenancy?\n\nMulti-tenancy é um padrão arquitetural\
