- type: Code
  text: "// schema-migration-runner.ts\nconst pool = new Pool({ connectionString:\
    \ process.env.DATABASE_URL });\n\nconst MIGRATIONS = [\n  {\n    name: '001_create_users',\n\
    \    sql: `\n      CREATE TABLE IF NOT EXISTS __SCHEMA__.users (\n        id UUID\
    \ PRIMARY KEY DEFAULT gen_random_uuid(),\n        name TEXT NOT NULL,\n      \
    \  email TEXT NOT NULL,\n        role TEXT NOT NULL DEFAULT 'member',\n      \
    \  created_at TIMESTAMPTZ DEFAULT NOW()\n      );\n    `,\n  },\n  {\n    name:\
    \ '002_add_phone',\n    sql: `\n      ALTER TABLE __SCHEMA__.users\n      ADD\
    \ COLUMN IF NOT EXISTS phone TEXT;\n    `,\n  },\n  {\n    name: '003_create_projects',\n\
    \    sql: `\n      CREATE TABLE IF NOT EXISTS __SCHEMA__.projects (\n        id\
    \ UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n        name TEXT NOT NULL,\n \
    \       description TEXT,\n        created_at TIMESTAMPTZ DEFAULT NOW()\n    \
    \  );\n    `,\n  },\n];\n\nasync function migrateSchema(schema: string): Promise<void>\
    \ {\n  const client = await pool.connect();\n\n  try {\n    // Criar schema se\
    \ não existe\n    await client.query(`CREATE SCHEMA IF NOT EXISTS \"${schema}\"\
    `);\n\n    // Criar tabela de controle de migrations no schema\n    await client.query(`\n\
    \      CREATE TABLE IF NOT EXISTS \"${schema}\"._migrations (\n        name TEXT\
    \ PRIMARY KEY,\n        applied_at TIMESTAMPTZ DEFAULT NOW()\n      )\n    `);\n\
    \n    for (const migration of MIGRATIONS) {\n      // Verificar se já foi aplicada\n\
    \      const exists = await client.query(\n        `SELECT 1 FROM \"${schema}\"\
    ._migrations WHERE name = $1`,\n        [migration.name]\n      );\n\n      if\
    \ (exists.rows.length > 0) continue;\n\n      // Aplicar migration\n      const\
    \ sql = migration.sql.replace(/__SCHEMA__/g, `\"${schema}\"`);\n      await client.query('BEGIN');\n\
    \      try {\n        await client.query(sql);\n        await client.query(\n\
    \          `INSERT INTO \"${schema}\"._migrations (name) VALUES ($1)`,\n     \
    \     [migration.name]\n        );\n        await client.query('COMMIT');\n  \
    \      console.log(`[${schema}] ✅ ${migration.name}`);\n      } catch (err) {\n\
    \        await client.query('ROLLBACK');\n        throw err;\n      }\n    }\n\
    \  } finally {\n    client.release();\n  }\n}\n\nasync function migrateAllSchemas():\
    \ Promise<void> {\n  const tenants = await pool.query('SELECT slug FROM tenants\
    \ WHERE active = true');\n  for (const tenant of tenants.rows) {\n    await migrateSchema(`tenant_${tenant.slug}`);\n\
    \  }\n}"
  props:
    language: typescript
  children: []
