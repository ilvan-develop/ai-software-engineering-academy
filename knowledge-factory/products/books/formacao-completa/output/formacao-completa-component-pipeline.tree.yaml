- type: Code
  text: "// migrate-all-tenants.ts\nimport { Pool } from 'pg';\nimport { readMigrationFiles\
    \ } from './migration-runner';\n\nasync function migrateAllTenants(): Promise<void>\
    \ {\n  const tenants = [\n    { id: 'acme', dbUrl: 'postgresql://.../acme' },\n\
    \    { id: 'zeta', dbUrl: 'postgresql://.../zeta' },\n    { id: 'omega', dbUrl:\
    \ 'postgresql://.../omega' },\n  ];\n\n  const migrations = await readMigrationFiles();\n\
    \n  for (const tenant of tenants) {\n    console.log(`[${tenant.id}] Iniciando\
    \ migrations...`);\n    const pool = new Pool({ connectionString: tenant.dbUrl\
    \ });\n\n    try {\n      for (const migration of migrations) {\n        await\
    \ pool.query('BEGIN');\n        try {\n          await pool.query(migration.sql);\n\
    \          await pool.query(\n            `INSERT INTO _migrations (name, applied_at)\
    \ VALUES ($1, NOW())`,\n            [migration.name]\n          );\n         \
    \ await pool.query('COMMIT');\n          console.log(`[${tenant.id}] ✅ ${migration.name}`);\n\
    \        } catch (err) {\n          await pool.query('ROLLBACK');\n          console.error(`[${tenant.id}]\
    \ ❌ ${migration.name}:`, err);\n          throw err; // abortar todos? ou continuar?\n\
    \        }\n      }\n    } finally {\n      await pool.end();\n    }\n  }\n}"
