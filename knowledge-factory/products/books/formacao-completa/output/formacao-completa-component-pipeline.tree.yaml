  text: Resumo
  props:
    level: 2
  children:
  - type: Text
    text: Resumo
    props: {}
    children: []
- type: Code
  text: "Governança não é burocracia — é responsabilidade.\n\nO que levar para o dia\
    \ a dia:\n  → Code review com checklist e approval gates\n  → ESLint + Prettier\
    \ + Husky (automação > memorando)\n  → .env.example e git secrets (segurança por\
    \ padrão)\n  → ADRs para decisões importantes\n  → Dependências sempre atualizadas\n\
    \  → Deploy com rollback testado\n  → Compliance integrada ao processo (não depois)\n\
    \  → SLOs que todo time conhece\n  → Cultura de qualidade, não de culpa"
  props:
    language: text
