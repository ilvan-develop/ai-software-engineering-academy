- type: Code
  text: "-- Schema global (público)\nCREATE SCHEMA IF NOT EXISTS public;\n\nCREATE\
    \ TABLE public.plans (\n  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  name\
    \ TEXT NOT NULL,\n  max_users INT NOT NULL,\n  monthly_price NUMERIC(10,2) NOT\
    \ NULL,\n  features JSONB NOT NULL DEFAULT '[]'\n);\n\nCREATE TABLE public.tenants\
    \ (\n  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  slug TEXT UNIQUE NOT\
    \ NULL,\n  name TEXT NOT NULL,\n  plan_id UUID REFERENCES public.plans(id),\n\
    \  active BOOLEAN DEFAULT true,\n  created_at TIMESTAMPTZ DEFAULT NOW()\n);\n\n\
    -- Schema do tenant\nCREATE SCHEMA IF NOT EXISTS tenant_acme;\n\nCREATE TABLE\
    \ tenant_acme.users (\n  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  tenant_id\
    \ UUID REFERENCES public.tenants(id),\n  name TEXT NOT NULL,\n  email TEXT NOT\
    \ NULL,\n  role TEXT NOT NULL DEFAULT 'member',\n  created_at TIMESTAMPTZ DEFAULT\
    \ NOW()\n);\n\n-- Query que cruza dado global com dado do tenant\nSELECT u.name,\
    \ p.name as plan_name\nFROM tenant_acme.users u\nJOIN public.tenants t ON t.id\
    \ = u.tenant_id\nJOIN public.plans p ON p.id = t.plan_id\nWHERE u.email = 'joao@acme.com';"
