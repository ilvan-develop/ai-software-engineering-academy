- type: Code
  text: "// schema.prisma — shared database\nmodel User {\n  id        String   @id\
    \ @default(uuid())\n  tenantId  String   @map(\"tenant_id\")\n  name      String\n\
    \  email     String\n  role      String   @default(\"member\")\n  createdAt DateTime\
    \ @default(now()) @map(\"created_at\")\n\n  @@index([tenantId])\n  @@index([tenantId,\
    \ email])\n  @@map(\"users\")\n}\n\nmodel Order {\n  id        String   @id @default(uuid())\n\
    \  tenantId  String   @map(\"tenant_id\")\n  total     Decimal  @db.Decimal(10,\
    \ 2)\n  status    String   @default(\"pending\")\n  createdAt DateTime @default(now())\
    \ @map(\"created_at\")\n\n  @@index([tenantId, createdAt])\n  @@map(\"orders\"\
    )\n}"
  props:
    language: prisma
  children: []
- type: Code
  text: "// tenant-aware.service.ts\nimport { Injectable } from '@nestjs/common';\n\
    import { PrismaService } from '../prisma/prisma.service';\nimport { TenantService\
    \ } from './tenant.service';\n\n@Injectable()\nexport class TenantAwareService\
    \ {\n  constructor(\n    private prisma: PrismaService,\n    private tenantService:\
    \ TenantService,\n  ) {}\n\n  private get tenantId() {\n    return this.tenantService.getTenantId();\n\
    \  }\n\n  async findUsers() {\n    return this.prisma.user.findMany({\n      where:\
    \ { tenantId: this.tenantId },\n    });\n  }\n\n  async createUser(data: { name:\
    \ string; email: string; role?: string }) {\n    return this.prisma.user.create({\n\
    \      data: {\n        ...data,\n        tenantId: this.tenantId,\n      },\n\
    \    });\n  }\n\n  async findOrdersByDateRange(start: Date, end: Date) {\n   \
    \ return this.prisma.order.findMany({\n      where: {\n        tenantId: this.tenantId,\n\
    \        createdAt: { gte: start, lte: end },\n      },\n      orderBy: { createdAt:\
    \ 'desc' },\n    });\n  }\n}"
  props:
    language: typescript
  children: []
