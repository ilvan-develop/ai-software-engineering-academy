    \ { name: 'João', email: 'joao@email.com', password: 'Senha123' };\n      repo.findByEmail.mockResolvedValue(null);\n\
    \n      const result = await service.create(dto);\n\n      expect(repo.save).toHaveBeenCalled();\n\
    \      expect(emailService.sendWelcome).toHaveBeenCalled();\n      expect(result).toBeDefined();\n\
    \    });\n\n    it('deve lançar erro se email já existe', async () => {\n    \
    \  repo.findByEmail.mockResolvedValue(createUser());\n\n      await expect(service.create(mockDto)).rejects.toThrow(ConflictException);\n\
    \    });\n  });\n});\n\n\n\n\n# Segurança\n\n# Módulo 12 — Segurança\n\n**Protegendo\
    \ sistemas Enterprise contra ameaças reais.**\n\n---\n\n## 1. Por que segurança\
    \ é o requisito mais importante\n\nSegurança não é uma feature — é um **pré-requisito**.\
    \ Um sistema inseguro é um passivo, não um ativo.\n\n### O custo de uma falha\
    \ de segurança\n"
