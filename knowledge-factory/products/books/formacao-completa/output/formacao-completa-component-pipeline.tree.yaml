- type: Code
  text: "Full:     Cópia completa do banco\n  Quando: Diário\n  Tempo:  Lento, ocupa\
    \ espaço\n  Restore: Completo, mais simples\n\nIncremental: Apenas mudanças desde\
    \ o último backup\n  Quando: Horário\n  Tempo:  Rápido, ocupa pouco espaço\n \
    \ Restore: Precisa do full + todos incrementais\n\nWAL (Write-Ahead Log): Log\
    \ de transações\n  Quando: Contínuo\n  Uso:    Point-in-time recovery"
  props:
    language: text
  children: []
