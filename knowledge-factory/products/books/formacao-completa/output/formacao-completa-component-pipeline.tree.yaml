- type: Code
  text: "interface CursorPaginationInput {\n  cursor?: string;  // ID do último item\n\
    \  limit: number;    // Itens por página\n}\n\ninterface CursorPaginatedResult<T>\
    \ {\n  items: T[];\n  nextCursor: string | null;\n  hasMore: boolean;\n}\n\n//\
    \ Implementação\nasync findAll(input: CursorPaginationInput): Promise<CursorPaginatedResult<User>>\
    \ {\n  const items = await this.prisma.user.findMany({\n    take: input.limit\
    \ + 1,  // Pega um a mais para saber se tem próxima\n    cursor: input.cursor\
    \ ? { id: input.cursor } : undefined,\n    orderBy: { createdAt: 'desc' },\n \
    \ });\n\n  const hasMore = items.length > input.limit;\n  if (hasMore) items.pop();\n\
    \n  return {\n    items: items.map(this.toDomain),\n    nextCursor: hasMore ?\
    \ items[items.length - 1].id : null,\n    hasMore,\n  };\n}"
  props:
    language: typescript
  children: []
