    │  Design Lead      │  Designers de cada produto       │\n│  Engineering Lead\
    \ │  Devs de frontend dos squads     │\n│  \bDeveloper        │  QA engineers\
    \                    │\n│  Design Ops       │  Accessibility specialists     \
    \  │\n└───────────────────┴─────────────────────────────────┘\n\nRituais:\n- Weekly\
    \ sync (DS Squad)\n- Monthly showcase (novos componentes)\n- Quarterly review\
    \ (ROI, métricas)\n- Voting on RFCs (propostas de mudança)"
