- type: Code
  text: "P0 (Resposta imediata):\n  - Error rate > 5% nos últimos 5 min\n  - p95 latency\
    \ > 2s\n  - Servidor down\n  - Banco inacessível\n\nP1 (Resposta em 1 hora):\n\
    \  - Error rate > 1% nos últimos 15 min\n  - p95 latency > 1s\n  - Disco > 80%\n\
    \  - Memória > 85%\n\nP2 (Resposta em 24h):\n  - Error rate > 0.5% no último dia\n\
    \  - p99 latency > 3s\n  - Cache hit rate < 50%\n  - Queries lentas (> 500ms)"
  props:
    language: text
