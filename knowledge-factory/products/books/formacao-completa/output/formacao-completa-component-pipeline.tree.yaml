- type: Code
  text: "  describe('Concorrência entre tenants', () => {\n    it('deve processar\
    \ dados de múltiplos tenants simultaneamente sem misturar', async () => {\n  \
    \    const tenants = ['acme', 'zeta', 'omega'];\n      const createPromises =\
    \ tenants.map((tid) =>\n        asTenant(tid)\n          .post('/users')\n   \
    \       .send({ name: `User from ${tid}`, email: `user@${tid}.com` })\n      \
    \    .expect(201)\n      );\n\n      await Promise.all(createPromises);\n\n  \
    \    // Verificar isolamento\n      for (const tid of tenants) {\n        const\
    \ response = await asTenant(tid).get('/users').expect(200);\n        const allEmails\
    \ = response.body.map((u: any) => u.email);\n        const otherTenants = tenants.filter((t)\
    \ => t !== tid);\n\n        // Não deve conter emails dos outros tenants\n   \
    \     for (const other of otherTenants) {\n          expect(allEmails).not.toContain(`user@${other}.com`);\n\
    \        }\n\n        // Deve conter o próprio email\n        expect(allEmails).toContain(`user@${tid}.com`);\n\
    \      }\n    });\n  });"
  props:
    language: typescript
