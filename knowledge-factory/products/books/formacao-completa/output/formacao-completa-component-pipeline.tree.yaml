- type: Code
  text: "// components/Modal/Modal.tsx\nimport { useEffect, useRef } from 'react';\n\
    \ninterface ModalProps {\n  open: boolean;\n  onClose: () => void;\n  title: string;\n\
    \  size?: 'sm' | 'md' | 'lg' | 'xl';\n  children: React.ReactNode;\n  footer?:\
    \ React.ReactNode;\n}\n\nconst sizeStyles = {\n  sm: 'max-w-sm',\n  md: 'max-w-lg',\n\
    \  lg: 'max-w-2xl',\n  xl: 'max-w-4xl',\n};\n\nexport function Modal({ open, onClose,\
    \ title, size = 'md', children, footer }: ModalProps) {\n  const overlayRef =\
    \ useRef<HTMLDivElement>(null);\n\n  useEffect(() => {\n    if (!open) return;\n\
    \    const handleEsc = (e: KeyboardEvent) => {\n      if (e.key === 'Escape')\
    \ onClose();\n    };\n    document.addEventListener('keydown', handleEsc);\n \
    \   document.body.style.overflow = 'hidden';\n    return () => {\n      document.removeEventListener('keydown',\
    \ handleEsc);\n      document.body.style.overflow = '';\n    };\n  }, [open, onClose]);\n\
    \n  if (!open) return null;\n\n  return (\n    <div\n      ref={overlayRef}\n\
    \      className=\"fixed inset-0 z-50 flex items-center justify-center p-4\"\n\
    \      onClick={(e) => { if (e.target === overlayRef.current) onClose(); }}\n\
    \      role=\"dialog\"\n      aria-modal=\"true\"\n      aria-labelledby=\"modal-title\"\
    \n    >\n      <div className=\"fixed inset-0 bg-black/50 backdrop-blur-sm\" aria-hidden=\"\
    true\" />\n      <div className={`relative bg-white rounded-xl shadow-xl w-full\
    \ ${sizeStyles[size]} p-6 animate-in fade-in zoom-in duration-200`}>\n       \
    \ <div className=\"flex items-center justify-between mb-4\">\n          <h2 id=\"\
    modal-title\" className=\"text-lg font-semibold text-gray-900\">{title}</h2>\n\
    \          <button onClick={onClose} className=\"p-1 text-gray-400 hover:text-gray-600\
    \ rounded-lg hover:bg-gray-100 transition-colors\" aria-label=\"Fechar\">\n  \
    \          <svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" fill=\"none\"\
    ><path d=\"M15 5L5 15M5 5l10 10\" stroke=\"currentColor\" strokeWidth=\"1.5\"\
    \ strokeLinecap=\"round\"/></svg>\n          </button>\n        </div>\n     \
    \   <div className=\"mb-6 text-sm text-gray-600\">{children}</div>\n        {footer\
    \ && (\n          <div className=\"flex items-center justify-end gap-3 pt-4 border-t\
    \ border-gray-100\">\n            {footer}\n          </div>\n        )}\n   \
    \   </div>\n    </div>\n  );\n}"
  props:
    language: typescript
  children: []
