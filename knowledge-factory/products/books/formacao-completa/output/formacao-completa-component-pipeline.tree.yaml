    \  return (\n    <nav aria-label=\"Breadcrumb\">\n      {items.map((item, i) =>\
    \ (\n        <span key={i}>\n          {i > 0 && <ChevronRightIcon />}\n     \
    \     {item.isCurrent\n            ? <span aria-current=\"page\">{item.label}</span>\n\
    \            : <a href={item.href}>{item.label}</a>\n          }\n        </span>\n\
    \      ))}\n    </nav>\n  );\n}"
