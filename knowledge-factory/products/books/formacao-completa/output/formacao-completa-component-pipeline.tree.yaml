    \   </div>\n  );\n}\n\n// utils/dashboard.ts\nasync function getDashboardStats():\
    \ Promise<Stats> {\n  const [totalUsers, totalOrders, revenue] = await Promise.all([\n\
    \    prisma.user.count(),\n    prisma.order.count(),\n    prisma.order.aggregate({\
    \ _sum: { total: true } }),\n  ]);\n\n  return { totalUsers, totalOrders, revenue:\
    \ revenue._sum.total ?? 0 };\n}"
