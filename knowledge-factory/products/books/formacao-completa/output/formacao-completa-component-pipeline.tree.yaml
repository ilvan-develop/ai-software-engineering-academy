    | Drop-off por etapa       | Atrito no fluxo                          |

    | Funil de conversão       | Onde os usuários desistem                |

    | Retenção D1/D7/D30       | Valor entregue vs expectativa            |

    | NPS / CSAT               | Satisfação geral                         |

    | Search terms             | O que usuários procuram (e não acham)    |

