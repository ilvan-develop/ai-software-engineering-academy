- type: Code
  text: "import * as request from 'supertest';\nimport { Test } from '@nestjs/testing';\n\
    import { INestApplication } from '@nestjs/common';\n\ndescribe('UserController\
    \ (integration)', () => {\n  let app: INestApplication;\n\n  beforeAll(async ()\
    \ => {\n    const moduleRef = await Test.createTestingModule({\n      imports:\
    \ [AppModule],\n    }).compile();\n\n    app = moduleRef.createNestApplication();\n\
    \    await app.init();\n  });\n\n  afterAll(async () => {\n    await app.close();\n\
    \  });\n\n  describe('POST /users', () => {\n    it('deve criar usuário com dados\
    \ válidos', async () => {\n      const response = await request(app.getHttpServer())\n\
    \        .post('/users')\n        .send({\n          name: 'João Silva',\n   \
    \       email: 'joao@email.com',\n          password: 'Senha123',\n        })\n\
    \        .expect(201);\n\n      expect(response.body).toHaveProperty('id');\n\
    \      expect(response.body.name).toBe('João Silva');\n    });\n\n    it('deve\
    \ retornar 400 com dados inválidos', async () => {\n      await request(app.getHttpServer())\n\
    \        .post('/users')\n        .send({ name: '', email: 'invalido' })\n   \
    \     .expect(400);\n    });\n\n    it('deve retornar 409 se email já existe',\
    \ async () => {\n      // Primeiro cria\n      await request(app.getHttpServer())\n\
    \        .post('/users')\n        .send(validDto)\n        .expect(201);\n\n \
    \     // Depois tenta criar de novo\n      await request(app.getHttpServer())\n\
    \        .post('/users')\n        .send(validDto)\n        .expect(409);\n   \
    \ });\n  });\n\n  describe('GET /users/:id', () => {\n    it('deve retornar 404\
    \ para usuário inexistente', async () => {\n      await request(app.getHttpServer())\n\
    \        .get('/users/non-existent-id')\n        .expect(404);\n    });\n  });\n\
    });"
