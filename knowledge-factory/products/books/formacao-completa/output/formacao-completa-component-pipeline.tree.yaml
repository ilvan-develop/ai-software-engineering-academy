- type: Code
  text: "groups:\n  - name: api\n    rules:\n      - alert: HighErrorRate\n      \
    \  expr: |\n          rate(http_errors_total[5m])\n          /\n          rate(http_requests_total[5m])\n\
    \          > 0.05\n        for: 5m\n        labels:\n          severity: critical\n\
    \        annotations:\n          summary: \"Error rate above 5%\"\n          description:\
    \ \"Error rate is {{$value | humanize}}% for the last 5 minutes\"\n\n      - alert:\
    \ HighLatency\n        expr: |\n          histogram_quantile(0.95,\n         \
    \   rate(http_request_duration_seconds_bucket[5m])\n          ) > 2\n        for:\
    \ 5m\n        labels:\n          severity: critical\n        annotations:\n  \
    \        summary: \"p95 latency above 2s\""
