- type: Code
  text: "-- Índices essenciais para shared database\n\n-- 1. Sempre incluir tenant_id\
    \ como primeira coluna\nCREATE INDEX idx_users_tenant_id ON users (tenant_id);\n\
    CREATE INDEX idx_users_tenant_email ON users (tenant_id, email);\nCREATE INDEX\
    \ idx_orders_tenant_created ON orders (tenant_id, created_at DESC);\n\n-- 2. Índices\
    \ parciais para tenants grandes\nCREATE INDEX idx_orders_acme_pending ON orders\
    \ (created_at)\n  WHERE tenant_id = 'acme' AND status = 'pending';\n\n-- 3. Índices\
    \ funcionais para queries comuns\nCREATE INDEX idx_users_tenant_lower_email ON\
    \ users (tenant_id, LOWER(email));\n\n-- 4. Evitar índices desnecessários em colunas\
    \ de baixa cardinalidade\n-- (tenant_id já é primeiro no índice composto)\n\n\
    -- Query que usa o índice:\nEXPLAIN ANALYZE\nSELECT * FROM users\nWHERE tenant_id\
    \ = 'acme' AND email = 'joao@acme.com';\n-- -> Index Scan usando idx_users_tenant_email"
