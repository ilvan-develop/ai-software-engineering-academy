- type: Code
  text: "@Injectable()\nexport class UserRepository {\n  constructor(private readonly\
    \ prisma: PrismaService) {}\n\n  async findById(id: string): Promise<User | null>\
    \ {\n    const raw = await this.prisma.user.findUnique({ where: { id } });\n \
    \   return raw ? this.toDomain(raw) : null;\n  }\n\n  async findByEmail(email:\
    \ string): Promise<User | null> {\n    const raw = await this.prisma.user.findUnique({\
    \ where: { email } });\n    return raw ? this.toDomain(raw) : null;\n  }\n\n \
    \ async findAll(pagination: PaginationInput): Promise<PaginatedResult<User>> {\n\
    \    const [items, total] = await Promise.all([\n      this.prisma.user.findMany({\n\
    \        skip: (pagination.page - 1) * pagination.limit,\n        take: pagination.limit,\n\
    \        orderBy: { createdAt: 'desc' },\n      }),\n      this.prisma.user.count(),\n\
    \    ]);\n\n    return {\n      items: items.map(this.toDomain),\n      total,\n\
    \      page: pagination.page,\n      limit: pagination.limit,\n    };\n  }\n\n\
    \  async save(user: User): Promise<void> {\n    await this.prisma.user.create({\
    \ data: this.toPersistence(user) });\n  }\n\n  async update(id: string, user:\
    \ User): Promise<void> {\n    await this.prisma.user.update({\n      where: {\
    \ id },\n      data: this.toPersistence(user),\n    });\n  }\n\n  async softDelete(id:\
    \ string): Promise<void> {\n    await this.prisma.user.update({\n      where:\
    \ { id },\n      data: { deletedAt: new Date() },\n    });\n  }\n\n  private toDomain(raw:\
    \ PrismaUser): User {\n    return User.restore(\n      raw.id,\n      raw.name,\n\
    \      Email.restore(raw.email),\n      raw.password,\n      raw.role as UserRole,\n\
    \    );\n  }\n\n  private toPersistence(user: User): PrismaUserCreateInput {\n\
    \    return {\n      id: user.id,\n      name: user.name,\n      email: user.email.toString(),\n\
    \      password: user.password,\n      role: user.role,\n    };\n  }\n}"
  props:
    language: typescript
