- type: Code
  text: "deploy-production:\n  name: Deploy em Produção\n  needs: [lint, test, build,\
    \ security-sast]\n  runs-on: ubuntu-latest\n  if: github.ref == 'refs/heads/main'\n\
    \  environment:\n    name: production\n    url: https://meusistema.com.br\n  concurrency:\n\
    \    group: production-deploy\n    cancel-in-progress: false\n  steps:\n    -\
    \ uses: actions/checkout@v4\n    - uses: ./.github/actions/setup-node\n    - uses:\
    \ actions/download-artifact@v4\n      with:\n        name: build-output\n    \
    \    path: dist\n\n    - name: Login no Docker Registry\n      uses: docker/login-action@v3\n\
    \      with:\n        username: ${{ secrets.DOCKER_USER }}\n        password:\
    \ ${{ secrets.DOCKER_PASS }}\n\n    - name: Build e Push da Imagem\n      run:\
    \ |\n        docker build -t meuregistro/app:${{ github.sha }} .\n        docker\
    \ push meuregistro/app:${{ github.sha }}\n\n    - name: Deploy no ECS\n      run:\
    \ |\n        aws ecs update-service \\\n          --cluster production \\\n  \
    \        --service app-service \\\n          --force-new-deployment\n\n    - name:\
    \ Verificar Saúde\n      run: |\n        for i in {1..30}; do\n          STATUS=$(curl\
    \ -s -o /dev/null -w \"%{http_code}\" https://meusistema.com.br/health)\n    \
    \      if [ \"$STATUS\" = \"200\" ]; then\n            echo \"✅ Deploy saudável\"\
    \n            exit 0\n          fi\n          sleep 10\n        done\n       \
    \ echo \"❌ Health check falhou após deploy\"\n        exit 1\n\n    - name: Rollback\
    \ automático\n      if: failure()\n      run: |\n        echo \"\U0001F504 Iniciando\
    \ rollback...\"\n        aws ecs update-service \\\n          --cluster production\
    \ \\\n          --service app-service \\\n          --force-new-deployment\n\n\
    \n\n\n# Construindo um SaaS Enterprise\n\n# Módulo 21 — Projeto Final: Enterprise\
    \ SaaS de Gestão de Projetos e Tarefas\n\n**O ápice da jornada. Construir um sistema\
    \ completo, do zero, com tudo que um SaaS Enterprise exige.**\n\n---\n\n## 1.\
    \ Visão Geral do Projeto\n\n### 1.1 Objetivo\n\nO Projeto Final é a culminação\
    \ de toda a jornada de 20 módulos. O aluno deve construir, de forma individual\
    \ ou em squad de até 3 pessoas, uma plataforma **SaaS de Gestão de Projetos e\
    \ Tarefas** completa — similar a um Trello/Asana/ClickUp simplificado, porém com\
    \ arquitetura Enterprise real.\n\nO objetivo não é apenas \"fazer funcionar\"\
    . É demonstrar domínio sobre:\n- Arquitetura limpa e modular (Módulo 08)\n- Design\
    \ System e UI/UX profissional (Módulos 04–07)\n- Backend robusto com NestJS +\
    \ Prisma (Módulo 10)\n- Frontend com Next.js e componentes reutilizáveis (Módulo\
    \ 11)\n- Segurança, autenticação e RBAC (Módulo 12)\n- Multi-tenancy real (Módulo\
    \ 13)\n- DevOps, CI/CD e containerização (Módulo 14)\n- Qualidade e testes automatizados\
    \ (Módulo 15)\n- Observabilidade completa (Módulo 16)\n- Integração com agentes\
    \ de IA (Módulo 18)\n- Auditoria e compliance (Módulo 19)\n- Automação de processos\
    \ (Módulo 20)\n\n### 1.2 O que será construído\n\n| Aspecto | Descrição |\n|---------|-----------|\n\
    | Produto | Plataforma SaaS multi-tenant de gestão de projetos e tarefas |\n|\
    \ Público-alvo | Equipes de desenvolvimento, marketing, RH e operações |\n| Diferencial\
    \ | Arquitetura Enterprise, observabilidade, multi-tenancy real, IA integrada\
    \ |\n| Stack | NestJS + Next.js + PostgreSQL + Redis + Docker + Cloud |\n\n###\
    \ 1.3 Habilidades avaliadas\n\n| Habilidade | Módulo relacionado |\n|------------|-------------------|\n\
    | Mentalidade Enterprise | M01 |\n| Product Discovery & Design Thinking | M02,\
    \ M03 |\n| UX, UI, Design System | M04, M05, M06, M07 |\n| Arquitetura, Modelagem,\
    \ SOLID | M08, M09 |\n| Backend NestJS | M10 |\n| Frontend Next.js | M11 |\n|\
    \ Segurança e Autenticação | M12 |\n| Multi-tenancy | M13 |\n| DevOps e Deploy\
    \ | M14 |\n| Testes e Qualidade | M15 |\n| Observabilidade | M16 |\n| Governança\
    \ e Code Review | M17 |\n| Agentes de IA | M18 |\n| Auditoria e Compliance | M19\
    \ |\n| Automação | M20 |\n\n---\n\n## 2. Escopo Completo\n\n### 2.1 Autenticação\
    \ Multi-tenant\n\n- Cadastro de empresas (tenants) com plano gratuito e trial\
    \ de 14 dias\n- Cadastro de usuários com convite por e-mail (fluxo de onboarding)\n\
    - Login com e-mail/senha + OAuth2 (Google/GitHub)\n- JWT com refresh token e rotação\
    \ de tokens\n- Recuperação de senha via e-mail transacional\n- MFA (Autenticação\
    \ de dois fatores) — opcional, mas pontua extra\n- Session management com Redis\n\
    \nFluxo de onboarding do tenant em diagrama de sequência:\n\n![Onboarding de Tenant\
    \ - Auth e Convite](/knowledge-factory/products/courses/capstone/module-21-projeto-final/assets/diagram-sequence-auth-onboarding.svg)\n\
    \n### 2.2 CRUD com Permissões Baseadas em Papéis (RBAC)\n\nHierarquia de papéis:\n\
    - **Owner** (dono do tenant) — acesso total, faturamento, configurações\n- **Admin**\
    \ — gerenciar projetos, membros, configurar workspace\n- **Manager** — criar/editar\
    \ projetos, alocar tarefas, gerar relatórios\n- **Developer** — executar tarefas,\
    \ comentar, anexar arquivos\n- **Viewer** — acesso somente leitura a boards e\
    \ relatórios\n\nPermissões granulares por recurso (projeto, tarefa, relatório,\
    \ configuração).\n\n### 2.3 Gestão de Projetos e Tarefas\n\n**Projetos:**\n- CRUD\
    \ completo (nome, descrição, datas, prioridade, status)\n- Categorização por tags\
    \ e departamentos\n- Atribuição de equipe ao projeto\n- Template de projeto (criar\
    \ a partir de modelo)\n\n**Tarefas:**\n- CRUD completo com título, descrição,\
    \ checklist, anexos\n- Quadro Kanban (drag & drop entre colunas: To Do, In Progress,\
    \ Review, Done)\n- Sistema de comentários com menção a usuários\n- Atividade em\
    \ tempo real via WebSocket (alguém está editando)\n- Histórico de alterações com\
    \ auditoria\n- Dependências entre tarefas (bloqueia/desbloqueia)\n- Etiquetas\
    \ personalizáveis com cores\n- Estimativa de horas e time tracking\n\n### 2.4\
    \ Notificações\n\n- Notificações in-app (sininho no header)\n- Notificações push\
    \ (via WebSocket)\n- Notificações por e-mail (tarefa atribuída, menção, vencimento)\n\
    - Preferências de notificação por usuário\n- Template de e-mail transacional customizável\n\
    \n### 2.5 Relatórios e Dashboards\n\n**Dashboard do workspace:**\n- Gráfico de\
    \ tarefas por status (pizza/barras)\n- Burndown chart (sprint atual)\n- Tarefas\
    \ vencidas vs. concluídas no mês\n- Produtividade por membro\n\n**Relatórios exportáveis:**\n\
    - Relatório de projetos (PDF/CSV)\n- Relatório de horas por membro\n- Relatório\
    \ de performance da equipe\n- Histórico de conclusão por período\n\n### 2.6 Integração\
    \ com Pagamentos\n\n- Planos: Free (até 3 projetos), Pro (ilimitado), Enterprise\
    \ (custom)\n- Gateway de pagamento: Stripe ou Paddle\n- Webhooks para confirmação\
    \ de pagamento, cancelamento, trial ending\n- Portal de faturamento para o usuário\
    \ (histórico, notas fiscais)\n- Rate limiting por plano (API calls, storage, members)\n\
    \n---\n\n## 3. Requisitos Funcionais\n\n### RF01 — Autenticação e Onboarding\n\
    \n| ID | Requisito | Prioridade |\n|----|-----------|------------|\n| RF01.1 |\
    \ Usuário deve se registrar com e-mail + senha | Alta |\n| RF01.2 | Usuário pode\
    \ registrar uma empresa (tenant) no ato do cadastro | Alta |\n| RF01.3 | Owner\
    \ pode convidar membros por e-mail | Alta |\n| RF01.4 | Convidado recebe e-mail\
    \ com link para aceitar convite | Alta |\n| RF01.5 | Usuário pode fazer login\
    \ com Google/GitHub OAuth | Média |\n| RF01.6 | Token JWT expira em 15 min, refresh\
    \ token em 7 dias | Alta |\n| RF01.7 | Usuário pode recuperar senha via e-mail\
    \ | Média |\n| RF01.8 | Admin pode desativar/ativar membros do tenant | Alta |\n\
    | RF01.9 | Sistema deve bloquear login após 5 tentativas falhas (rate limit) |\
    \ Alta |\n\n### RF02 — Gestão de Projetos\n\n| ID | Requisito | Prioridade |\n\
    |----|-----------|------------|\n| RF02.1 | Usuário com permissão pode criar projeto\
    \ | Alta |\n| RF02.2 | Projeto tem: nome, descrição, dono, datas, prioridade,\
    \ status | Alta |\n| RF02.3 | Usuário pode editar e arquivar projeto | Alta |\n\
    | RF02.4 | Usuário pode filtrar projetos por status, prioridade, tags | Média\
    \ |\n| RF02.5 | Manager pode criar template a partir de projeto existente | Baixa\
    \ |\n| RF02.6 | Projeto arquivado não aparece nas listagens padrão | Alta |\n\n\
    ### RF03 — Gestão de Tarefas\n\n| ID | Requisito | Prioridade |\n|----|-----------|------------|\n\
    | RF03.1 | Usuário pode criar tarefa em um projeto | Alta |\n| RF03.2 | Tarefa\
    \ tem: título, descrição, responsável, data, prioridade, etiquetas | Alta |\n\
    | RF03.3 | Tarefa pode ter checklist com itens marcáveis | Média |\n| RF03.4 |\
    \ Tarefa pode ter comentários com menção (@usuário) | Alta |\n| RF03.5 | Tarefa\
    \ pode ser movida entre colunas Kanban (drag & drop) | Alta |\n| RF03.6 | Histórico\
    \ de alterações visível na tarefa | Alta |\n| RF03.7 | Tarefa pode ter dependência\
    \ de outra tarefa | Média |\n| RF03.8 | Usuário pode anexar arquivos (imagens,\
    \ PDFs) até 10MB | Média |\n| RF03.9 | Sistema notifica quando tarefa é atribuída\
    \ a alguém | Alta |\n| RF03.10 | Tarefa pode ter time tracking (iniciar/pausar/parar)\
    \ | Média |\n\n### RF04 — Kanban Board\n\n| ID | Requisito | Prioridade |\n|----|-----------|------------|\n\
    | RF04.1 | Board exibe colunas por status (To Do, In Progress, Review, Done) |\
    \ Alta |\n| RF04.2 | Usuário pode arrastar tarefa entre colunas | Alta |\n| RF04.3\
    \ | Colunas podem ser personalizadas por projeto | Média |\n| RF04.4 | Board atualiza\
    \ em tempo real via WebSocket | Média |\n| RF04.5 | Filtros por responsável, prioridade,\
    \ etiqueta no board | Média |\n\n### RF05 — Notificações\n\n| ID | Requisito |\
    \ Prioridade |\n|----|-----------|------------|\n| RF05.1 | Notificação in-app\
    \ ao ser mencionado em comentário | Alta |\n| RF05.2 | Notificação in-app ao ser\
    \ atribuído a tarefa | Alta |\n| RF05.3 | Notificação por e-mail configurável\
    \ | Média |\n| RF05.4 | Central de notificações com marcador de lido/não lido\
    \ | Alta |\n| RF05.5 | Usuário pode configurar quais notificações receber | Média\
    \ |\n\n### RF06 — Relatórios\n\n| ID | Requisito | Prioridade |\n|----|-----------|------------|\n\
    | RF06.1 | Dashboard com gráficos de tarefas por status | Alta |\n| RF06.2 | Burndown\
    \ chart por período | Média |\n| RF06.3 | Relatório de horas por membro | Média\
    \ |\n| RF06.4 | Exportar relatório em PDF | Média |\n| RF06.5 | Exportar relatório\
    \ em CSV | Baixa |\n\n### RF07 — Pagamentos e Planos\n\n| ID | Requisito | Prioridade\
    \ |\n|----|-----------|------------|\n| RF07.1 | Usuário pode assinar plano Pro\
    \ via Stripe | Alta |\n| RF07.2 | Webhook Stripe processa eventos (payment_intent.succeeded,\
    \ etc.) | Alta |\n| RF07.3 | Limites do plano são aplicados (projetos, membros,\
    \ storage) | Alta |\n| RF07.4 | Usuário pode ver histórico de faturas | Média\
    \ |\n| RF07.5 | Trial de 14 dias com aviso de expiração | Média |\n| RF07.6 |\
    \ Downgrade/upgrade de plano com proration | Média |\n\n### RF08 — Administração\n\
    \n| ID | Requisito | Prioridade |\n|----|-----------|------------|\n| RF08.1 |\
    \ Owner pode ver logs de atividade do tenant | Alta |\n| RF08.2 | Owner pode gerenciar\
    \ membros (convidar, remover, alterar papel) | Alta |\n| RF08.3 | Owner pode configurar\
    \ webhooks de saída (integração externa) | Baixa |\n| RF08.4 | Owner pode baixar\
    \ relatório de auditoria | Média |\n\n---\n\n## 4. Requisitos Não-Funcionais\n\
    \n### RNF01 — Performance\n\n| Requisito | Meta | Medição |\n|-----------|------|---------|\n\
    | Latência p95 de API | < 200ms | Grafana + Prometheus |\n| Tempo de carregamento\
    \ de página | < 2s (FCP), < 3s (LCP) | Lighthouse CI |\n| Throughput | 1000 req/s\
    \ por instância | K6 |\n| Tempo de query no banco | < 100ms p95 | Prisma logging\
    \ + PG Stats |\n| Tamanho de resposta JSON | < 500KB (com paginação) | Monitoramento\
    \ |\n\n### RNF02 — Segurança\n\n| Requisito | Implementação |\n|-----------|--------------|\n\
    | Autenticação | JWT + refresh token + OAuth2 |\n| Autorização | RBAC com guard\
    \ por endpoint |\n| Rate limiting | 100 req/min por IP, 1000 req/min por usuário\
    \ autenticado |\n| CORS | Whitelist de origens configurável |\n| Headers de segurança\
    \ | Helmet.js (CSP, X-Frame-Options, HSTS) |\n| Validação de entrada | Zod em\
    \ toda API |\n| Proteção contra XSS | Sanitização HTML em comentários |\n| Proteção\
    \ contra CSRF | CSRF token ou SameSite=Strict |\n| Hash de senha | bcrypt (cost\
    \ 12) |\n| Secrets management | AWS Secrets Manager / Azure Key Vault |\n\n###\
    \ RNF03 — Escalabilidade\n\n| Requisito | Estratégia |\n|-----------|-----------|\n\
    | Horizontal scaling | Backend stateless com sessão em Redis |\n| Database scaling\
    \ | Read replicas + connection pooling (PgBouncer) |\n| Cache | Redis para queries\
    \ frequentes e sessões |\n| Filas | Redis Bull para jobs assíncronos (e-mails,\
    \ relatórios) |\n| CDN | Assets estáticos no CloudFront / Cloudflare |\n| Auto-scaling\
    \ | Baseado em CPU/memória (HPA no Kubernetes) |\n\n### RNF04 — Observabilidade\n\
    \n| Componente | Ferramenta | O que monitorar |\n|------------|-----------|-----------------|\n\
    | Métricas | Prometheus + Grafana | CPU, memória, requests, latência, erros, throughput\
    \ |\n| Logs | OpenTelemetry + Loki | Logs estruturados (JSON), correlation ID\
    \ |\n| Tracing | OpenTelemetry + Jaeger | Trace de requisição completa (front\
    \ → back → banco) |\n| Uptime | Uptime Kuma / StatusCake | Health checks a cada\
    \ 30s |\n| Alertas | Grafana Alerting | Latência > 1s, erro > 1%, downtime |\n\
    | Dashboards | Grafana | Visão geral do sistema por tenant |\n\n### RNF05 — Disponibilidade\n\
    \n| Requisito | Meta |\n|-----------|------|\n| Uptime SLA | 99.9% (8h downtime/ano)\
    \ |\n| RPO (Recovery Point Objective) | 5 minutos |\n| RTO (Recovery Time Objective)\
    \ | 30 minutos |\n| Backup automático | Diário com retenção de 30 dias |\n| Disaster\
    \ Recovery | Multi-AZ na cloud |\n\n### RNF06 — Manutenibilidade\n\n| Requisito\
    \ | Prática |\n|-----------|---------|\n| Cobertura de testes | > 80% unitários,\
    \ > 60% integração |\n| Documentação | README, API Reference (Swagger), ADRs,\
    \ Runbook |\n| Padrão de código | ESLint + Prettier + Husky + Commitlint |\n|\
    \ Versionamento | SemVer + Conventional Commits |\n| CI/CD | GitHub Actions (lint\
    \ → test → build → deploy) |\n\n---\n\n## 5. Stack Tecnológica\n\n### 5.1 Decisão\
    \ de Stack\n\n| Camada | Tecnologia | Justificativa |\n|--------|-----------|---------------|\n\
    | Backend | NestJS + TypeScript | Framework Enterprise com DI, módulos, guards,\
    \ interceptors |\n| API | REST + GraphQL (opcional) | REST padrão; GraphQL para\
    \ dashboards complexos |\n| ORM | Prisma | Type-safe, migrations automáticas,\
    \ ótima DX |\n| Validação | Zod | Schemas compartilháveis, inferência de tipos\
    \ |\n| Autenticação | Passport + JWT + OAuth2 | Ecossistema maduro |\n| Banco\
    \ | PostgreSQL 16 | MVCC, JSONB, índices parciais, excelente para SaaS |\n| Cache\
    \ / Filas | Redis + Bull | Cache de queries, filas de job, sessões |\n| Frontend\
    \ | Next.js 14+ (App Router) | SSR, Server Components, Streaming, RSC |\n| UI\
    \ | Tailwind + shadcn/ui | Componentes acessíveis, customizáveis, design system\
    \ |\n| Estado | React Query + Zustand | Server state + client state |\n| Testes\
    \ | Vitest + Playwright + Supertest | Unitário, E2E, integração |\n| Container\
    \ | Docker + Docker Compose | Ambiente local idêntico ao produção |\n| Orquestração\
    \ | Kubernetes (ou Docker Swarm) | Para produção |\n| Cloud | AWS (ECS/EKS, RDS,\
    \ ElastiCache, S3) | Ou Azure/GCP — escolha do aluno |\n| CI/CD | GitHub Actions\
    \ | Pipeline completo |\n| Observabilidade | OpenTelemetry + Grafana + Loki +\
    \ Tempo | Stack open-source |\n\n### 5.2 Por que essa stack?\n"
