  text: "// Modelo único com tenant_id\ninterface User {\n  id: string;\n  tenant_id:\
    \ string;        // ← discriminador obrigatório\n  name: string;\n  email: string;\n\
    \  role: 'admin' | 'member';\n  created_at: Date;\n}\n\ninterface Order {\n  id:\
    \ string;\n  tenant_id: string;        // ← discriminador obrigatório\n  customer_name:\
    \ string;\n  total: number;\n  status: 'pending' | 'paid' | 'cancelled';\n  created_at:\
    \ Date;\n}"
  props:
    language: typescript
  children: []
- type: Code
  text: "// Repositório que SEMPRE filtra por tenant\nclass UserRepository {\n  constructor(private\
    \ tenantId: string) {}\n\n  async findAll(): Promise<User[]> {\n    return pool.query<User>(\n\
    \      'SELECT * FROM users WHERE tenant_id = $1 ORDER BY name',\n      [this.tenantId]\n\
    \    ).then(r => r.rows);\n  }\n\n  async findById(id: string): Promise<User |\
    \ null> {\n    const result = await pool.query<User>(\n      'SELECT * FROM users\
    \ WHERE id = $1 AND tenant_id = $2',\n      [id, this.tenantId]\n    );\n    return\
    \ result.rows[0] || null;\n  }\n\n  async create(data: Omit<User, 'id' | 'tenant_id'\
    \ | 'created_at'>): Promise<User> {\n    const result = await pool.query<User>(\n\
    \      `INSERT INTO users (tenant_id, name, email, role)\n       VALUES ($1, $2,\
    \ $3, $4)\n       RETURNING *`,\n      [this.tenantId, data.name, data.email,\
    \ data.role]\n    );\n    return result.rows[0];\n  }\n}"
  props:
    language: typescript
  children: []
