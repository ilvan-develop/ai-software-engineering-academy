- type: Code
  text: "1. Definir o DOMÍNIO do agente\n   → Qual área ele cobre? (ex: \"segurança\
    \ de aplicações web\")\n\n2. Definir o CONHECIMENTO BASE\n   → Quais tecnologias,\
    \ padrões e boas práticas ele domina?\n\n3. Definir RESPONSABILIDADES\n   → O\
    \ que ele faz? O que ele NÃO faz? (limites são importantes)\n\n4. Definir o PROCESSO\n\
    \   → Qual o fluxo de trabalho? O que recebe na entrada? O que entrega?\n\n5.\
    \ Criar CHECKLIST DE QUALIDADE\n   → O que validar antes de considerar o trabalho\
    \ concluído?\n\n6. Criar TEMPLATES DE PROMPT\n   → Prompts reutilizáveis para\
    \ as tarefas mais comuns\n\n7. TESTAR com um caso real\n   → Executar o agente,\
    \ revisar o output, ajustar"
  props:
    language: text
  children: []
