- type: Paragraph
  text: '**Database per Tenant:** Um vazamento de dados de um tenant não afeta os
    outros. Se um cliente exige compliance específico (LGPD, HIPAA, SOC2), pode-se
    isolar completamente em nível físico. Ataques de SQL injection ficam contidos
    no banco do tenant.'
  props: {}
  children:
  - type: Bold
    text: 'Database per Tenant:'
    props: {}
    children: []
  - type: Text
    text: ' Um vazamento de dados de um tenant não afeta os outros. Se um cliente
      exige compliance específico (LGPD, HIPAA, SOC2), pode-se isolar completamente
      em nível físico. Ataques de SQL injection ficam contidos no banco do tenant.'
    props: {}
    children: []
- type: Paragraph
  text: '**Schema per Tenant:** Um invasor que ganha acesso ao banco pode potencialmente
    acessar múltiplos schemas. A segurança depende das permissões do usuário do banco
    (`GRANT USAGE ON SCHEMA`). Idealmente, o usuário da aplicação tem acesso apenas
    ao schema do tenant atual.'
  props: {}
  children:
  - type: Bold
    text: 'Schema per Tenant:'
    props: {}
    children: []
  - type: Text
    text: ' Um invasor que ganha acesso ao banco pode potencialmente acessar múltiplos
      schemas. A segurança depende das permissões do usuário do banco ('
    props: {}
    children: []
  - type: InlineCode
    text: GRANT USAGE ON SCHEMA
    props: {}
    children: []
  - type: Text
    text: ). Idealmente, o usuário da aplicação tem acesso apenas ao schema do tenant
      atual.
    props: {}
    children: []
- type: Paragraph
  text: '**Shared Database:** Um SQL injection ou bug no `WHERE` expõe **todos os
    dados de todos os tenants**. Requer: - Testes de isolamento obrigatórios (ver
    seção 13) - Code review com checklist específico - Row-Level Security (RLS) do
    PostgreSQL como camada extra'
  props: {}
  children:
  - type: Bold
    text: 'Shared Database:'
    props: {}
    children: []
  - type: Text
    text: ' Um SQL injection ou bug no '
    props: {}
    children: []
  - type: InlineCode
    text: WHERE
    props: {}
    children: []
  - type: Text
    text: ' expõe '
    props: {}
    children: []
  - type: Bold
    text: todos os dados de todos os tenants
    props: {}
    children: []
  - type: Text
    text: '. Requer: - Testes de isolamento obrigatórios (ver seção 13) - Code review
      com checklist específico - Row-Level Security (RLS) do PostgreSQL como camada
      extra'
    props: {}
    children: []
- type: Code
  text: "-- Row-Level Security no PostgreSQL\nCREATE TABLE users (\n  id UUID PRIMARY\
    \ KEY,\n  tenant_id TEXT NOT NULL,\n  name TEXT NOT NULL,\n  email TEXT NOT NULL\n\
    );\n\n-- Habilitar RLS\nALTER TABLE users ENABLE ROW LEVEL SECURITY;\n\n-- Política:\
    \ usuário só vê linhas do seu tenant\nCREATE POLICY tenant_isolation ON users\n\
    \  USING (tenant_id = current_setting('app.tenant_id')::TEXT);\n\n-- Na aplicação,\
    \ antes de qualquer query:\nawait pool.query(\"SET app.tenant_id = 'acme'\");"
  props:
    language: sql
  children: []
