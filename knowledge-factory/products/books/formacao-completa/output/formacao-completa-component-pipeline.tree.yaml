- type: Code
  text: "1. Abertura (5min)\n   \"Obrigado por participar. Não estamos testando você.\n\
    \    Queremos entender como você lida com [assunto].\n    Pode ser sincero — críticas\
    \ nos ajudam.\"\n\n2. Contexto (10min)\n   \"Me conta como é seu dia a dia com\
    \ [assunto].\"\n   \"O que você mais usa hoje?\"\n   \"O que te frustra?\"\n\n\
    3. Profundidade (20min)\n   \"Me conta da última vez que você passou por [situação].\"\
    \n   \"O que você fez? O que aconteceu?\"\n   \"Se pudesse mudar uma coisa, o\
    \ que seria?\"\n\n4. Fechamento (5min)\n   \"Algo mais que gostaria de compartilhar?\"\
    \n   \"Posso voltar a te procurar se tiver mais perguntas?\""
  props:
    language: text
  children: []
- type: Paragraph
  text: '**Regras de ouro:** - Não faça perguntas indutoras ("Você não acha que X
    é melhor?") - Não pergunte "você usaria?" (todo mundo diz sim) - Pergunte sobre
    **comportamento passado**, não intenção futura - Escute mais do que fala (ratio
    80/20)'
  props: {}
  children:
