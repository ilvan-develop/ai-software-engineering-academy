- type: Code
  text: "@Controller('health')\nexport class HealthController {\n  constructor(\n\
    \    private prisma: PrismaService,\n    private redis: RedisService,\n  ) {}\n\
    \n  @Get()\n  async check(): Promise<HealthResponse> {\n    const checks = await\
    \ Promise.all([\n      this.checkComponent('database', () => this.prisma.$queryRaw`SELECT\
    \ 1`),\n      this.checkComponent('redis', () => this.redis.ping()),\n    ]);\n\
    \n    return {\n      status: checks.every(c => c.status === 'healthy') ? 'healthy'\
    \ : 'degraded',\n      timestamp: new Date().toISOString(),\n      checks,\n \
    \   };\n  }\n\n  private async checkComponent(name: string, check: () => Promise<unknown>)\
    \ {\n    try {\n      await check();\n      return { name, status: 'healthy' as\
    \ const };\n    } catch (error) {\n      return { name, status: 'unhealthy' as\
    \ const, error: (error as Error).message };\n    }\n  }\n}\n\n@Get('/ready')\n\
    async ready(): Promise<{ status: string }> {\n  // Readiness = todas as dependências\
    \ prontas\n  return this.check();\n}\n\n@Get('/live')\nasync live(): Promise<{\
    \ status: string }> {\n  // Liveness = servidor está rodando\n  return { status:\
    \ 'alive' };\n}"
  props:
    language: typescript
  children: []
