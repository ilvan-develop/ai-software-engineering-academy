- type: Subsubsection
  text: 'ADR-001: Modular Monolith com estratégia de extração para microservices'
  props:
    level: 4
  children:
  - type: Text
    text: 'ADR-001: Modular Monolith com estratégia de extração para microservices'
    props: {}
    children: []
- type: Paragraph
  text: '**Contexto:** Precisamos decidir entre Modular Monolith e Microservices.'
  props: {}
  children:
  - type: Bold
    text: 'Contexto:'
    props: {}
    children: []
  - type: Text
    text: ' Precisamos decidir entre Modular Monolith e Microservices.'
    props: {}
    children: []
- type: Paragraph
  text: '**Decisão:** Começar com Modular Monolith, com bounded contexts bem definidos.'
  props: {}
  children:
  - type: Bold
    text: 'Decisão:'
    props: {}
    children: []
  - type: Text
    text: ' Começar com Modular Monolith, com bounded contexts bem definidos.'
    props: {}
    children: []
- type: Paragraph
  text: '**Justificativa:** - Time pequeno (1–3 devs) — microservices trariam sobrecarga
    de comunicação e deploy - Domínio bem conhecido (gestão de projetos) — não justifica
    complexidade inicial - Bounded contexts bem definidos permitem extração futura
    para microservices sem reescrita'
  props: {}
  children:
  - type: Bold
    text: 'Justificativa:'
    props: {}
    children: []
  - type: Text
    text: ' - Time pequeno (1–3 devs) — microservices trariam sobrecarga de comunicação
      e deploy - Domínio bem conhecido (gestão de projetos) — não justifica complexidade
      inicial - Bounded contexts bem definidos permitem extração futura para microservices
      sem reescrita'
    props: {}
    children: []
- type: Paragraph
  text: '**Consequências:** - Positivas: deploy único, comunicação in-process, debug
    simples, CI/CD simples - Negativas: acoplamento indireto se módulos não forem
    disciplinados, escalonamento monolítico - Mitigação: módulos estritamente isolados
    com interfaces públicas e events entre contextos'
  props: {}
  children:
  - type: Bold
    text: 'Consequências:'
    props: {}
    children: []
  - type: Text
    text: ' - Positivas: deploy único, comunicação in-process, debug simples, CI/CD
      simples - Negativas: acoplamento indireto se módulos não forem disciplinados,
      escalonamento monolítico - Mitigação: módulos estritamente isolados com interfaces
      públicas e events entre contextos'
    props: {}
    children: []
- type: Subsubsection
  text: 'ADR-002: Multi-tenancy via discriminator column (tenant_id)'
  props:
    level: 4
  children:
  - type: Text
    text: 'ADR-002: Multi-tenancy via discriminator column (tenant_id)'
    props: {}
    children: []
- type: Paragraph
  text: '**Contexto:** Precisamos isolar dados de diferentes empresas.'
  props: {}
  children:
  - type: Bold
    text: 'Contexto:'
    props: {}
    children: []
  - type: Text
    text: ' Precisamos isolar dados de diferentes empresas.'
    props: {}
    children: []
- type: Paragraph
  text: '**Decisão:** Usar coluna `tenant_id` em todas as tabelas (discriminator column)
    + RLS no PostgreSQL.'
  props: {}
  children:
  - type: Bold
    text: 'Decisão:'
    props: {}
    children: []
  - type: Text
    text: ' Usar coluna '
    props: {}
    children: []
  - type: InlineCode
    text: tenant_id
    props: {}
    children: []
  - type: Text
    text: ' em todas as tabelas (discriminator column) + RLS no PostgreSQL.'
    props: {}
    children: []
- type: Paragraph
  text: '**Justificativa:** - Menos complexo que schema por tenant (sem migrations
    N×) - Mais isolado que database por tenant (sem conexões N×) - RLS garante que
    nenhuma query vaze dados entre tenants - Backup e restore mais simples (único
    banco)'
  props: {}
  children:
  - type: Bold
    text: 'Justificativa:'
    props: {}
    children: []
  - type: Text
    text: ' - Menos complexo que schema por tenant (sem migrations N×) - Mais isolado
      que database por tenant (sem conexões N×) - RLS garante que nenhuma query vaze
      dados entre tenants - Backup e restore mais simples (único banco)'
    props: {}
    children: []
- type: Paragraph
  text: '**Consequências:** - Positivas: backup único, migrations únicas, custo menor
    - Negativas: contenção em tabelas grandes, necessidade de índices cuidadosos -
    Mitigação: índices compostos (tenant_id + id), partition by tenant em tabelas
    grandes'
  props: {}
  children:
  - type: Bold
    text: 'Consequências:'
    props: {}
    children: []
  - type: Text
    text: ' - Positivas: backup único, migrations únicas, custo menor - Negativas:
      contenção em tabelas grandes, necessidade de índices cuidadosos - Mitigação:
      índices compostos (tenant_id + id), partition by tenant em tabelas grandes'
    props: {}
    children: []
- type: Subsubsection
  text: 'ADR-003: Event-driven para comunicação entre módulos'
  props:
    level: 4
  children:
  - type: Text
    text: 'ADR-003: Event-driven para comunicação entre módulos'
    props: {}
    children: []
- type: Paragraph
  text: '**Contexto:** Módulos precisam se comunicar sem acoplamento direto (ex: ao
    criar tarefa, notificar usuário).'
  props: {}
  children:
  - type: Bold
    text: 'Contexto:'
    props: {}
    children: []
  - type: Text
    text: ' Módulos precisam se comunicar sem acoplamento direto (ex: ao criar tarefa,
      notificar usuário).'
    props: {}
    children: []
- type: Paragraph
  text: '**Decisão:** Usar Event Emitter in-process (para o monólito) com interface
    que permita migrar para message broker.'
  props: {}
  children:
  - type: Bold
    text: 'Decisão:'
    props: {}
    children: []
  - type: Text
    text: ' Usar Event Emitter in-process (para o monólito) com interface que permita
      migrar para message broker.'
    props: {}
    children: []
- type: Paragraph
  text: '**Justificativa:** - Módulos não se importam com quem consome seus eventos
    - Fácil adicionar novos consumers sem modificar producers - Se um dia migrar para
    microservices, os eventos já estão definidos'
  props: {}
  children:
  - type: Bold
    text: 'Justificativa:'
    props: {}
    children: []
  - type: Text
    text: ' - Módulos não se importam com quem consome seus eventos - Fácil adicionar
      novos consumers sem modificar producers - Se um dia migrar para microservices,
      os eventos já estão definidos'
    props: {}
    children: []
- type: Paragraph
  text: '**Consequências:** - Positivas: baixo acoplamento, extensível, testável -
    Negativas: complexidade adicional (eventos precisam ser versionados) - Mitigação:
    eventos versionados (v1, v2), schemas de evento validados com Zod'
  props: {}
  children:
  - type: Bold
    text: 'Consequências:'
    props: {}
    children: []
  - type: Text
    text: ' - Positivas: baixo acoplamento, extensível, testável - Negativas: complexidade
      adicional (eventos precisam ser versionados) - Mitigação: eventos versionados
      (v1, v2), schemas de evento validados com Zod'
    props: {}
    children: []
- type: Subsubsection
  text: 'ADR-004: Next.js App Router com Server Components'
  props:
    level: 4
  children:
  - type: Text
    text: 'ADR-004: Next.js App Router com Server Components'
    props: {}
    children: []
- type: Paragraph
  text: '**Contexto:** Precisamos de SSR para SEO e performance, mas também de interatividade
    rica.'
  props: {}
  children:
  - type: Bold
    text: 'Contexto:'
    props: {}
    children: []
  - type: Text
    text: ' Precisamos de SSR para SEO e performance, mas também de interatividade
      rica.'
    props: {}
    children: []
- type: Paragraph
  text: '**Decisão:** Next.js 14+ App Router com Server Components por padrão, Client
    Components onde necessário.'
  props: {}
  children:
  - type: Bold
    text: 'Decisão:'
    props: {}
    children: []
  - type: Text
    text: ' Next.js 14+ App Router com Server Components por padrão, Client Components
      onde necessário.'
    props: {}
    children: []
- type: Paragraph
  text: '**Justificativa:** - Server Components diminuem JS enviado ao cliente - Streaming
    melhora percepção de performance - App Router oferece layout aninhado, loading
    states, error boundaries nativos'
  props: {}
  children:
  - type: Bold
    text: 'Justificativa:'
    props: {}
    children: []
  - type: Text
    text: ' - Server Components diminuem JS enviado ao cliente - Streaming melhora
      percepção de performance - App Router oferece layout aninhado, loading states,
      error boundaries nativos'
    props: {}
    children: []
- type: Paragraph
  text: '**Consequências:** - Positivas: performance, SEO, DX moderna - Negativas:
    curva de aprendizado (server vs client mental model) - Mitigação: documentar decisão
    de componente server vs client no design system'
  props: {}
  children:
  - type: Bold
    text: 'Consequências:'
    props: {}
    children: []
  - type: Text
    text: ' - Positivas: performance, SEO, DX moderna - Negativas: curva de aprendizado
      (server vs client mental model) - Mitigação: documentar decisão de componente
      server vs client no design system'
    props: {}
    children: []
