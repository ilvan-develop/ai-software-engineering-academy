- type: Code
  text: '# Roteiro de entrevista — Exemplo


    ## Abertura (5 min)

    - "Conte um pouco sobre seu trabalho/dia a dia"

    - "Como você lida com [tópico] atualmente?"


    ## Exploração (15 min)

    - "Me conte a última vez que você precisei fazer [ação]"

    - "O que foi mais frustrante nesse processo?"

    - "O que você fez para contornar?"


    ## Aprofundamento (10 min)

    - "Por que isso é importante para você?"

    - "O que aconteceria se você não conseguisse fazer isso?"

    - "Como você descreveria a solução ideal?"


    ## Fechamento (5 min)

    - "Mais alguma coisa que gostaria de compartilhar?"

    - "Posso voltar a falar com você se surgir mais dúvidas?"'
  props:
    language: markdown
  children: []
- type: Paragraph
  text: '**Regras de ouro para entrevistas:**'
  props: {}
  children:
  - type: Bold
    text: 'Regras de ouro para entrevistas:'
    props: {}
    children: []
- type: Code
  text: "✅ Faça:\n  • Perguntas abertas (\"Me conte sobre...\")\n  • Escute mais do\
    \ que fala (proporção 80/20)\n  • Pergunte \"por quê?\" repetidamente (técnica\
    \ dos 5 porquês)\n  • Observe linguagem corporal e tom de voz\n  • Registre com\
    \ autorização (áudio/anotações)\n\n❌ Não faça:\n  • Perguntas direcionadas (\"\
    Você não acha que...\")\n  • Perguntas fechadas (\"Você usa X? Sim ou não?\")\n\
    \  • Interromper o usuário\n  • Defender ideias ou justificar o sistema atual\n\
    \  • Buscar validação para sua solução"
