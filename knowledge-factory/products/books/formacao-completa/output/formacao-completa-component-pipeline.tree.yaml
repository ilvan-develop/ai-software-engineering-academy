- type: Code
  text: "// abilities.ts\nexport type Action = 'manage' | 'create' | 'read' | 'update'\
    \ | 'delete';\nexport type Subject = 'User' | 'Order' | 'Product' | 'Report' |\
    \ 'all';\n\nexport function defineAbilitiesFor(user: User): PureAbility {\n  return\
    \ AbilityBuilder.define((can, cannot) => {\n    // Admin pode fazer tudo\n   \
    \ if (user.role === 'admin') {\n      can('manage', 'all');\n      return;\n \
    \   }\n\n    // Usuário comum\n    can('read', 'User', { id: user.id });     \
    \  // só próprio perfil\n    can('read', 'Order', { userId: user.id });  // só\
    \ seus pedidos\n    can('create', 'Order');                      // criar pedidos\n\
    \    can('update', 'Order', { userId: user.id, status: 'pending' });\n\n    //\
    \ Gerente pode ver relatórios\n    if (user.role === 'manager') {\n      can('read',\
    \ 'Report');\n      can('read', 'User', { tenantId: user.tenantId });\n    }\n\
    \n    // Ninguém pode deletar\n    cannot('delete', 'all');\n  });\n}"
  props:
    language: typescript
  children: []
