- type: Code
  text: "// Consentimento\ninterface Consentimento {\n  usuarioId: string;\n  finalidade:\
    \ string; // \"marketing\", \"analytics\", \"essencial\"\n  autorizado: boolean;\n\
    \  data: DateTime;\n}\n\n// Direito de exclusão (right to erasure)\nasync function\
    \ esquecerUsuario(usuarioId: string) {\n  await prisma.usuario.update({\n    where:\
    \ { id: usuarioId },\n    data: {\n      nome: anonimizar(usuario.nome),\n   \
    \   email: anonimizar(usuario.email),\n      deletedAt: new Date(),\n    },\n\
    \  });\n  await prisma.consentimento.deleteMany({\n    where: { usuarioId },\n\
    \  });\n}"
