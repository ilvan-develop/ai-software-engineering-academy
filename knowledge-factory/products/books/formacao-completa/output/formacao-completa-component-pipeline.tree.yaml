- type: Code
  text: "function resolveTenant(req: Request): string {\n  // Prioridade: JWT → Header\
    \ → Subdomínio → Path\n  return (\n    extractTenantFromJwt(req.headers.authorization)\
    \ ??\n    extractTenantFromHeader(req) ??\n    extractTenantFromHost(req.hostname)\
    \ ??\n    extractTenantFromPath(req.path) ??\n    (() => { throw new BadRequestException('Tenant\
    \ não identificado'); })()\n  );\n}"
  props:
    language: typescript
