  text: "name: CI\n\non: [push, pull_request]\n\njobs:\n  test:\n    runs-on: ubuntu-latest\n\
    \n    services:\n      postgres:\n        image: postgres:16-alpine\n        env:\n\
    \          POSTGRES_USER: test\n          POSTGRES_PASSWORD: test\n          POSTGRES_DB:\
    \ test\n        ports:\n          - 5432:5432\n        options: >-\n         \
    \ --health-cmd pg_isready\n          --health-interval 10s\n          --health-timeout\
    \ 5s\n          --health-retries 5\n\n    steps:\n      - uses: actions/checkout@v4\n\
    \      - uses: actions/setup-node@v4\n        with:\n          node-version: 20\n\
    \          cache: 'npm'\n\n      - run: npm ci\n\n      - name: Lint\n       \
    \ run: npm run lint\n\n      - name: Type check\n        run: npm run typecheck\n\
    \n      - name: Unit tests\n        run: npm run test -- --coverage\n\n      -\
    \ name: E2E tests\n        run: npm run test:e2e\n\n      - name: Upload coverage\n\
    \        uses: actions/upload-artifact@v4\n        with:\n          name: coverage\n\
    \          path: coverage/"
