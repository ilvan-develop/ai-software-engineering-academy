- type: Code
  text: "// tenant.command.ts\nimport { Command, CommandRunner } from 'nest-commander';\n\
    import { TenantService } from './tenant.service';\n\n@Command({ name: 'tenant:create',\
    \ description: 'Cria novo tenant com seed' })\nexport class TenantCommand extends\
    \ CommandRunner {\n  constructor(private tenantService: TenantService) {\n   \
    \ super();\n  }\n\n  async run(inputs: string[]): Promise<void> {\n    const [slug,\
    \ name, plan = 'free'] = inputs;\n\n    if (!slug || !name) {\n      console.error('Uso:\
    \ tenant:create <slug> <name> [plan]');\n      process.exit(1);\n    }\n\n   \
    \ console.log(`Criando tenant: ${slug} (${name}) - Plano: ${plan}`);\n    const\
    \ tenant = await this.tenantService.createTenant({ slug, name, plan });\n    console.log(`✅\
    \ Tenant ${tenant.slug} criado com sucesso!`);\n  }\n}"
