    │  ┌──────────┐  ┌──────────┐  ┌──────────┐    │

    │  │ DB Acme  │  │ DB Zeta  │  │ DB Omega │    │

    │  │ tenant_1 │  │ tenant_2 │  │ tenant_3 │    │

