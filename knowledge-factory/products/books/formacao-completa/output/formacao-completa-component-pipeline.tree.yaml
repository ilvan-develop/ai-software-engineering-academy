  text: "// 1. RED — Escrever teste primeiro\ndescribe('OrderService', () => {\n \
    \ it('não deve criar pedido com valor abaixo do mínimo', () => {\n    const items\
    \ = [{ productId: '1', price: 5, quantity: 1 }]; // total: 5\n    const MIN_ORDER_VALUE\
    \ = 10;\n\n    expect(() => service.create({ items })).toThrow(\n      'Valor\
    \ mínimo do pedido é R$ 10,00'\n    );\n  });\n});\n\n// 2. GREEN — Código mínimo\
    \ para passar\nclass OrderService {\n  create(input: CreateOrderInput): Order\
    \ {\n    const total = input.items.reduce((acc, i) => acc + i.price * i.quantity,\
    \ 0);\n\n    if (total < 10) {\n      throw new Error('Valor mínimo do pedido\
    \ é R$ 10,00');\n    }\n\n    return Order.create(input);\n  }\n}\n\n// 3. REFACTOR\
    \ — Melhorar sem quebrar testes\n// Extrair constante, melhorar mensagem\n\n\n\
    \n\n# Observabilidade\n\n# Módulo 16 — Observabilidade: Logs, Métricas e Tracing\n\
    \n**Entendendo o que acontece em produção.**\n\n---\n\n## 1. O que é observabilidade?\n\
    \nObservabilidade é a capacidade de **entender o estado interno do sistema** a\
    \ partir de seus outputs externos (logs, métricas, traces).\n\n### Os 3 pilares\n"
