- type: Code
  text: "// app.module.ts\nimport { Module, NestModule, MiddlewareConsumer } from\
    \ '@nestjs/common';\nimport { TenantMiddleware } from './tenant/tenant.middleware';\n\
    \n@Module({\n  imports: [TenantModule],\n})\nexport class AppModule implements\
    \ NestModule {\n  configure(consumer: MiddlewareConsumer) {\n    consumer\n  \
    \    .apply(TenantMiddleware)\n      .exclude(\n        'auth/(.*)',   // login\
    \ não precisa de tenant\n        'health',       // health check\n        'public/(.*)',\
    \  // páginas públicas\n      )\n      .forRoutes('*');\n  }\n}"
