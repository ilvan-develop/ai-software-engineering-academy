- type: Code
  text: "// ❌ Ruim: renomear coluna diretamente (quebra queries em execução)\nmodel\
    \ User {\n  fullname String  // Antigo\n  name     String  // Novo — erro se ambas\
    \ existirem\n}\n\n// ✅ Bom: expand-migrate-contract\n// Passo 1: Adicionar nova\
    \ coluna (sem remover antiga)\nmodel User {\n  fullname String?  // Nullable agora\n\
    \  name     String?\n}\n\n// Passo 2: Preencher dados (script separado)\nawait\
    \ prisma.user.updateMany({\n  where: { name: null },\n  data: { name: prisma.user.fullname\
    \ }, // valor do campo antigo\n});\n\n// Passo 3: Remover coluna antiga (próxima\
    \ release)\nmodel User {\n  name String  // Único campo\n}"
  props:
    language: prisma
