- type: Code
  text: "// feature-flags.ts\ninterface PlanFeatures {\n  maxUsers: number;\n  maxProjects:\
    \ number;\n  maxStorageMB: number;\n  customDomain: boolean;\n  apiAccess: boolean;\n\
    \  advancedReports: boolean;\n  auditLog: boolean;\n  prioritySupport: boolean;\n\
    \  ssoEnabled: boolean;\n  whiteLabel: boolean;\n}\n\nconst PLANS: Record<string,\
    \ PlanFeatures> = {\n  free: {\n    maxUsers: 5,\n    maxProjects: 10,\n    maxStorageMB:\
    \ 100,\n    customDomain: false,\n    apiAccess: false,\n    advancedReports:\
    \ false,\n    auditLog: false,\n    prioritySupport: false,\n    ssoEnabled: false,\n\
    \    whiteLabel: false,\n  },\n  pro: {\n    maxUsers: 50,\n    maxProjects: 100,\n\
    \    maxStorageMB: 5_000,\n    customDomain: false,\n    apiAccess: true,\n  \
    \  advancedReports: true,\n    auditLog: true,\n    prioritySupport: false,\n\
    \    ssoEnabled: false,\n    whiteLabel: false,\n  },\n  enterprise: {\n    maxUsers:\
    \ Infinity,\n    maxProjects: Infinity,\n    maxStorageMB: Infinity,\n    customDomain:\
    \ true,\n    apiAccess: true,\n    advancedReports: true,\n    auditLog: true,\n\
    \    prioritySupport: true,\n    ssoEnabled: true,\n    whiteLabel: true,\n  },\n\
    };"
  props:
    language: typescript
  children: []
- type: Code
  text: "// feature-flag.service.ts\nimport { Injectable } from '@nestjs/common';\n\
    import { TenantService } from './tenant.service';\n\n@Injectable()\nexport class\
    \ FeatureFlagService {\n  constructor(private tenantService: TenantService) {}\n\
    \n  private get planFeatures(): PlanFeatures {\n    const plan = this.tenantService.getPlan();\n\
    \    return PLANS[plan] || PLANS.free;\n  }\n\n  isFeatureEnabled(feature: keyof\
    \ PlanFeatures): boolean {\n    const value = this.planFeatures[feature];\n  \
    \  return typeof value === 'boolean' ? value : false;\n  }\n\n  getLimit(resource:\
    \ 'maxUsers' | 'maxProjects' | 'maxStorageMB'): number {\n    const value = this.planFeatures[resource];\n\
    \    return typeof value === 'number' ? value : Infinity;\n  }\n\n  async checkLimit(resource:\
    \ 'maxUsers' | 'maxProjects' | 'maxStorageMB'): Promise<void> {\n    const limit\
    \ = this.getLimit(resource);\n    if (limit === Infinity) return;\n\n    const\
    \ current = await this.getCurrentUsage(resource);\n    if (current >= limit) {\n\
    \      throw new Error(\n        `Limite de ${resource} excedido (${current}/${limit}).\
    \ Faça upgrade do plano.`\n      );\n    }\n  }\n\n  private async getCurrentUsage(resource:\
    \ string): Promise<number> {\n    const tenantId = this.tenantService.getTenantId();\n\
    \    // Consultar banco para contagem atual\n    switch (resource) {\n      case\
    \ 'maxUsers':\n        return /* COUNT de users do tenant */ 3;\n      case 'maxProjects':\n\
    \        return /* COUNT de projects do tenant */ 7;\n      case 'maxStorageMB':\n\
    \        return /* SUM de tamanho de arquivos */ 50;\n      default:\n       \
    \ return 0;\n    }\n  }\n\n  getAllFeatures(): PlanFeatures {\n    return { ...this.planFeatures\
    \ };\n  }\n}"
  props:
    language: typescript
  children: []
