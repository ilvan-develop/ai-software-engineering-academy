- type: Code
  text: "// prisma-tenant.middleware.ts\nimport { PrismaClient } from '@prisma/client';\n\
    import { tenantContext } from './tenant-context';\n\nexport function createTenantMiddleware(prisma:\
    \ PrismaClient): void {\n  prisma.$use(async (params, next) => {\n    const ctx\
    \ = tenantContext.getStore();\n    if (!ctx) return next(params);\n\n    // Adiciona\
    \ tenantId automaticamente em creates\n    if (params.action === 'create' && params.args.data)\
    \ {\n      params.args.data.tenantId = ctx.tenantId;\n    }\n\n    // Adiciona\
    \ filtro de tenant em finds\n    if (\n      ['findMany', 'findFirst', 'findUnique',\
    \ 'update', 'delete'].includes(params.action)\n    ) {\n      const where = params.args.where\
    \ ?? {};\n      where.tenantId = ctx.tenantId;\n      params.args.where = where;\n\
    \    }\n\n    return next(params);\n  });\n}\n\n// Inicialização\nconst prisma\
    \ = new PrismaClient();\ncreateTenantMiddleware(prisma);"
  props:
    language: typescript
  children: []
