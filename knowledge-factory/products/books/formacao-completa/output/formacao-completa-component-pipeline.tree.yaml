    \ uptime\n    target: 99.9%\n    window: 30d\n\n  latency:\n    sli: p99 response\
    \ time\n    target: < 300ms\n    window: 28d\n    measurement: percentil 99 a\
    \ cada 5min\n\n  error_rate:\n    sli: http 5xx / total requests\n    target:\
    \ < 0.1%\n    window: 7d\n\n  freshness:\n    sli: last successful data sync\n\
