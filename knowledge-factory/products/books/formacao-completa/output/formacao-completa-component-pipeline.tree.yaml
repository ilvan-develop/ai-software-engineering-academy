- type: Code
  text: "// Molécula: Campo de texto (Label + Input + ErrorMessage)\ninterface TextFieldProps\
    \ {\n  label: string;\n  name: string;\n  value: string;\n  onChange: (value:\
    \ string) => void;\n  error?: string;\n  required?: boolean;\n}\n\nfunction TextField({\
    \ label, name, value, onChange, error, required }: TextFieldProps) {\n  return\
    \ (\n    <div className=\"flex flex-col gap-1.5\">\n      <Label text={label}\
    \ variant={required ? 'required' : 'default'} size=\"md\" />\n      <Input\n \
    \       name={name}\n        value={value}\n        onChange={onChange}\n    \
    \    hasError={!!error}\n      />\n      {error && <ErrorMessage text={error}\
    \ />}\n    </div>\n  );\n}"
