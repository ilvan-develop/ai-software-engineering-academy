- type: Code
  text: "// tenant.service.ts\nimport { Injectable, Scope } from '@nestjs/common';\n\
    \ninterface Tenant {\n  id: string;\n  name: string;\n  plan: 'free' | 'pro' |\
    \ 'enterprise';\n}\n\n@Injectable({ scope: Scope.REQUEST })\nexport class TenantService\
    \ {\n  private tenant!: Tenant;\n\n  setTenant(tenant: Tenant) {\n    this.tenant\
    \ = tenant;\n  }\n\n  getTenant(): Tenant {\n    if (!this.tenant) {\n      throw\
    \ new Error('Tenant não configurado para esta requisição');\n    }\n    return\
    \ this.tenant;\n  }\n\n  getTenantId(): string {\n    return this.getTenant().id;\n\
    \  }\n\n  getPlan(): string {\n    return this.getTenant().plan;\n  }\n\n  isEnterprise():\
    \ boolean {\n    return this.getPlan() === 'enterprise';\n  }\n}"
  props:
    language: typescript
  children: []
