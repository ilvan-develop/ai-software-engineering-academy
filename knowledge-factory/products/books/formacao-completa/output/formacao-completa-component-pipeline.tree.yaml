- type: Paragraph
  text: 1. **Design Thinking** é uma abordagem human-centered para resolver problemas
    complexos 2. **5 fases não-lineares:** Empatizar → Definir → Ideiar → Prototipar
    → Testar 3. **Empatia** é a base — entrevistas, observação e imersão revelam necessidades
    reais 4. **Definir** sintetiza aprendizados em problem statement e perguntas HMW
    5. **Ideiar** prioriza quantidade com brainstorming, Crazy 8 e matriz impacto
    x esforço 6. **Prototipar** vai do papel ao código, do rápido ao refinado 7. **Testar**
    valida com usuários reais e alimenta o ciclo de iteração 8. **Design Thinking
    + Ágil** funciona com Discovery Sprints e Kanban com discovery track 9. **Em Enterprise**,
    DesignOps e workshops estruturados escalam a prática 10. **Anti-padrões** incluem
    pular empatia, prototipar cedo demais e testar com amigos
