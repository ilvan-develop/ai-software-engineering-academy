- type: Code
  text: "name: CI\n\non:\n  push:\n    branches: [main, develop]\n  pull_request:\n\
    \    branches: [main]\n\njobs:\n  lint:\n    runs-on: ubuntu-latest\n    steps:\n\
    \      - uses: actions/checkout@v4\n      - uses: actions/setup-node@v4\n    \
    \    with:\n          node-version: 20\n          cache: 'npm'\n      - run: npm\
    \ ci\n      - run: npm run lint\n      - run: npm run typecheck\n\n  test:\n \
    \   runs-on: ubuntu-latest\n    services:\n      postgres:\n        image: postgres:16-alpine\n\
    \        env:\n          POSTGRES_USER: test\n          POSTGRES_PASSWORD: test\n\
    \          POSTGRES_DB: test\n        ports:\n          - 5432:5432\n        options:\
    \ >-\n          --health-cmd pg_isready\n          --health-interval 10s\n   \
    \       --health-timeout 5s\n          --health-retries 5\n    steps:\n      -\
    \ uses: actions/checkout@v4\n      - uses: actions/setup-node@v4\n        with:\n\
    \          node-version: 20\n          cache: 'npm'\n      - run: npm ci\n   \
    \   - run: npm run test -- --coverage\n      - uses: actions/upload-artifact@v4\n\
    \        with:\n          name: coverage\n          path: coverage/\n\n  build:\n\
    \    runs-on: ubuntu-latest\n    needs: [lint, test]\n    steps:\n      - uses:\
    \ actions/checkout@v4\n      - run: docker build -t app:${{ github.sha }} .\n\
    \      - run: docker tag app:${{ github.sha }} app:latest"
  props:
    language: yaml
  children: []
