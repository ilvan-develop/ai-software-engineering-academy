- type: Code
  text: "// Exemplo: audit log em uma operação crítica\ninterface AuditEntry {\n \
    \ id: string;\n  timestamp: Date;\n  userId: string;\n  action: 'CREATE' | 'UPDATE'\
    \ | 'DELETE' | 'READ';\n  resource: string;     // ex: 'user', 'invoice', 'contract'\n\
    \  resourceId: string;\n  previousValue?: unknown;\n  newValue?: unknown;\n  ipAddress?:\
    \ string;\n  userAgent?: string;\n}\n\nasync function createAuditLog(entry: AuditEntry):\
    \ Promise<void> {\n  // Audit logs são APPEND-ONLY (nunca alterar/excluir)\n \
    \ await db.auditLog.create({ data: entry });\n}\n\n// Uso\nawait createAuditLog({\n\
    \  userId: req.user.id,\n  action: 'DELETE',\n  resource: 'user',\n  resourceId:\
    \ userIdToDelete,\n  previousValue: userBeforeDelete,\n  ipAddress: req.ip,\n\
    });"
  props:
    language: typescript
