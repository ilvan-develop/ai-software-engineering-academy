        AUD --> DOCS["fa:fa-book-open Documentation Agent"]

        style PD fill:#E3F2FD,stroke:#1A237E
        style UX fill:#E3F2FD,stroke:#1A237E
        style UI fill:#E3F2FD,stroke:#1A237E
        style EA fill:#F3E5F5,stroke:#1A237E
        style QA fill:#FFF8E1,stroke:#1A237E
        style DO fill:#E8F5E9,stroke:#1A237E
        style DOCS fill:#E8F5E9,stroke:#1A237E

