    caption: "Arvore de agentes da Book Factory. Cada categoria tem agentes especializados que podem ser combinados em pipelines de acordo com a necessidade do projeto."

  # ─────────────────────────────────────────────
  # DIAGRAMA 8: Pipeline de Features
  # ─────────────────────────────────────────────
  # Refinamento do diagrama existente, removendo ASCII
  # Local: book.md linhas 725-779
  - id: "feature-pipeline"
    title: "Pipeline de Desenvolvimento de Features com IA"
    chapter: 2
    replaces: "mermaid + ascii (linhas 725-779)"
    type: "flowchart"

    mermaid: |
      graph TB
        PD["fa:fa-chart-line Product Discovery"] --> UX["fa:fa-user-gear UX Designer"]
        UX --> UI["fa:fa-pen UI Designer"]
        EA["fa:fa-sitemap Enterprise Architect"] -.-> PD
        EA -.-> UX
        EA -.-> UI

        subgraph IMPL["Implementacao"]
            BE["fa:fa-server Backend Expert"]
            FE["fa:fa-code Frontend Expert"]
            PE["fa:fa-database Prisma Expert"]
            SE["fa:fa-lock Security Expert"]
        end

        UI --> BE
        UI --> FE
        UI --> PE
        UI --> SE

        BE --> QA["fa:fa-check-double QA Expert"]
        FE --> QA
        PE --> QA
        SE --> QA

        QA --> DO["fa:fa-rocket DevOps Expert"]
