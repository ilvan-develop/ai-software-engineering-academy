  # ─────────────────────────────────────────────
  # DIAGRAMA 9: Pipeline de Auditoria
  # ─────────────────────────────────────────────
  # Refinamento do existente
  # Local: book.md linhas 783-822
  - id: "audit-pipeline"
    title: "Pipeline de Auditoria de Codigo com IA"
    chapter: 2
    replaces: "mermaid + ascii (linhas 783-822)"
    type: "flowchart"

    mermaid: |
      graph TB
        FI["fa:fa-code Feature Implementada"] --> SA["fa:fa-lock Security Auditor"]
        SA -->|"Blocker/Critical"| BE["fa:fa-server Backend Expert<br/>corrige"]
        SA -->|"OK"| AA["fa:fa-sitemap Architecture Auditor"]
        AA -->|"Problema"| EA["fa:fa-sitemap Enterprise Architect<br/>revisa"]
        AA -->|"OK"| PA["fa:fa-gauge-high Performance Auditor"]
        PA -->|"Lento"| PX["fa:fa-gauge-high Performance Expert<br/>otimiza"]
        PA -->|"OK"| CQA["fa:fa-check-double Code Quality Auditor"]
        CQA -->|"Abaixo padrao"| RA["fa:fa-rotate Refactoring Agent"]
        CQA -->|"OK"| RPT["fa:fa-file-lines Relatorio Consolidado"]

        style FI fill:#E8F5E9,stroke:#2E7D32
        style SA fill:#FFEBEE,stroke:#C62828
        style AA fill:#FFF8E1,stroke:#F57F17
        style PA fill:#FFF8E1,stroke:#F57F17
        style CQA fill:#E3F2FD,stroke:#1A237E
        style RPT fill:#E8F5E9,stroke:#2E7D32

    caption: "Pipeline de auditoria em 4 etapas. Cada auditor especializado verifica um aspecto diferente. Se encontrar problemas, o agente especialista correspondente corrige."

  # ─────────────────────────────────────────────
  # DIAGRAMA 10: Pipeline CI/CD
  # ─────────────────────────────────────────────
  # NOVO — diagrama que precede o YAML do GitHub Actions
  # Local: book.md antes da secao 2 do Cap 3
  - id: "cicd-flow"
    title: "Fluxo de uma Pipeline CI/CD"
    chapter: 3
    replaces: "none (novo — precede o codigo YAML)"
    type: "flowchart"

    mermaid: |
      graph LR
        GIT["fa:fa-code-branch Git Push"] --> LINT["fa:fa-code Lint & Format"]
        LINT --> TEST["fa:fa-flask Testes Unitarios"]
        TEST --> INTEG["fa:fa-flask Testes Integracao"]
        INTEG --> BUILD["fa:fa-box Build"]
        BUILD --> SEC["fa:fa-lock Seguranca"]
        SEC -->|"Falha"| FIX["fa:fa-bug Corrigir"]
        SEC -->|"Passou"| DEPLOY["fa:fa-rocket Deploy"]
        DEPLOY --> HEALTH["fa:fa-heart-pulse Health Check"]
        HEALTH -->|"OK"| DONE["fa:fa-check Concluido"]
        HEALTH -->|"Falha"| ROLLBACK["fa:fa-rotate-left Rollback"]
        FIX --> GIT
        ROLLBACK --> DEPLOY

        style GIT fill:#E3F2FD,stroke:#1A237E
        style LINT fill:#E3F2FD,stroke:#1A237E
        style TEST fill:#E3F2FD,stroke:#1A237E
        style INTEG fill:#E3F2FD,stroke:#1A237E
        style BUILD fill:#F3E5F5,stroke:#7B1FA2
        style SEC fill:#FFF8E1,stroke:#F57F17
        style DEPLOY fill:#E8F5E9,stroke:#2E7D32
        style HEALTH fill:#E8F5E9,stroke:#2E7D32
        style DONE fill:#E8F5E9,stroke:#2E7D32
        style FIX fill:#FFEBEE,stroke:#C62828
        style ROLLBACK fill:#FFEBEE,stroke:#C62828

    caption: "Fluxo de CI/CD completo. Cada estagio so avanca se o anterior passar. Seguranca e health check tem gates de aprovacao. Rollback automatico em caso de falha."

  # ─────────────────────────────────────────────
  # DIAGRAMA 11: Piramide de Testes
  # ─────────────────────────────────────────────
  # NOVO — atualmente so texto
  # Local: book.md linha 1229
  - id: "testing-pyramid"
    title: "Piramide de Testes Automatizados"
    chapter: 3
    replaces: "text (linha 1229)"
    type: "flowchart"

    mermaid: |
      graph TB
        subgraph PI[" "]
            direction TB
            E2E["E2E Tests<br/>Poucos | Lentos | Alto custo"]
            INTG["Integration Tests<br/>Alguns | Medios | Custo medio"]
            UNIT["Unit Tests<br/>Muitos | Rapidos | Baixo custo"]
        end

        E2E --> INTG
        INTG --> UNIT

        style E2E fill:#E3F2FD,stroke:#1A237E,color:#1A237E
        style INTG fill:#E8F5E9,stroke:#2E7D32
        style UNIT fill:#FFF8E1,stroke:#F57F17

    caption: "Piramide de testes: muitos testes unitarios na base, poucos testes E2E no topo. Respeitar essa proporcao maximiza a velocidade e confianca da suíte de testes."

  # ─────────────────────────────────────────────
  # DIAGRAMA 12: Blue-Green Deployment
  # ─────────────────────────────────────────────
  # Refinamento do existente
  # Local: book.md linhas 1500-1523
  - id: "blue-green-deploy"
    title: "Blue-Green Deployment"
    chapter: 3
    replaces: "mermaid + ascii (linhas 1500-1523)"
    type: "flowchart"

    mermaid: |
      graph LR
        USERS["fa:fa-users Usuarios"] --> LB["fa:fa-arrow-trend-up Load Balancer"]
        LB -->|"Atual (100%)"| BLUE["Blue v1.0<br/>(Atual)"]
        LB -.->|"DNS Switch"| GREEN["Green v1.1<br/>(Nova)"]

        BLUE -->|"Rollback: reverter DNS"| GREEN

        style USERS fill:#E3F2FD,stroke:#1A237E
        style LB fill:#F3E5F5,stroke:#7B1FA2
        style BLUE fill:#E3F2FD,stroke:#1565C0
        style GREEN fill:#E8F5E9,stroke:#2E7D32

    caption: "Blue-Green: duas versoes completas do ambiente. O load balancer direciona o trafego. Rollback e instantaneo — basta reverter o DNS/ALB para a versao anterior."

  # ─────────────────────────────────────────────
  # DIAGRAMA 13: Canary Deployment Steps
  # ─────────────────────────────────────────────
  # NOVO — precede o YAML do Argo Rollouts
  # Local: book.md antes da secao 5 do Cap 3
  - id: "canary-deploy"
    title: "Deploy Canary com Aumento Gradual"
    chapter: 3
    replaces: "none (novo — precede YAML do Argo)"
    type: "flowchart"

    mermaid: |
      graph LR
        START["Inicio"] --> C10["10% trafego<br/>5 min pausa"]
        C10 --> MON1["Monitorar"]
        MON1 -->|"OK"| C50["50% trafego<br/>5 min pausa"]
        MON1 -->|"Erro"| RB1["Rollback"]
        C50 --> MON2["Monitorar"]
        MON2 -->|"OK"| C100["100% trafego"]
        MON2 -->|"Erro"| RB2["Rollback"]
        C100 --> DONE["Completo"]

        style C10 fill:#FFF8E1,stroke:#F57F17
        style C50 fill:#FFF8E1,stroke:#F57F17
        style C100 fill:#E8F5E9,stroke:#2E7D32
        style RB1 fill:#FFEBEE,stroke:#C62828
        style RB2 fill:#FFEBEE,stroke:#C62828
        style DONE fill:#E8F5E9,stroke:#2E7D32

    caption: "Canary: aumento gradual de trafego para a nova versao (10% -> 50% -> 100%). A cada passo, monitoramento e decisao: continuar ou reverter. Risco minimizado."

  # ─────────────────────────────────────────────
  # DIAGRAMA 14: Migration com Rollback
  # ─────────────────────────────────────────────
  # NOVO — precede o YAML de rollback
  # Local: book.md antes da secao 6 do Cap 3
  - id: "migration-rollback"
    title: "Estrategia de Rollback para Migrations"
    chapter: 3
    replaces: "none (novo)"
    type: "flowchart"

    mermaid: |
      graph TB
        BACKUP["fa:fa-database Backup pre-migration"]
        MIGRATE["fa:fa-gear Rodar Migration"]
        CHECK["fa:fa-check Verificar Saude"]
        ROLLBACK["fa:fa-rotate-left Rollback (Restaurar Backup)"]
        CONTINUE["fa:fa-check Continuar Deploy"]
        NOTIFY["fa:fa-bell Notificar Time"]

        BACKUP --> MIGRATE
        MIGRATE --> CHECK
        CHECK -->|"Sucesso"| CONTINUE
        CHECK -->|"Falha"| ROLLBACK
        ROLLBACK --> NOTIFY
        CONTINUE --> NOTIFY

        style BACKUP fill:#E3F2FD,stroke:#1A237E
        style MIGRATE fill:#FFF8E1,stroke:#F57F17
        style CHECK fill:#F3E5F5,stroke:#7B1FA2
        style CONTINUE fill:#E8F5E9,stroke:#2E7D32
        style ROLLBACK fill:#FFEBEE,stroke:#C62828
        style NOTIFY fill:#E3F2FD,stroke:#1A237E

    caption: "Estrategia segura de migration: backup antes, execucao, verificacao e rollback automatico em caso de falha. Sempre notificar o time sobre o resultado."

  # ─────────────────────────────────────────────
  # DIAGRAMA 15: Security Pipeline (SAST + DAST + Dependency)
  # ─────────────────────────────────────────────
  # NOVO — precede os YAMLs de seguranca
  # Local: book.md antes da secao 7 do Cap 3
  - id: "security-pipeline"
    title: "Pipeline de Seguranca em 3 Camadas"
    chapter: 3
    replaces: "none (novo)"
    type: "flowchart"

    mermaid: |
      graph LR
        CODE["fa:fa-code Codigo"] --> SAST["fa:fa-lock SAST<br/>Analise Estatica"]
        SAST -->|"Vulnerabilidades"| FIX1["fa:fa-bug Corrigir"]
        SAST -->|"OK"| DEP["fa:fa-magnifying-glass Dependency Scan"]
        DEP -->|"Vulnerabilidades"| UPDATE["fa:fa-rotate Atualizar Deps"]
        DEP -->|"OK"| BUILD["fa:fa-box Build Imagem"]
        BUILD -->|"Imagem"| TRIVY["fa:fa-search Trivy Scan"]
        TRIVY -->|"Vulnerabilidades"| FIX2["fa:fa-bug Rebuild"]
        TRIVY -->|"OK"| DAST["fa:fa-robot DAST<br/>Teste Dinamico"]
        DAST -->|"Ataques simulados"| FIX3["fa:fa-bug Corrigir"]
        DAST -->|"OK"| DONE["fa:fa-check Seguro"]
        FIX1 --> CODE
        UPDATE --> BUILD
        FIX2 --> BUILD
        FIX3 --> CODE

        style SAST fill:#E3F2FD,stroke:#1A237E
        style DEP fill:#FFF8E1,stroke:#F57F17
        style TRIVY fill:#FFF8E1,stroke:#F57F17
        style DAST fill:#FFEBEE,stroke:#C62828
        style DONE fill:#E8F5E9,stroke:#2E7D32

    caption: "Seguranca em 3 camadas: SAST (codigo), Dependency Scan (bibliotecas), Trivy (imagem), DAST (runtime). Cada camada pega um tipo diferente de vulnerabilidade."

  # ─────────────────────────────────────────────
  # DIAGRAMA 16: Self-Healing Flow
  # ─────────────────────────────────────────────
  # NOVO — precede o codigo TypeScript
  # Local: book.md antes da secao 11 do Cap 3
  - id: "self-healing"
    title: "Fluxo de Auto-Cura (Self-Healing)"
    chapter: 3
    replaces: "none (novo)"
    type: "flowchart"

    mermaid: |
      graph TB
        MON["fa:fa-gauge-high Monitoramento Continuo"]
        CHECK["fa:fa-heart-pulse runningCount >= desiredCount?"]
        HEALTHY["fa:fa-check Saudavel<br/>Nenhuma acao"]
        UNHEALTHY["fa:fa-bug runningCount < desiredCount"]
        DEPLOY["fa:fa-rocket Forcar Novo Deploy"]
        NOTIFY["fa:fa-bell Notificar Time"]
        LOG["fa:fa-list Registrar no Log"]

        MON --> CHECK
        CHECK -->|"Sim"| HEALTHY
        CHECK -->|"Nao"| UNHEALTHY
        UNHEALTHY --> DEPLOY
        DEPLOY --> NOTIFY
        NOTIFY --> LOG
        LOG --> MON

        style MON fill:#E3F2FD,stroke:#1A237E
        style CHECK fill:#F3E5F5,stroke:#7B1FA2
        style HEALTHY fill:#E8F5E9,stroke:#2E7D32
        style UNHEALTHY fill:#FFEBEE,stroke:#C62828
        style DEPLOY fill:#FFF8E1,stroke:#F57F17
        style NOTIFY fill:#E3F2FD,stroke:#1A237E

    caption: "Self-healing: o sistema monitora continuamente sua propria saude. Se o numero de instancias saudaveis cai abaixo do desejado, um novo deploy e forcado automaticamente."

