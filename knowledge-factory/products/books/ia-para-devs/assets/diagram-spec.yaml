    caption: "Distribuicao dos 4 tipos de bug. Logica e o mais frequente; Seguranca e o mais critico."

  # ─────────────────────────────────────────────
  # DIAGRAMA 3: Anatomia de um Prompt Estruturado
  # ─────────────────────────────────────────────
  # Substitui a tabela de 3 elementos + exemplo na secao 3 do Cap 1
  # Local: book.md linhas 156-163
  - id: "prompt-anatomy-flow"
    title: "Anatomia de um Prompt Estruturado"
    chapter: 1
    replaces: "table (linhas 156-163)"
    type: "flowchart"

    mermaid: |
      graph LR
        A["fa:fa-message Contexto"] --> B["fa:fa-bullseye Intencao"]
        B --> C["fa:fa-file-lines Formato"]
        C --> D["fa:fa-check Resultado"]

        A -.-> A1["Ex: 'No arquivo login.ts, funcao authenticateUser...'"]
        B -.-> B1["Ex: '...precisa validar token JWT antes de consultar o banco'"]
        C -.-> C1["Ex: '...retorne Result<T,E>, sem throw, com testes em Vitest'"]

        style A fill:#E3F2FD,stroke:#1565C0
        style B fill:#E3F2FD,stroke:#1565C0
        style C fill:#E3F2FD,stroke:#1565C0
        style D fill:#E8F5E9,stroke:#2E7D32
        style A1 fill:#F5F5F5,stroke:#BDBDBD,stroke-dasharray: 3
        style B1 fill:#F5F5F5,stroke:#BDBDBD,stroke-dasharray: 3
        style C1 fill:#F5F5F5,stroke:#BDBDBD,stroke-dasharray: 3

    caption: "Os 3 elementos essenciais de todo prompt. Contexto ancora, Intencao direciona, Formato organiza. O resultado e previsivel e reutilizavel."

  # ─────────────────────────────────────────────
  # DIAGRAMA 4: Fluxo Iterativo de Uso de IA
  # ─────────────────────────────────────────────
  # Ja existe, mas com redundancia ASCII. Refinamento.
  # Local: book.md linhas 335-359
  - id: "ia-iterative-flow"
    title: "Fluxo Ideal de Uso de IA para Programar"
    chapter: 1
    replaces: "mermaid + ascii (linhas 335-359)"
    type: "flowchart"

    mermaid: |
      graph LR
        A["fa:fa-message Prompt Estruturado"] --> B["fa:fa-robot IA gera rascunho"]
        B --> C["fa:fa-eye Code Review"]
        C --> D["fa:fa-flask Testes"]
        D --> E["fa:fa-pen Refinamento"]
        E --> F["fa:fa-check Commit"]
        F -.->|"fa:fa-rotate-left Feedback Loop"| B

        style A fill:#E3F2FD,stroke:#1A237E
        style B fill:#F3E5F5,stroke:#7B1FA2
        style C fill:#E8F5E9,stroke:#2E7D32
        style D fill:#FFF8E1,stroke:#F57F17
        style E fill:#E3F2FD,stroke:#1A237E
        style F fill:#E8F5E9,stroke:#2E7D32

    caption: "Fluxo iterativo: a IA gera um rascunho, voce revisa, testa, refina e so entao faz o commit. O feedback loop entre 'Commit' e 'IA gera rascunho' representa o refinamento continuo."

  # ─────────────────────────────────────────────
  # DIAGRAMA 5: Agente Generico vs. Especializado
  # ─────────────────────────────────────────────
  # Substitui 2 diagramas + ASCII no Cap 2
  # Local: book.md linhas 498-553
  - id: "generic-vs-specialized"
    title: "Agente Generico vs. Agentes Especializados"
    chapter: 2
    replaces: "2 mermaids + 2 ASCII (linhas 498-553)"
    type: "flowchart"

    mermaid: |
      graph TB
        subgraph AG["Agente Generico"]
            direction TB
            G1["Frontend: 2/5<br/>React basico"] --> G2["Backend: 3/5<br/>API basica"]
            G2 --> G3["Seguranca: 1/5<br/>Esquece CSRF"]
            G3 --> G4["Banco: 2/5<br/>Faz N+1"]
            G4 --> G5["DevOps: 1/5<br/>Sem multi-stage"]
        end

        subgraph AE["Agente Frontend Especializado"]
            direction TB
            E1["Performance: 5/5<br/>Lazy loading, Suspense"] --> E2["Acessibilidade: 5/5<br/>ARIA, WCAG"]
            E2 --> E3["SEO: 5/5<br/>Metadata API"]
            E3 --> E4["TypeScript: 5/5<br/>Strict mode"]
        end

        AG -->|"Resultado: divida tecnica"| RES1["Codigo 'funciona'<br/>mas fragil"]
        AE -->|"Resultado: qualidade"| RES2["Codigo de producao<br/>pronto para review"]

        style AG fill:#FFEBEE,stroke:#C62828
        style AE fill:#E8F5E9,stroke:#2E7D32
        style G1 fill:#FFCDD2,stroke:#C62828
        style G2 fill:#FFCDD2,stroke:#C62828
        style G3 fill:#FFCDD2,stroke:#C62828
        style G4 fill:#FFCDD2,stroke:#C62828
        style G5 fill:#FFCDD2,stroke:#C62828
        style E1 fill:#C8E6C9,stroke:#2E7D32
        style E2 fill:#C8E6C9,stroke:#2E7D32
        style E3 fill:#C8E6C9,stroke:#2E7D32
        style E4 fill:#C8E6C9,stroke:#2E7D32
        style RES1 fill:#FFEBEE,stroke:#C62828
        style RES2 fill:#E8F5E9,stroke:#2E7D32

    caption: "Comparacao visual: um agente generico sabe de tudo um pouco mas e mediano em tudo. Um ecossistema de agentes especializados produz resultados excelentes em cada area."

  # ─────────────────────────────────────────────
  # DIAGRAMA 6: Anatomia de um Agente
  # ─────────────────────────────────────────────
  # Substitui o ASCII box diagram no Cap 2
  # Local: book.md linhas 573-599
  - id: "agent-anatomy"
    title: "Anatomia de um Agente de IA"
    chapter: 2
    replaces: "ascii box diagram (linhas 573-599)"
    type: "flowchart"

    mermaid: |
      graph TB
        subgraph ID["IDENTIDADE"]
            ID1["Quem e este agente?"]
            ID2["O que sabe fazer?"]
            ID3["O que NAO faz?"]
        end

        subgraph CN["CONHECIMENTO"]
            CN1["Stack tecnologica"]
            CN2["Padroes e praticas"]
            CN3["Referencias externas"]
        end

        subgraph PR["PROCESSO"]
            PR1["Fluxo de trabalho"]
            PR2["Entrada -> Transformacao -> Saida"]
        end

        subgraph QL["QUALIDADE"]
            QL1["Checklist de validacao"]
            QL2["Criterios de aceite"]
            QL3["Anti-padroes a evitar"]
        end

        subgraph CM["COMUNICACAO"]
            CM1["Formato de entrada"]
            CM2["Formato de saida"]
            CM3["Como reportar problemas"]
        end

        ID --> PR
        CN --> PR
        PR --> QL
        QL --> CM

        style ID fill:#E3F2FD,stroke:#1565C0
        style CN fill:#E8F5E9,stroke:#2E7D32
        style PR fill:#FFF8E1,stroke:#F57F17
        style QL fill:#FFEBEE,stroke:#C62828
        style CM fill:#F3E5F5,stroke:#7B1FA2

    caption: "Os 5 componentes essenciais de um agente de IA eficaz. Cada componente tem funcao especifica na definicao do comportamento do agente."

