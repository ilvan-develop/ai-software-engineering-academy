# ─────────────────────────────────────────────
# REGRAS DE PRODUCAO DE IMAGENS
# ─────────────────────────────────────────────
production_rules:
  - "Screenshots DEVEM ser mockups, nao screenshots reais (evitar direitos autorais de UI)"
  - "Ilustracoes conceituais DEVEM usar flat vector, nao 3D ou fotorealismo"
  - "Cores DEVEM seguir design-tokens.yaml — #1A237E primaria, #00BFA5 destaque"
  - "Todas as imagens DEVEM ter alt text descritivo acessivel"
  - "Diagramas conceituais DEVEM funcionar em P/B (preto e branco)"
  - "Icones nas ilustracoes DEVEM corresponder ao icons.yaml"
  - "Dimensoes: 1200px de largura minima, 300 DPI, PNG"
  - "Nao usar emojis como icones — usar Font Awesome ou SVG equivalentes"
