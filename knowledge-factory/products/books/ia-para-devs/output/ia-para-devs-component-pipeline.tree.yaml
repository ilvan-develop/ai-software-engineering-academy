    fast:** jobs mais rápidos primeiro (lint antes de e2e) 3. **Cache inteligente:**
    dependências, build, Docker layers 4. **Secrets:** nunca hardcode — use secrets
    do provedor 5. **Idempotência:** rodar o pipeline 2x deve dar o mesmo resultado
    6. **Notificações:** notifique o time em caso de falha (Slack, email) 7. **Versionamento
    de pipeline:** a pipeline é código — versionada, revisada, testada 8. **Ambiente
    imutável:** nunca faça alterações manuais em produção 9. **Observabilidade:**
    métricas de tempo de pipeline, taxa de falha, MTTR 10. **Documentação:** cada
    job deve ter `name` descritivo e comentários quando necessário
