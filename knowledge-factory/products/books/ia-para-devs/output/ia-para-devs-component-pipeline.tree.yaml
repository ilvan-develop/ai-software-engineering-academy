- type: Code
  text: "deploy-preview:\n  name: Deploy Preview\n  runs-on: ubuntu-latest\n  if:\
    \ github.event_name == 'pull_request'\n  environment:\n    name: preview-${{ github.event.number\
    \ }}\n    url: https://pr-${{ github.event.number }}.meusistema.com.br\n  steps:\n\
    \    - uses: actions/checkout@v4\n    - uses: pnpm/action-setup@v3\n    - uses:\
    \ actions/setup-node@v4\n    - run: pnpm install --frozen-lockfile\n    - run:\
    \ pnpm build\n\n    # Criar banco efêmero\n    - name: Criar database preview\n\
    \      run: |\n        aws rds create-db-instance \\\n          --db-instance-identifier\
    \ app-preview-${{ github.event.number }} \\\n          --db-instance-class db.t3.micro\
    \ \\\n          --engine postgres \\\n          --master-username preview \\\n\
    \          --master-user-password ${{ secrets.PREVIEW_DB_PASSWORD }}\n\n    -\
    \ name: Rodar migrations\n      run: pnpm db:migrate\n      env:\n        DATABASE_URL:\
    \ postgres://preview:${{ secrets.PREVIEW_DB_PASSWORD }}@preview-db/app-preview-${{\
    \ github.event.number }}\n\n    - name: Fazer deploy no ECS\n      run: |\n  \
    \      aws ecs update-service \\\n          --cluster preview \\\n          --service\
    \ app-preview-${{ github.event.number }} \\\n          --force-new-deployment\n\
    \ndestroy-preview:\n  name: Destruir Preview\n  runs-on: ubuntu-latest\n  if:\
    \ github.event_name == 'pull_request' && github.event.action == 'closed'\n  steps:\n\
    \    - name: Remover database preview\n      run: |\n        aws rds delete-db-instance\
    \ \\\n          --db-instance-identifier app-preview-${{ github.event.number }}\
    \ \\\n          --skip-final-snapshot\n\n    - name: Remover serviço ECS\n   \
    \   run: |\n        aws ecs delete-service \\\n          --cluster preview \\\n\
    \          --service app-preview-${{ github.event.number }} \\\n          --force"
