- type: Code
  text: "// scripts/self-healing.ts\nimport { ECSClient, DescribeServicesCommand,\
    \ UpdateServiceCommand } from '@aws-sdk/client-ecs'\n\nconst ecs = new ECSClient({\
    \ region: 'us-east-1' })\n\nasync function healService(cluster: string, service:\
    \ string) {\n  const { services } = await ecs.send(\n    new DescribeServicesCommand({\
    \ cluster, services: [service] })\n  )\n\n  const svc = services![0]\n  const\
    \ running = svc.runningCount ?? 0\n  const desired = svc.desiredCount ?? 0\n\n\
    \  if (running < desired) {\n    console.log(`\U0001F527 Service ${service} com\
    \ ${running}/${desired} — forcando novo deploy...`)\n\n    await ecs.send(\n \
    \     new UpdateServiceCommand({\n        cluster,\n        service,\n       \
    \ forceNewDeployment: true,\n      })\n    )\n\n    console.log('✅ Deploy forcado\
    \ enviado')\n  } else {\n    console.log(`✅ Service ${service} saudavel (${running}/${desired})`)\n\
    \  }\n}\n\nhealService('production', 'app-service').catch(console.error)"
  props:
    language: typescript
  children: []
