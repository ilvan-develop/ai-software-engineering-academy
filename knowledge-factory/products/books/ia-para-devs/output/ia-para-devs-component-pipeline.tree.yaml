- type: Code
  text: "deploy-production:\n  name: Deploy em Produção\n  needs: [lint, test, build,\
    \ security-sast]\n  runs-on: ubuntu-latest\n  if: github.ref == 'refs/heads/main'\n\
    \  environment:\n    name: production\n    url: https://meusistema.com.br\n  concurrency:\n\
    \    group: production-deploy\n    cancel-in-progress: false\n  steps:\n    -\
    \ uses: actions/checkout@v4\n    - uses: ./.github/actions/setup-node\n    - uses:\
    \ actions/download-artifact@v4\n      with:\n        name: build-output\n    \
    \    path: dist\n\n    - name: Login no Docker Registry\n      uses: docker/login-action@v3\n\
    \      with:\n        username: ${{ secrets.DOCKER_USER }}\n        password:\
    \ ${{ secrets.DOCKER_PASS }}\n\n    - name: Build e Push da Imagem\n      run:\
    \ |\n        docker build -t meuregistro/app:${{ github.sha }} .\n        docker\
    \ push meuregistro/app:${{ github.sha }}\n\n    - name: Deploy no ECS\n      run:\
    \ |\n        aws ecs update-service \\\n          --cluster production \\\n  \
    \        --service app-service \\\n          --force-new-deployment\n\n    - name:\
    \ Verificar Saúde\n      run: |\n        for i in {1..30}; do\n          STATUS=$(curl\
    \ -s -o /dev/null -w \"%{http_code}\" https://meusistema.com.br/health)\n    \
    \      if [ \"$STATUS\" = \"200\" ]; then\n            echo \"✅ Deploy saudável\"\
    \n            exit 0\n          fi\n          sleep 10\n        done\n       \
    \ echo \"❌ Health check falhou após deploy\"\n        exit 1\n\n    - name: Rollback\
    \ automático\n      if: failure()\n      run: |\n        echo \"\U0001F504 Iniciando\
