- type: Code
  text: "# runbook: recuperacao-banco.yml\nname: Runbook - Recuperar Database\non:\n\
    \  workflow_dispatch:\n    inputs:\n      database_name:\n        description:\
    \ 'Nome do banco'\n        required: true\n      restore_point:\n        description:\
    \ 'PITR timestamp (YYYY-MM-DD HH:MM:SS)'\n        required: false\n\njobs:\n \
    \ restore:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Validar parâmetros\n\
    \        run: |\n          if [ -z \"${{ inputs.database_name }}\" ]; then\n \
    \           echo \"❌ database_name é obrigatório\"\n            exit 1\n     \
    \     fi\n\n      - name: Parar aplicação\n        run: |\n          aws ecs update-service\
    \ \\\n            --cluster production \\\n            --service app-service \\\
    \n            --desired-count 0\n\n      - name: Restaurar snapshot\n        run:\
    \ |\n          if [ -n \"${{ inputs.restore_point }}\" ]; then\n            aws\
    \ rds restore-db-instance-to-point-in-time \\\n              --source-db-instance-identifier\
    \ ${{ inputs.database_name }} \\\n              --target-db-instance-identifier\
    \ ${{ inputs.database_name }}-restored \\\n              --restore-time \"${{\
    \ inputs.restore_point }}\"\n          else\n            SNAPSHOT=$(aws rds describe-db-snapshots\
    \ \\\n              --db-instance-identifier ${{ inputs.database_name }} \\\n\
    \              --query \"DBSnapshots[-1].DBSnapshotIdentifier\" \\\n         \
    \     --output text)\n            aws rds restore-db-instance-from-db-snapshot\
    \ \\\n              --db-instance-identifier ${{ inputs.database_name }}-restored\
    \ \\\n              --db-snapshot-identifier $SNAPSHOT\n          fi\n\n     \
    \ - name: Trocar DNS para DB restaurado\n        run: |\n          aws rds modify-db-instance\
    \ \\\n            --db-instance-identifier ${{ inputs.database_name }} \\\n  \
    \          --new-db-instance-identifier ${{ inputs.database_name }}-old\n    \
    \      aws rds modify-db-instance \\\n            --db-instance-identifier ${{\
    \ inputs.database_name }}-restored \\\n            --new-db-instance-identifier\
    \ ${{ inputs.database_name }}\n\n      - name: Subir aplicação\n        run: |\n\
    \          aws ecs update-service \\\n            --cluster production \\\n  \
    \          --service app-service \\\n            --desired-count 3\n\n      -\
    \ name: Notificar\n        run: |\n          curl -X POST ${{ secrets.SLACK_WEBHOOK\
    \ }} \\\n            -H \"Content-Type: application/json\" \\\n            -d\
    \ '{\"text\": \"✅ Database ${{ inputs.database_name }} recuperada com sucesso\"\
    }'"
  props:
    language: yaml
  children: []
