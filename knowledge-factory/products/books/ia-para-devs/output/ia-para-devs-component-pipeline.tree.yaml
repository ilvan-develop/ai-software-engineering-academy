- type: Paragraph
  text: Era uma terça-feira comum. O desenvolvedor precisava de uma função simples
    para validar emails. Pediu ao ChatGPT, copiou o código, fez deploy. Na sexta,
    o banco de dados estava cheio de registros com emails como "usuario@". Aquela
    função — que parecia perfeita — só verificava se existia um "@" na string.
  props: {}
