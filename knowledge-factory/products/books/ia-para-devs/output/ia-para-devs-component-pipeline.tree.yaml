- type: Code
  text: "# .gitlab-ci.yml\nstages:\n  - lint\n  - test\n  - build\n  - deploy\n\n\
    variables:\n  NODE_VERSION: \"20\"\n  PNPM_VERSION: \"9\"\n\ncache:\n  key: ${CI_COMMIT_REF_SLUG}\n\
    \  paths:\n    - node_modules/\n    - .pnpm-store/\n\nlint:\n  stage: lint\n \
    \ image: node:${NODE_VERSION}\n  script:\n    - npm install -g pnpm@${PNPM_VERSION}\n\
    \    - pnpm install --frozen-lockfile\n    - pnpm lint\n    - pnpm format:check\n\
    \ntest:\n  stage: test\n  image: node:${NODE_VERSION}\n  services:\n    - postgres:16-alpine\n\
    \  variables:\n    DATABASE_URL: postgres://app:secret@postgres:5432/app_test\n\
    \    POSTGRES_DB: app_test\n    POSTGRES_USER: app\n    POSTGRES_PASSWORD: secret\n\
    \  script:\n    - npm install -g pnpm@${PNPM_VERSION}\n    - pnpm install --frozen-lockfile\n\
    \    - pnpm test:unit\n    - pnpm test:integration\n\nbuild:\n  stage: build\n\
    \  image: node:${NODE_VERSION}\n  script:\n    - npm install -g pnpm@${PNPM_VERSION}\n\
    \    - pnpm install --frozen-lockfile\n    - pnpm build\n  artifacts:\n    paths:\n\
    \      - dist/\n    expire_in: 30 days\n\ndeploy:\n  stage: deploy\n  image: alpine:latest\n\
    \  script:\n    - apk add --no-cache curl\n    - curl -X POST \"${DEPLOY_HOOK_URL}\"\
    \n  only:\n    - main\n  when: manual\n  environment: production"
  props:
    language: yaml
  children: []
