- type: Code
  text: "import * as aws from '@pulumi/aws'\nimport * as pulumi from '@pulumi/pulumi'\n\
    \nconst config = new pulumi.Config()\nconst stack = pulumi.getStack()\n\nconst\
    \ cluster = new aws.ecs.Cluster('app-cluster')\n\nconst taskDefinition = new aws.ecs.TaskDefinition('app-task',\
    \ {\n  family: 'app',\n  cpu: '256',\n  memory: '512',\n  networkMode: 'awsvpc',\n\
    \  executionRoleArn: config.require('executionRoleArn'),\n  containerDefinitions:\
    \ JSON.stringify([\n    {\n      name: 'app',\n      image: `meuregistro/app:${stack}`,\n\
    \      portMappings: [{ containerPort: 3000 }],\n    },\n  ]),\n})\n\nnew aws.ecs.Service('app-service',\
    \ {\n  cluster: cluster.arn,\n  taskDefinition: taskDefinition.arn,\n  desiredCount:\
    \ 2,\n  launchType: 'FARGATE',\n  networkConfiguration: {\n    subnets: config.requireObject<string[]>('privateSubnets'),\n\
    \    securityGroups: [config.require('securityGroupId')],\n  },\n})"
  props:
    language: typescript
