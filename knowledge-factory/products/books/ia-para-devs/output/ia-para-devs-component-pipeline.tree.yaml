- type: Code
  text: "# Rollback automático\n- name: Backup antes da migration\n  run: pg_dump\
    \ $DATABASE_URL > /tmp/pre_migration_backup.sql\n  env:\n    DATABASE_URL: ${{\
    \ secrets.DATABASE_URL }}\n\n- name: Rodar migration\n  id: migrate\n  run: pnpm\
    \ db:migrate\n  continue-on-error: true\n  env:\n    DATABASE_URL: ${{ secrets.DATABASE_URL\
    \ }}\n\n- name: Rollback em caso de falha\n  if: steps.migrate.outcome != 'success'\n\
    \  run: |\n    echo \"\U0001F504 Migration falhou — restaurando backup...\"\n\
    \    psql $DATABASE_URL < /tmp/pre_migration_backup.sql\n    echo \"✅ Backup restaurado\"\
    \n  env:\n    DATABASE_URL: ${{ secrets.DATABASE_URL }}"
