- type: Code
  text: "// Átomo: Label\ninterface LabelProps {\n  text: string;\n  variant: 'default'\
    \ | 'required' | 'optional';\n  size: 'sm' | 'md';\n}\n\nfunction Label({ text,\
    \ variant, size }: LabelProps) {\n  const variants = {\n    default: 'text-gray-700',\n\
    \    required: 'text-red-600 after:content-[\"*\"] after:ml-0.5',\n    optional:\
    \ 'text-gray-400',\n  };\n  return (\n    <span className={`${variants[variant]}\
    \ text-${size === 'sm' ? 'xs' : 'sm'} font-medium`}>\n      {text}\n    </span>\n\
    \  );\n}"
  props:
    language: typescript
  children: []
