    \ rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1)',\n} as const;\n\nexport\
    \ const borderRadius = {\n  none:   '0px',\n  sm:     '4px',\n  md:     '8px',\n\
    \  lg:     '12px',\n  xl:     '16px',\n  full:   '9999px',\n} as const;\n\n//\
    \ tokens/breakpoints.ts\nexport const breakpoints = {\n  sm: 640,\n  md: 768,\n\
    \  lg: 1024,\n  xl: 1280,\n  '2xl': 1536,\n} as const;\n\n// Uso: breakpoints\
    \ como media queries\nexport const mediaQueries = {\n  sm:  `@media (min-width:\
    \ ${breakpoints.sm}px)`,\n  md:  `@media (min-width: ${breakpoints.md}px)`,\n\
    \  lg:  `@media (min-width: ${breakpoints.lg}px)`,\n  xl:  `@media (min-width:\
    \ ${breakpoints.xl}px)`,\n  '2xl': `@media (min-width: ${breakpoints['2xl']}px)`,\n\
    } as const;"
