- type: Code
  text: "// Organismo: Formulário de cadastro\ninterface SignupFormProps {\n  onSubmit:\
    \ (data: SignupData) => Promise<void>;\n}\n\nfunction SignupForm({ onSubmit }:\
    \ SignupFormProps) {\n  const [email, setEmail] = useState('');\n  const [password,\
    \ setPassword] = useState('');\n\n  return (\n    <form onSubmit={(e) => { e.preventDefault();\
    \ onSubmit({ email, password }); }}\n      className=\"flex flex-col gap-4 max-w-md\"\
    >\n      <TextField label=\"Email\" name=\"email\" value={email} onChange={setEmail}\
    \ required />\n      <TextField label=\"Senha\" name=\"password\" value={password}\
    \ onChange={setPassword} required />\n      <Button type=\"submit\" variant=\"\
    primary\" fullWidth>Cadastrar</Button>\n    </form>\n  );\n}"
  props:
    language: typescript
  children: []
