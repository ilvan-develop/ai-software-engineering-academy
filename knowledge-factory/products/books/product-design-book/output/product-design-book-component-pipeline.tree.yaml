- type: Code
  text: "// ❌ Antes: feature-centrica\nfunction TelaRelatorios() {\n  const [relatorios]\
    \ = useQuery(GET_RELATORIOS);\n  return <Table data={relatorios} />;\n  // Usuário:\
    \ \"e agora? o que eu faço com isso?\"\n}\n\n// ✅ Depois: centrada no usuário\n\
    function TelaRelatorios() {\n  const [relatorios, { loading, error }] = useQuery(GET_RELATORIOS);\n\
    \  const [search, setSearch] = useState('');\n  const filtered = relatorios.filter(r\
    \ => r.name.includes(search));\n\n  if (loading) return <Skeleton lines={5} aria-label=\"\
    Carregando relatórios\" />;\n  if (error) return <ErrorAlert message=\"Não foi\
    \ possível carregar. Tente novamente.\" />;\n  if (filtered.length === 0) return\
    \ <EmptyState message=\"Nenhum relatório encontrado. Crie o primeiro.\" />;\n\n\
    \  return (\n    <Page>\n      <SearchInput\n        value={search}\n        onChange={setSearch}\n\
    \        placeholder=\"Buscar relatório por nome...\"\n        aria-label=\"Buscar\
    \ relatórios\"\n      />\n      <Table\n        data={filtered}\n        emptyMessage=\"\
    Nenhum resultado para essa busca\"\n      />\n    </Page>\n  );\n}"
  props:
    language: typescript
  children: []
