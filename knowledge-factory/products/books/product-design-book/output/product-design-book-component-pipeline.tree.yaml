- type: Section
  text: 10. Anti-padrões em Design Thinking
  props:
    level: 2
  children:
  - type: Text
    text: 10. Anti-padrões em Design Thinking
    props: {}
    children: []
- type: Code
  text: "❌ Pular a fase de empatia\n   \"Já conhecemos nossos usuários\" — Não, você\
    \ não conhece.\n   Consequência: Solução para o problema errado.\n\n❌ Brainstorming\
    \ sem regras\n   Sem moderação, líderes dominam e ideias tímidas morrem.\n   Consequência:\
    \ Mesmas soluções de sempre.\n\n❌ Protótipo fotorrealista antes da hora\n   Gastar\
    \ dias no Figma antes de validar a ideia com papel.\n   Consequência: Apego à\
    \ solução, resistência a mudanças.\n\n❌ Testar com amigos e familiares\n   Eles\
    \ querem te agradar, não vão criticar.\n   Consequência: Feedback enviesado, falsa\
    \ validação.\n\n❌ Design Thinking como caixa preta\n   \"Vamos fazer um workshop\
    \ de DT e sai uma solução mágica\"\n   Consequência: Falta de engajamento, resultados\
    \ superficiais.\n\n❌ Tratar DT como processo linear\n   \"Já testamos, passamos\
    \ para a próxima fase\"\n   Consequência: Perde-se o principal benefício: a iteração."
  props:
    language: text
  children: []
