- type: Code
  text: "interface UIInspectionChecklist {\n  layout: {\n    dimensions: boolean;\
    \      // width, height, min/max\n    padding: boolean;         // internal spacing\n\
    \    margin: boolean;          // external spacing\n    alignment: boolean;  \
    \     // flex, grid, absolute\n  };\n  typography: {\n    fontFamily: boolean;\n\
    \    fontSize: boolean;\n    fontWeight: boolean;\n    lineHeight: boolean;\n\
    \    letterSpacing: boolean;\n    textAlign: boolean;\n  };\n  visuals: {\n  \
    \  backgroundColor: boolean;\n    border: boolean;          // width, style, color,\
    \ radius\n    boxShadow: boolean;\n    opacity: boolean;\n  };\n  states: {\n\
    \    hover: boolean;\n    active: boolean;\n    focus: boolean;\n    disabled:\
    \ boolean;\n    error: boolean;\n  };\n  responsive: {\n    mobile: boolean;\n\
    \    tablet: boolean;\n    desktop: boolean;\n  };\n  accessibility: {\n    contrast:\
    \ boolean;        // WCAG AA\n    focusVisible: boolean;\n    ariaLabels: boolean;\n\
    \    keyboardNav: boolean;\n  };\n}\n\nfunction checkFidelity(inspection: UIInspectionChecklist):\
    \ number {\n  const items = Object.values(inspection).flatMap(category =>\n  \
    \  Object.values(category)\n  );\n  const total = items.length;\n  const passed\
    \ = items.filter(Boolean).length;\n  return Math.round((passed / total) * 100);\n\
    }"
  props:
    language: typescript
  children: []
