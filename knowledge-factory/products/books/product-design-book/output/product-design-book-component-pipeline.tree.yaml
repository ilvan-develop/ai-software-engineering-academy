- type: Code
  text: 'HIPÓTESE:

    Acreditamos que [solução] para [público]

    resultará em [outcome].

    Saberemos que estamos certos quando [métrica/meta].


    Exemplo:

    "Acreditamos que um onboarding guiado para novos usuários

    resultará em 30% mais ativação no D7.

    Saberemos que estamos certos quando a taxa de ativação

    subir de 40% para 52% no teste A/B."'
  props:
    language: text
  children: []
- type: Subsection
  text: Tipos de experimento
  props:
    level: 3
  children:
  - type: Text
    text: Tipos de experimento
    props: {}
    children: []
- type: Code
  text: 'Experimento         | Esforço | Confiança | Quando usar

    ────────────────────|─────────|───────────|────────────────────────

    Entrevista          | Baixo   | Média     | Entender problema

    Landing page fake   | Baixo   | Alta      | Testar interesse real

    Prototype test      | Médio   | Média     | Validar usabilidade

    Teste A/B           | Médio   | Alta      | Comparar soluções

    Concierge MVP       | Alto    | Alta      | Validar valor real

    Wizard of Oz MVP    | Médio   | Alta      | Validar viabilidade

    Single-feature MVP  | Médio   | Alta      | Testar feature isolada

    Piecemeal MVP       | Baixo   | Média     | Validar sem construir'
  props:
    language: text
  children: []
- type: Subsection
  text: 'Exemplo: Landing page fake'
  props:
    level: 3
  children:
  - type: Text
    text: 'Exemplo: Landing page fake'
    props: {}
    children: []
- type: Code
  text: "Ideia: \"App que agenda reuniões automaticamente\"\n\n1. Criar landing page:\n\
    \   \"Agende reuniões sem trocar emails\"\n\n2. Botão: \"Começar gratis →\" (leva\
    \ a página de \"em breve\")\n\n3. Métricas:\n   - Visitantes que chegam na página\n\
    \   - % que clica no CTA      ← indicador de interesse real\n   - % que deixa\
    \ o email      ← lead qualificado\n\n4. Resultado:\n   Se < 5% clica → interesse\
    \ baixo, repense a proposta\n   Se > 15% clica → interesse real, continue"
  props:
    language: text
  children: []
- type: Subsection
  text: MVP não é produto mínimo
  props:
    level: 3
  children:
  - type: Text
    text: MVP não é produto mínimo
    props: {}
    children: []
- type: Code
  text: 'MITO: MVP é a versão mais simples do produto final

    REAL: MVP é o menor experimento que valida ou invalida uma hipótese


    MVP serve para APRENDER, não para entregar valor.

    Se você já sabe que funciona, não precisa de MVP.'
  props:
    language: text
  children: []
