- type: Code
  text: "const ThemeContext = React.createContext<{\n  theme: Theme;\n  toggleTheme:\
    \ () => void;\n}>({\n  theme: lightTheme,\n  toggleTheme: () => {},\n});\n\nfunction\
    \ ThemeProvider({ children }: { children: React.ReactNode }) {\n  const [mode,\
    \ setMode] = useState<ThemeMode>('light');\n\n  const toggleTheme = () => {\n\
    \    setMode(prev => prev === 'light' ? 'dark' : 'light');\n  };\n\n  const theme\
    \ = mode === 'light' ? lightTheme : darkTheme;\n\n  return (\n    <ThemeContext.Provider\
    \ value={{ theme, toggleTheme }}>\n      <div data-theme={mode} style={{ background:\
    \ theme.colors.background.primary }}>\n        {children}\n      </div>\n    </ThemeContext.Provider>\n\
    \  );\n}"
  props:
    language: typescript
  children: []
