- type: Code
  text: "interface Grid {\n  columns: number;       // ex: 12\n  gutter: number; \
    \       // ex: 16px (espaço entre colunas)\n  margin: number;        // ex: 24px\
    \ (margem lateral)\n  breakpoints: Record<string, number>;\n}\n\nconst desktopGrid:\
    \ Grid = {\n  columns: 12,\n  gutter: 16,\n  margin: 24,\n  breakpoints: { sm:\
    \ 640, md: 768, lg: 1024, xl: 1280 },\n};\n\n// Utilitário para calcular largura\
    \ de coluna\nfunction colWidth(cols: number, grid: Grid): number {\n  const contentWidth\
    \ = 1200 - grid.margin * 2;\n  const totalGutter = (grid.columns - 1) * grid.gutter;\n\
    \  const colSize = (contentWidth - totalGutter) / grid.columns;\n  return colSize\
    \ * cols + (cols - 1) * grid.gutter;\n}"
  props:
    language: typescript
  children: []
