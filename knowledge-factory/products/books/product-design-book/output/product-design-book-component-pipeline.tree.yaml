- type: Code
  text: "// components/Select/Select.tsx\ninterface SelectOption {\n  label: string;\n\
    \  value: string;\n  disabled?: boolean;\n}\n\ninterface SelectProps {\n  label:\
    \ string;\n  options: SelectOption[];\n  value: string;\n  onChange: (value: string)\
    \ => void;\n  placeholder?: string;\n  error?: string;\n  required?: boolean;\n\
    \  disabled?: boolean;\n}\n\nexport function Select({ label, options, value, onChange,\
    \ placeholder, error, required, disabled }: SelectProps) {\n  const selectId =\
    \ `select-${label.toLowerCase().replace(/\\s+/g, '-')}`;\n\n  return (\n    <div\
    \ className=\"flex flex-col gap-1.5\">\n      <label htmlFor={selectId} className=\"\
    text-sm font-medium text-gray-700\">\n        {label}\n        {required && <span\
    \ className=\"text-red-500 ml-0.5\">*</span>}\n      </label>\n      <select\n\
    \        id={selectId}\n        value={value}\n        onChange={(e) => onChange(e.target.value)}\n\
    \        disabled={disabled}\n        className={`\n          w-full px-3 py-2\
    \ text-sm bg-white border rounded-[var(--radius-md)] transition-all\n        \
    \  ${error ? 'border-red-500' : 'border-gray-300'}\n          ${disabled ? 'bg-gray-50\
    \ text-gray-400 cursor-not-allowed' : 'text-gray-900'}\n          focus:outline-none\
    \ focus:ring-2 ${error ? 'focus:ring-red-500' : 'focus:ring-[var(--color-primary-500)]'}\n\
    \        `.trim()}\n        required={required}\n        aria-invalid={!!error}\n\
    \      >\n        {placeholder && <option value=\"\" disabled>{placeholder}</option>}\n\
    \        {options.map(opt => (\n          <option key={opt.value} value={opt.value}\
    \ disabled={opt.disabled}>\n            {opt.label}\n          </option>\n   \
    \     ))}\n      </select>\n      {error && <span className=\"text-xs text-red-500\"\
    >{error}</span>}\n    </div>\n  );\n}"
