    \  createdAt: string;             // ISO date\n  updatedAt: string;          \
    \   // ISO date\n\n  // Rastreabilidade\n  userStoryId: string;           // \"\
    US-042\"\n  epicId: string;                // \"EPIC-07\"\n\n  // Conteúdo\n \
    \ elements: WireframeElement[];\n  states: StatefulComponent[];\n  interactions:\
