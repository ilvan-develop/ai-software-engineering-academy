    │  Bugs de UI: 15/mês  │  Bugs de UI: 3/mês            │\n└─────────────────────────────────────────────────────┘\n\
    \nCálculo de ROI:\n  5 squads × 4 devs × 1 tela/semana × R$ 10.000/dia\n  → Cada\
