    text: 'Product Discovery é o processo de '
    props: {}
    children: []
  - type: Bold
    text: entender problemas reais de usuários reais antes de escrever uma linha de
      código
    props: {}
    children: []
  - type: Text
    text: '. O objetivo não é entregar features, mas sim '
    props: {}
    children: []
  - type: Bold
    text: decidir o que vale a pena ser construído
    props: {}
    children: []
  - type: Text
    text: .
    props: {}
    children: []
- type: Subsection
  text: Discovery vs Delivery
  props:
    level: 3
  children:
  - type: Text
    text: Discovery vs Delivery
    props: {}
    children: []
- type: Code
  text: 'DISCOVERY                             DELIVERY

    "Construímos a coisa certa?"          "Construímos a coisa certo?"

    Alta incerteza, baixo custo           Baixa incerteza, alto custo

    Perguntas, hipóteses, experimentos    Requisitos, planejamento, código

    Falsificável, iterativo               Definido, incremental

    "Devo construir isso?"                "Como construir isso?"'
  props:
    language: text
  children: []
- type: Subsection
  text: Por que Discovery é importante?
  props:
    level: 3
  children:
  - type: Text
    text: Por que Discovery é importante?
    props: {}
    children: []
- type: Code
  text: "Sem Discovery:\n  \"O cliente pediu uma tela de relatório\"\n  → 3 sprints\
    \ de desenvolvimento\n  → Ninguém usa\n  → 3 sprints perdidos\n\nCom Discovery:\n\
    \  \"O cliente pediu uma tela de relatório\"\n  → Entrevista: \"Qual problema\
    \ você quer resolver?\"\n  → Descoberta: ele quer exportar dados pra planilha\n\
    \  → Solução: botão de exportar CSV em 1 dia\n  → Valida: ele testa, funciona,\
    \ usa todo dia"
  props:
    language: text
  children: []
- type: Subsection
  text: Armadilha comum
  props:
    level: 3
  children:
  - type: Text
    text: Armadilha comum
    props: {}
    children: []
- type: Code
  text: 'Time: "Vamos construir um chat bot!"

    Discovery: Nenhum


    3 meses depois:

    Ninguém usa o chat bot.


    Por quê?

    - Ninguém perguntou se o problema era real

    - Ninguém validou se chat bot era a melhor solução

    - Ninguém testou com usuários antes de construir'
  props:
    language: text
  children: []
