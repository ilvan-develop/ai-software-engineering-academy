    \      disabled: '#9AA0A6',\n      inverse: '#FFFFFF',\n    },\n    border: {\n\
    \      default: '#DADCE0',\n      hover: '#9AA0A6',\n      focus: '#1A73E8',\n\
    \    },\n    action: {\n      primary: '#1A73E8',\n      primaryHover: '#1557B0',\n\
    \      secondary: '#E8F0FE',\n    },\n  },\n};\n\nconst darkTheme: Theme = {\n\
