- type: Code
  text: 'OKR da empresa: "Aumentar receita recorrente em 25%"


    → Opportunity: churn de 15% ao mês

    → Discovery: por que os clientes estão cancelando?

    → Outcome: reduzir churn pela metade

    → Backlog: funcionalidades que endereçam as causas'
  props:
    language: text
  children: []
- type: Paragraph
  text: '**2. Discovery Sprints**'
  props: {}
  children:
  - type: Bold
    text: 2. Discovery Sprints
    props: {}
    children: []
- type: Paragraph
  text: 'Reserve ciclos fixos para discovery (ex: 2 semanas a cada quarter).'
  props: {}
