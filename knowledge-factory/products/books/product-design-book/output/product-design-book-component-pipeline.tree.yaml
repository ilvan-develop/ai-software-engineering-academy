- type: Paragraph
  text: 'A IBM criou uma adaptação própria chamada **Enterprise Design Thinking**,
    que adiciona:'
  props: {}
  children:
  - type: Text
    text: 'A IBM criou uma adaptação própria chamada '
    props: {}
    children: []
  - type: Bold
    text: Enterprise Design Thinking
    props: {}
    children: []
  - type: Text
    text: ', que adiciona:'
    props: {}
