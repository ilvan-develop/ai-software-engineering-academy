    \ seedSettingsIfNotExists(schema: string): Promise<void> {\n  const defaultSettings\
    \ = [\n    { key: 'locale', value: 'pt-BR' },\n    { key: 'timezone', value: 'America/Sao_Paulo'\
    \ },\n    { key: 'notification_email', value: 'true' },\n  ];\n\n  for (const\
    \ setting of defaultSettings) {\n    await pool.query(`\n      INSERT INTO \"\
    ${schema}\".settings (key, value)\n      VALUES ($1, $2)\n      ON CONFLICT (key)\
    \ DO NOTHING\n    `, [setting.key, setting.value]);\n  }\n}"
