    text: 4.3 Header HTTP
    props: {}
    children: []
- type: Code
  text: "// Extração simples e direta\nimport { Request } from 'express';\n\nconst\
    \ TENANT_HEADER = 'x-tenant-id';\n\nfunction extractTenantFromHeader(req: Request):\
    \ string | undefined {\n  const tenantId = req.headers[TENANT_HEADER];\n  if (Array.isArray(tenantId))\
    \ return tenantId[0];\n  return tenantId;\n}\n\n// Com validação de formato (slug)\n\
    const TENANT_SLUG_REGEX = /^[a-z0-9-]{3,50}$/;\n\nfunction validateTenantSlug(slug:\
    \ string): boolean {\n  return TENANT_SLUG_REGEX.test(slug);\n}"
  props:
    language: typescript
  children: []
- type: Subsection
  text: 4.4 JWT Claim
  props:
    level: 3
  children:
  - type: Text
    text: 4.4 JWT Claim
    props: {}
    children: []
- type: Code
  text: "// Interface do payload\ninterface TenantJwtPayload {\n  sub: string;   \
    \ // user ID\n  tid: string;    // tenant ID\n  rol: string;    // role dentro\
    \ do tenant\n  exp: number;    // expiração\n}\n\n// Extrair tenant do JWT\nimport\
    \ * as jwt from 'jsonwebtoken';\n\nfunction extractTenantFromJwt(authHeader?:\
    \ string): string | null {\n  if (!authHeader) return null;\n\n  const token =\
    \ authHeader.replace('Bearer ', '');\n  try {\n    const payload = jwt.verify(\n\
    \      token,\n      process.env.JWT_SECRET!\n    ) as TenantJwtPayload;\n\n \
    \   return payload.tid || null;\n  } catch {\n    return null; // token inválido\n\
    \  }\n}"
  props:
    language: typescript
  children: []
