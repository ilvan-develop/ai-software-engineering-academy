- type: Code
  text: "@Controller('health')\nexport class HealthController {\n  constructor(\n\
    \    private prisma: PrismaService,\n    private redis: RedisService,\n  ) {}\n\
    \n  @Get()\n  async check() {\n    const checks = await Promise.all([\n      this.checkDatabase(),\n\
    \      this.checkRedis(),\n    ]);\n\n    const allHealthy = checks.every(c =>\
    \ c.status === 'healthy');\n\n    return {\n      status: allHealthy ? 'healthy'\
    \ : 'degraded',\n      timestamp: new Date().toISOString(),\n      checks,\n \
    \   };\n  }\n\n  private async checkDatabase() {\n    try {\n      await this.prisma.$queryRaw`SELECT\
    \ 1`;\n      return { name: 'database', status: 'healthy' };\n    } catch {\n\
    \      return { name: 'database', status: 'unhealthy' };\n    }\n  }\n\n  private\
    \ async checkRedis() {\n    try {\n      await this.redis.ping();\n      return\
    \ { name: 'redis', status: 'healthy' };\n    } catch {\n      return { name: 'redis',\
    \ status: 'unhealthy' };\n    }\n  }\n}"
