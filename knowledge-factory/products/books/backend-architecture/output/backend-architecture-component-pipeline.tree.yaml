- type: Code
  text: "// tenant.extractor.ts\nfunction extractTenantFromHost(host: string): string\
    \ | null {\n  // host: \"acme.minhasaas.com\" → \"acme\"\n  // host: \"localhost:3000\"\
    \ → \"localhost\" (não é tenant)\n  const parts = host.split('.');\n  if (parts.length\
    \ < 3) return null; // sem subdomínio\n  return parts[0];\n}\n\n// Em produção,\
    \ validar contra lista de tenants permitidos\nasync function validateTenantSubdomain(\n\
    \  host: string,\n  tenantService: TenantService\n): Promise<Tenant | null> {\n\
    \  const subdomain = extractTenantFromHost(host);\n  if (!subdomain) return null;\n\
    \  return tenantService.findBySubdomain(subdomain);\n}"
  props:
    language: typescript
  children: []
- type: Subsection
  text: 4.3 Header HTTP
  props:
    level: 3
  children:
