- type: Code
  text: "// Service\nclass UserService {\n  async softDelete(id: string): Promise<void>\
    \ {\n    await this.prisma.user.update({\n      where: { id },\n      data: {\
    \ deletedAt: new Date() },\n    });\n  }\n\n  async findAll(): Promise<User[]>\
    \ {\n    // O @@where garante que deleted não aparece\n    return this.prisma.user.findMany();\n\
    \  }\n}"
