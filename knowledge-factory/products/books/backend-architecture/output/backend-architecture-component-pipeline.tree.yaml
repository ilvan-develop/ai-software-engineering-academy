- type: Code
  text: "// tenant-seed.ts\nasync function seedNewTenant(tenantSlug: string, plan:\
    \ string): Promise<void> {\n  const schema = `tenant_${tenantSlug}`;\n  const\
    \ client = await pool.connect();\n\n  try {\n    await client.query(`CREATE SCHEMA\
    \ IF NOT EXISTS \"${schema}\"`);\n\n    // 1. Migrations básicas\n    await client.query(`\n\
    \      CREATE TABLE IF NOT EXISTS \"${schema}\".users (\n        id UUID PRIMARY\
    \ KEY DEFAULT gen_random_uuid(),\n        name TEXT NOT NULL,\n        email TEXT\
    \ NOT NULL,\n        role TEXT NOT NULL DEFAULT 'member',\n        created_at\
    \ TIMESTAMPTZ DEFAULT NOW()\n      )\n    `);\n\n    await client.query(`\n  \
    \    CREATE TABLE IF NOT EXISTS \"${schema}\".projects (\n        id UUID PRIMARY\
    \ KEY DEFAULT gen_random_uuid(),\n        name TEXT NOT NULL,\n        description\
    \ TEXT,\n        status TEXT DEFAULT 'active',\n        created_at TIMESTAMPTZ\
    \ DEFAULT NOW()\n      )\n    `);\n\n    await client.query(`\n      CREATE TABLE\
    \ IF NOT EXISTS \"${schema}\".settings (\n        key TEXT PRIMARY KEY,\n    \
    \    value TEXT NOT NULL\n      )\n    `);\n\n    // 2. Seed data padrão\n   \
    \ await client.query(`\n      INSERT INTO \"${schema}\".users (name, email, role)\n\
    \      VALUES ('Admin', 'admin@${tenantSlug}.com', 'admin')\n    `);\n\n    await\
    \ client.query(`\n      INSERT INTO \"${schema}\".settings (key, value) VALUES\n\
    \        ('locale', 'pt-BR'),\n        ('timezone', 'America/Sao_Paulo'),\n  \
    \      ('notification_email', 'true'),\n        ('max_upload_size_mb', '10'),\n\
    \        ('default_language', 'pt')\n    `);\n\n    // 3. Dados condicionais por\
    \ plano\n    if (plan === 'enterprise') {\n      await client.query(`\n      \
    \  INSERT INTO \"${schema}\".settings (key, value) VALUES\n          ('custom_domain',\
    \ ''),\n          ('sso_enabled', 'true'),\n          ('audit_log_retention_days',\
    \ '365')\n      `);\n    }\n\n    console.log(`[${tenantSlug}] Seed concluído`);\n\
    \  } catch (error) {\n    console.error(`[${tenantSlug}] Seed falhou:`, error);\n\
    \    throw error;\n  } finally {\n    client.release();\n  }\n}\n\n// Hook na\
    \ criação do tenant\nasync function createTenant(data: { slug: string; name: string;\
    \ plan: string }) {\n  const result = await pool.query(\n    `INSERT INTO tenants\
    \ (slug, name, plan_id)\n     VALUES ($1, $2, (SELECT id FROM plans WHERE name\
    \ = $3))\n     RETURNING *`,\n    [data.slug, data.name, data.plan]\n  );\n\n\
    \  const tenant = result.rows[0];\n  await seedNewTenant(tenant.slug, data.plan);\n\
    \n  return tenant;\n}"
  props:
    language: typescript
  children: []
