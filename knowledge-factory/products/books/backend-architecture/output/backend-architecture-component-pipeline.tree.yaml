- type: Code
  text: "model AuditLog {\n  id         String   @id @default(cuid())\n  entity  \
    \   String   // \"User\", \"Order\", \"Product\"\n  entityId   String   // ID\
    \ do registro\n  action     String   // \"CREATE\", \"UPDATE\", \"DELETE\"\n \
    \ changes    Json?    // { \"before\": {...}, \"after\": {...} }\n  userId   \
    \  String?\n  ip         String?\n  userAgent  String?\n  createdAt  DateTime\
    \ @default(now())\n\n  @@index([entity, entityId])\n  @@index([userId])\n  @@index([createdAt])\n\
    }"
  props:
    language: prisma
  children: []
- type: Code
  text: "// AuditService\nclass AuditService {\n  async log(input: AuditInput): Promise<void>\
    \ {\n    await this.prisma.auditLog.create({\n      data: {\n        entity: input.entity,\n\
    \        entityId: input.entityId,\n        action: input.action,\n        changes:\
    \ JSON.parse(JSON.stringify(input.changes)),\n        userId: input.userId,\n\
    \        ip: input.ip,\n        userAgent: input.userAgent,\n      },\n    });\n\
    \  }\n}\n\n// Uso com hook do Prisma\nprisma.$use(async (params, next) => {\n\
    \  const result = await next(params);\n\n  if (['create', 'update', 'delete'].includes(params.action))\
    \ {\n    await auditService.log({\n      entity: params.model,\n      entityId:\
    \ result?.id,\n      action: params.action.toUpperCase(),\n      changes: params.args.data,\n\
    \    });\n  }\n\n  return result;\n});"
  props:
    language: typescript
  children: []
