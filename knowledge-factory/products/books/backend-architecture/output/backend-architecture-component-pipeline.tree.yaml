- type: Code
  text: "// shared-migration.ts\n// Migrations tradicionais — funcionam como app single-tenant\n\
    \nasync function migrateShared(): Promise<void> {\n  const client = await pool.connect();\n\
    \  try {\n    await client.query('BEGIN');\n\n    // Adicionar coluna tenant_id\
    \ se não existe\n    await client.query(`\n      ALTER TABLE users\n      ADD\
    \ COLUMN IF NOT EXISTS tenant_id TEXT NOT NULL DEFAULT 'default'\n    `);\n\n\
    \    // Índices compostos para performance\n    await client.query(`\n      CREATE\
    \ INDEX IF NOT EXISTS idx_users_tenant_email\n      ON users (tenant_id, email)\n\
    \    `);\n\n    await client.query(`\n      CREATE INDEX IF NOT EXISTS idx_orders_tenant_created\n\
    \      ON orders (tenant_id, created_at DESC)\n    `);\n\n    await client.query('COMMIT');\n\
    \  } catch (error) {\n    await client.query('ROLLBACK');\n    throw error;\n\
    \  } finally {\n    client.release();\n  }\n}"
