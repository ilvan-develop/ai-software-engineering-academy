- type: Code
  text: "// tenant.decorator.ts\nimport { createParamDecorator, ExecutionContext }\
    \ from '@nestjs/common';\n\nexport const Tenant = createParamDecorator(\n  (data:\
    \ keyof Tenant | undefined, ctx: ExecutionContext) => {\n    const request = ctx.switchToHttp().getRequest();\n\
    \    const tenant = request.tenant;\n\n    if (!tenant) {\n      throw new Error('Tenant\
    \ não encontrado no request. TenantMiddleware está configurado?');\n    }\n\n\
    \    return data ? tenant[data] : tenant;\n  }\n);\n\n// Uso no controller\n@Get('users')\n\
    findAll(@Tenant() tenant: Tenant) {\n  return this.userService.findAll(tenant.id);\n\
    }\n\n@Get('plan')\ngetPlan(@Tenant('plan') plan: string) {\n  return { plan };\n\
    }"
