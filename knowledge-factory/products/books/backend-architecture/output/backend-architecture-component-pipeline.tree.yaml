- type: Code
  text: "// tenant-rate-limiter.ts\nimport { Injectable } from '@nestjs/common';\n\
    \ninterface RateLimitConfig {\n  requestsPerMinute: number;\n  concurrentRequests:\
    \ number;\n}\n\nconst PLAN_LIMITS: Record<string, RateLimitConfig> = {\n  free:\
    \       { requestsPerMinute: 100,  concurrentRequests: 5 },\n  pro:        { requestsPerMinute:\
    \ 1000, concurrentRequests: 25 },\n  enterprise: { requestsPerMinute: 10000, concurrentRequests:\
    \ 100 },\n};\n\n@Injectable()\nexport class TenantRateLimiter {\n  private requestCounts\
    \ = new Map<string, { count: number; windowStart: number }>();\n  private concurrentCounts\
    \ = new Map<string, number>();\n\n  async checkRateLimit(tenantId: string, plan:\
    \ string): Promise<void> {\n    const limits = PLAN_LIMITS[plan] || PLAN_LIMITS.free;\n\
    \    const now = Date.now();\n    const windowMs = 60_000; // 1 minuto\n\n   \
    \ // Rate limit\n    const entry = this.requestCounts.get(tenantId) ?? { count:\
    \ 0, windowStart: now };\n\n    if (now - entry.windowStart > windowMs) {\n  \
    \    entry.count = 0;\n      entry.windowStart = now;\n    }\n\n    entry.count++;\n\
    \    this.requestCounts.set(tenantId, entry);\n\n    if (entry.count > limits.requestsPerMinute)\
    \ {\n      throw new Error(`Rate limit excedido para tenant ${tenantId}. Limite:\
    \ ${limits.requestsPerMinute}/min`);\n    }\n\n    // Concurrent requests\n  \
    \  const concurrent = this.concurrentCounts.get(tenantId) ?? 0;\n    this.concurrentCounts.set(tenantId,\
    \ concurrent + 1);\n\n    if (concurrent + 1 > limits.concurrentRequests) {\n\
    \      this.concurrentCounts.set(tenantId, concurrent);\n      throw new Error(`Muitas\
    \ requisições concorrentes para tenant ${tenantId}. Limite: ${limits.concurrentRequests}`);\n\
    \    }\n  }\n\n  releaseConcurrent(tenantId: string): void {\n    const current\
    \ = this.concurrentCounts.get(tenantId) ?? 1;\n    this.concurrentCounts.set(tenantId,\
    \ Math.max(0, current - 1));\n  }\n}"
  props:
    language: typescript
  children: []
