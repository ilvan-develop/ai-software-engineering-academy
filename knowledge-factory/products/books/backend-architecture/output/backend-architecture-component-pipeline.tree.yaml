- type: Code
  text: "  describe('Rate limiting por plano', () => {\n    it('deve bloquear tenant\
    \ Free após exceder limite', async () => {\n      // Tenant 'omega' é free (100\
    \ req/min no teste)\n      const promises = Array.from({ length: 110 }, (_, i)\
    \ =>\n        asTenant('omega')\n          .get('/users')\n          .then((r)\
    \ => r.status)\n      );\n\n      const statuses = await Promise.all(promises);\n\
    \      const tooManyRequests = statuses.filter((s) => s === 429);\n\n      expect(tooManyRequests.length).toBeGreaterThan(0);\n\
    \    });\n\n    it('Enterprise não deve ser rate limited com mesma carga', async\
    \ () => {\n      // Tenant 'acme' é enterprise (10000 req/min)\n      const promises\
    \ = Array.from({ length: 110 }, () =>\n        asTenant('acme')\n          .get('/users')\n\
    \          .then((r) => r.status)\n      );\n\n      const statuses = await Promise.all(promises);\n\
    \      const tooManyRequests = statuses.filter((s) => s === 429);\n\n      expect(tooManyRequests).toHaveLength(0);\n\
    \    });\n  });"
  props:
    language: typescript
  children: []
