- type: Code
  text: "// Evento\nclass PedidoCriadoEvent {\n  constructor(\n    readonly pedidoId:\
    \ string,\n    readonly clienteEmail: string,\n    readonly valor: number,\n \
    \ ) {}\n}\n\n// Produtor\nclass CriarPedidoUseCase {\n  constructor(\n    private\
    \ pedidoRepo: PedidoRepository,\n    private eventBus: EventBus,\n  ) {}\n\n \
    \ async execute(input: CriarPedidoInput): Promise<void> {\n    const pedido =\
    \ Pedido.criar(input.clienteId, input.itens);\n    await this.pedidoRepo.save(pedido);\n\
    \n    // Publica evento\n    await this.eventBus.publish(\n      new PedidoCriadoEvent(pedido.id,\
    \ input.clienteEmail, pedido.valor)\n    );\n  }\n}\n\n// Consumidor\nclass EmailHandler\
    \ {\n  @OnEvent(PedidoCriadoEvent)\n  async enviarConfirmacao(event: PedidoCriadoEvent)\
    \ {\n    await this.emailService.send({\n      to: event.clienteEmail,\n     \
    \ subject: 'Pedido confirmado!',\n      body: `Pedido #${event.pedidoId} no valor\
    \ de R$ ${event.valor}`,\n    });\n  }\n}"
  props:
    language: typescript
