- type: Code
  text: "// tenant.extension.ts\nimport { PrismaClient } from '@prisma/client';\n\
    import { tenantContext } from './tenant-context';\n\nexport const tenantExtension\
    \ = Prisma.defineExtension((client) => {\n  return client.$extends({\n    query:\
    \ {\n      $allModels: {\n        async $allOperations({ model, operation, args,\
    \ query }) {\n          const ctx = tenantContext.getStore();\n\n          if\
    \ (ctx && ['create', 'createMany'].includes(operation)) {\n            args.data\
    \ = { ...args.data, tenantId: ctx.tenantId };\n          }\n\n          if (ctx\
    \ && ['findMany', 'findFirst', 'update', 'delete'].includes(operation)) {\n  \
    \          args.where = { ...args.where, tenantId: ctx.tenantId };\n         \
    \ }\n\n          return query(args);\n        },\n      },\n    },\n  });\n});\n\
    \n// Uso\nconst prisma = new PrismaClient().$extends(tenantExtension);"
  props:
    language: typescript
