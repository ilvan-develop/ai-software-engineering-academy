- type: Code
  text: "// query-optimizer.ts\nclass QueryOptimizer {\n  constructor(private tenantId:\
    \ string, private plan: string) {}\n\n  async findOrders(start: Date, end: Date):\
    \ Promise<Order[]> {\n    const baseQuery = `\n      SELECT * FROM orders\n  \
    \    WHERE tenant_id = $1\n        AND created_at BETWEEN $2 AND $3\n    `;\n\n\
    \    // Enterprise: busca completa\n    if (this.plan === 'enterprise') {\n  \
    \    return pool.query(baseQuery + ' ORDER BY created_at DESC', [\n        this.tenantId,\
    \ start, end,\n      ]).then(r => r.rows);\n    }\n\n    // Free/Pro: paginado\n\
    \    return pool.query(baseQuery + ' ORDER BY created_at DESC LIMIT 100', [\n\
    \      this.tenantId, start, end,\n    ]).then(r => r.rows);\n  }\n}"
