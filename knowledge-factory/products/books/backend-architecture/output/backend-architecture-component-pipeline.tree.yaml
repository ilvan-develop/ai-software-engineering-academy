- type: Code
  text: "// Adaptador de saída (implementação externa)\nclass PrismaPedidoRepository\
    \ implements PedidoRepository {\n  async save(pedido: Pedido): Promise<void> {\n\
    \    await prisma.pedido.create({\n      data: this.toPersistence(pedido),\n \
    \   });\n  }\n\n  private toPersistence(pedido: Pedido): PrismaPedido {\n    return\
    \ {\n      id: pedido.id.toString(),\n      clienteId: pedido.clienteId.toString(),\n\
    \      valor: pedido.valor,\n    };\n  }\n}\n\n// Adaptador de entrada (NestJS\
    \ Controller)\n@Controller('/pedidos')\nclass PedidoController {\n  constructor(private\
    \ criarPedido: CriarPedidoUseCase) {}\n\n  @Post()\n  async criar(@Body() body:\
    \ CriarPedidoDto) {\n    return this.criarPedido.execute(this.toInput(body));\n\
    \  }\n}"
