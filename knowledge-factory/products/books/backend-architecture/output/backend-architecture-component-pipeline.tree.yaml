- type: Code
  text: "  describe('Vazamento de dados', () => {\n    it('Tenant A não deve ver dados\
    \ do Tenant B', async () => {\n      // Arrange: criar dados como Tenant A\n \
    \     await asTenant('acme')\n        .post('/users')\n        .send({ name: 'João\
    \ Silva', email: 'joao@acme.com' })\n        .expect(201);\n\n      // Act: listar\
    \ usuários como Tenant B\n      const response = await asTenant('zeta')\n    \
    \    .get('/users')\n        .expect(200);\n\n      // Assert: Tenant B não vê\
    \ os dados de A\n      expect(response.body).toBeInstanceOf(Array);\n      expect(response.body).toHaveLength(0);\n\
    \      expect(response.body).not.toContainEqual(\n        expect.objectContaining({\
    \ email: 'joao@acme.com' })\n      );\n    });\n\n    it('deve rejeitar requisição\
    \ sem tenant_id', async () => {\n      const jwt = generateJwt({ sub: 'user1'\
    \ }); // sem tid\n      const response = await request(app.getHttpServer())\n\
    \        .get('/users')\n        .set('Authorization', `Bearer ${jwt}`)\n    \
    \    .expect(401);\n\n      expect(response.body.message).toContain('Tenant');\n\
    \    });\n\n    it('deve rejeitar token com tenant inexistente', async () => {\n\
    \      const response = await asTenant('tenant_inexistente')\n        .get('/users')\n\
    \        .expect(401);\n\n      expect(response.body.message).toContain('não encontrado');\n\
    \    });\n  });"
  props:
    language: typescript
  children: []
