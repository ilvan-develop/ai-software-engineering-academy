- type: Code
  text: "// auth.service.ts\n@Injectable()\nexport class AuthService {\n  constructor(\n\
    \    private userRepo: UserRepository,\n    private jwtService: JwtService,\n\
    \  ) {}\n\n  async login(dto: LoginDto): Promise<AuthTokens> {\n    const user\
    \ = await this.userRepo.findByEmail(dto.email);\n    if (!user) throw new UnauthorizedException('Credenciais\
    \ inválidas');\n\n    const passwordValid = await bcrypt.compare(dto.password,\
    \ user.password);\n    if (!passwordValid) throw new UnauthorizedException('Credenciais\
    \ inválidas');\n\n    return this.generateTokens(user);\n  }\n\n  private async\
    \ generateTokens(user: User): Promise<AuthTokens> {\n    const payload = { sub:\
    \ user.id, email: user.email, role: user.role };\n\n    const accessToken = await\
    \ this.jwtService.signAsync(payload, {\n      expiresIn: '15m',\n    });\n\n \
    \   const refreshToken = await this.jwtService.signAsync(payload, {\n      expiresIn:\
    \ '7d',\n      secret: process.env.JWT_REFRESH_SECRET,\n    });\n\n    // Armazenar\
    \ refresh token (para revogação)\n    await this.tokenRepo.save(user.id, refreshToken);\n\
    \n    return { accessToken, refreshToken };\n  }\n\n  async refresh(refreshToken:\
    \ string): Promise<AuthTokens> {\n    try {\n      const payload = await this.jwtService.verifyAsync(refreshToken,\
    \ {\n        secret: process.env.JWT_REFRESH_SECRET,\n      });\n\n      // Verificar\
    \ se token ainda é válido (não foi revogado)\n      const stored = await this.tokenRepo.find(payload.sub,\
    \ refreshToken);\n      if (!stored) throw new UnauthorizedException('Token revogado');\n\
    \n      // Revogar token antigo (rotação)\n      await this.tokenRepo.delete(payload.sub,\
    \ refreshToken);\n\n      const user = await this.userRepo.findById(payload.sub);\n\
    \      return this.generateTokens(user);\n    } catch {\n      throw new UnauthorizedException('Refresh\
    \ token inválido');\n    }\n  }\n\n  async logout(userId: string): Promise<void>\
    \ {\n    await this.tokenRepo.deleteAll(userId);\n  }\n}\n\n// jwt-auth.guard.ts\n\
    @Injectable()\nexport class JwtAuthGuard extends AuthGuard('jwt') {}\n\n// jwt.strategy.ts\n\
    @Injectable()\nexport class JwtStrategy extends PassportStrategy(Strategy) {\n\
    \  constructor() {\n    super({\n      jwtFromRequest: ExtractJwt.fromAuthHeaderAsBearerToken(),\n\
    \      secretOrKey: process.env.JWT_SECRET,\n    });\n  }\n\n  async validate(payload:\
    \ JwtPayload): Promise<User> {\n    return { id: payload.sub, email: payload.email,\
    \ role: payload.role };\n  }\n}"
  props:
    language: typescript
