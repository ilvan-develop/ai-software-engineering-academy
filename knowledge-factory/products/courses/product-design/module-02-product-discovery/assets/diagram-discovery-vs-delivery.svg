<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" font-family="Segoe UI, sans-serif"><rect x="0" y="0" width="800" height="400" fill="#FAFAFA" rx="8" /><text x="400" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#1A237E">Discovery vs Delivery</text><rect x="40" y="70" width="300" height="300" fill="#E3F2FD" stroke="#1A237E" stroke-width="2" rx="8" /><text x="190" y="110" text-anchor="middle" font-size="20" font-weight="bold" fill="#1A237E">Discovery</text><circle cx="70" cy="144" r="6" fill="#00BFA5" /><text x="90" y="150" font-size="16" fill="#212121">Alta incerteza, baixo custo</text><circle cx="70" cy="180" r="6" fill="#00BFA5" /><text x="90" y="186" font-size="16" fill="#212121">Perguntas, hipoteses, experimentos</text><circle cx="70" cy="216" r="6" fill="#00BFA5" /><text x="90" y="222" font-size="16" fill="#212121">Falsificavel e iterativo</text><circle cx="70" cy="252" r="6" fill="#00BFA5" /><text x="90" y="258" font-size="16" fill="#212121">Decide O QUE construir</text><rect x="460" y="70" width="300" height="300" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" rx="8" /><text x="610" y="110" text-anchor="middle" font-size="20" font-weight="bold" fill="#2E7D32">Delivery</text><circle cx="490" cy="144" r="6" fill="#00BFA5" /><text x="510" y="150" font-size="16" fill="#212121">Baixa incerteza, alto custo</text><circle cx="490" cy="180" r="6" fill="#00BFA5" /><text x="510" y="186" font-size="16" fill="#212121">Requisitos, planejamento, codigo</text><circle cx="490" cy="216" r="6" fill="#00BFA5" /><text x="510" y="222" font-size="16" fill="#212121">Definido e incremental</text><circle cx="490" cy="252" r="6" fill="#00BFA5" /><text x="510" y="258" font-size="16" fill="#212121">Decide COMO construir</text><path d="M 350 180.0 L 450 180.0" stroke="#9E9E9E" stroke-width="2" marker-end="url(#arrowhead)" /><text x="400" y="172" text-anchor="middle" font-size="12" fill="#757575">Validacao</text><path d="M 350 220.0 L 450 220.0" stroke="#9E9E9E" stroke-width="2" marker-end="url(#arrowhead)" /><text x="400" y="212" text-anchor="middle" font-size="12" fill="#757575">Evidencia</text><path d="M 350 260.0 L 450 260.0" stroke="#9E9E9E" stroke-width="2" marker-end="url(#arrowhead)" /><text x="400" y="252" text-anchor="middle" font-size="12" fill="#757575">Aprendizado</text><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9E9E9E" /></marker></defs></svg>